<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>채용 - KMarket</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/company/company-index.css}">
    <link rel="stylesheet" th:href="@{/css/company/recruit.css}">
</head>
<body>

<!-- ① 메인메뉴: 채용 페이지 하이라이트 -->
<header th:replace="~{fragments/company-header :: header(active='recruit')}"></header>


<section class="recruit-page">
    <div class="container">

        <h1 class="recruit-title">
            쇼핑을 새롭게, 세상을 이롭게<br>
            쇼핑 좀 해본 인재를 모십니다 !
        </h1>

        <p class="recruit-desc">
            케이마켓은 안정성 있고 혁신성 있게 우리의 문화를 만들어가고 있어요.<br>
            구성원들은 수평적이고 자율적인 문화 속에서 선을 넘어서 혁신적인 케이마켓만의 서비스를 만들어요.<br>
            케이마켓과 함께 굵은 점을 찍어가며 성장하실 분들을 기다립니다.
        </p>

        <!-- ② 채용 공고 게시판 -->
        <table class="recruit-table">
            <thead>
            <tr>
                <th>번호</th>
                <th>채용부서</th>
                <th>경력사항</th>
                <th>채용형태</th>
                <th>제목</th>
                <th>상태</th>
                <th>모집기간</th>
            </tr>
            </thead>

            <tbody>

            <!-- 등록된 공고 없을 때 -->
            <tr th:if="${recruitList == null or #lists.isEmpty(recruitList)}">
                <td colspan="7" style="text-align:center; padding:30px 0;">
                    등록된 채용공고가 없습니다.
                </td>
            </tr>

            <!-- DB 채용공고 출력 -->
            <tr th:each="recruit, stat : ${recruitList}">
                <td th:text="${recruit.id}">1</td>

                <td th:text="${recruit.department}">IT</td>

                <td th:text="${recruit.experience}">신입</td>

                <td th:text="${recruit.recruitCategory}">정규직</td>

                <td th:text="${recruit.title}">밥 잘먹는 개발자 뽑읍니다.</td>

                <td>
            <span th:text="${recruit.status}"
                  th:class="${recruit.status == '모집중' ? 'status active' : 'status ended'}">
                모집중
            </span>
                </td>

                <td>
                    <span th:text="${recruit.recruitStartAt != null ? #temporals.format(recruit.recruitStartAt, 'yyyy-MM-dd') : '0000-00-00'}"></span>
                    ~
                    <span th:text="${recruit.recruitEndAt != null ? #temporals.format(recruit.recruitEndAt, 'yyyy-MM-dd') : '0000-00-00'}"></span>
                </td>
            </tr>

            </tbody>
        </table>

        <!-- 페이지네이션 — JS로 페이지 전환 동작 확인용 (실제 서버 페이징은 추후 Controller에서 처리) -->
        <div class="recruit-pagination" id="recruitPagination">
            <a href="#" class="page-nav" data-page="prev">이전</a>
            <a href="#" class="page-num active" data-page="1">1</a>
            <a href="#" class="page-num" data-page="2">2</a>
            <a href="#" class="page-num" data-page="3">3</a>
            <a href="#" class="page-num" data-page="4">4</a>
            <a href="#" class="page-num" data-page="5">5</a>
            <a href="#" class="page-nav" data-page="next">다음</a>
        </div>

    </div>
</section>


<!-- 회사소개 전용 푸터 -->
<footer th:replace="~{fragments/company-footer :: footer}"></footer>


<script th:src="@{/js/company.js}"></script>
<script th:src="@{/js/recruit-pagination.js}"></script>
</body>
</html>
