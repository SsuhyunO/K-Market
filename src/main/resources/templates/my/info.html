




<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>나의설정 | K-Market</title>
    <link rel="stylesheet" th:href="@{/css/my/info.css}">
    <script src="https://t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
    <meta id="ctxPath" th:content="@{/}" content="/">
</head>
<body>

<!-- ===== HEADER ===== -->
<div th:replace="~{fragments/header :: header}"></div>

<!-- ===== MAIN ===== -->
<main>

    <!-- 1번 영역: 요약 정보 (가로 풀폭, 회색바탕) -->
    <section class="my-summary">
        <span class="my-summary-title">나의쇼핑정보</span>
        <div class="summary-items">
            <div class="summary-item">
                <span class="summary-label">주문</span>
                <span class="summary-num">2</span>
            </div>
            <div class="summary-divider"></div>
            <div class="summary-item">
                <span class="summary-label">쿠폰</span>
                <span class="summary-num">1</span>
            </div>
            <div class="summary-divider"></div>
            <div class="summary-item">
                <span class="summary-label">포인트</span>
                <span class="summary-num">1,000</span>
            </div>
            <div class="summary-divider"></div>
            <div class="summary-item">
                <span class="summary-label">문의</span>
                <span class="summary-num">1</span>
            </div>
        </div>
    </section>

    <!-- 2번 영역(사이드바) + 콘텐츠 영역을 나란히 배치 -->
    <div class="my-wrapper">

        <!-- 2번 영역: 사이드바 (전체주문내역 active) -->
        <aside class="sidebar">
            <nav class="sidebar-menu">
                <ul>
                    <li><a th:href="@{/my/order}" data-menu="orders">전체주문내역</a></li>
                    <li><a th:href="@{/point/list}" data-menu="points">포인트내역</a></li>
                    <li><a th:href="@{/my/coupon}"  data-menu="coupons">쿠폰</a></li>
                    <li><a th:href="@{/review/list}" data-menu="reviews">나의리뷰</a></li>
                    <li><a th:href="@{/my/qna}" data-menu="inquiry">문의하기</a></li>
                    <li><a th:href="@{/my/info}" class="active" data-menu="settings">나의설정</a></li>
                </ul>
            </nav>
        </aside>

        <!-- 콘텐츠 영역 -->
        <div class="my-content">

            <!-- 3번 영역: 배너 광고 -->
            <div class="my-banner">
                <a th:if="${myPageBanner != null}"
                   th:href="${myPageBanner.link != null and !#strings.isEmpty(myPageBanner.link) ? myPageBanner.link : '#'}"
                   target="_blank">
                    <img th:src="@{|/files/${myPageBanner.fileId}|}" th:alt="${myPageBanner.name}">
                </a>
                <a th:unless="${myPageBanner != null}" th:href="@{/event/summer-sale}" target="_blank">
                    <img th:src="@{/images/banner/banner_810x86.png}" alt="K-Market 이벤트 배너">
                </a>
            </div>

            <!-- 3번 영역: 나의설정 폼 -->
            <section class="my-section">
                <div class="section-header">
                    <span class="section-title">나의설정</span>
                </div>

                <table class="info-table">
                    <tbody>
                    <!-- 연동 로그인 상태 -->
                    <tr>
                        <th>연동 로그인</th>
                        <td>
                            <div class="social-login-area">
                                <div class="social-login-item" id="localItem">
                                    <div class="social-icon social-icon-local">일반</div>
                                    <div class="social-badge">로그인됨</div>
                                </div>
                                <div class="social-login-item" id="naverItem">
                                    <div class="social-icon social-icon-naver">N</div>
                                    <div class="social-badge">로그인됨</div>
                                </div>
                                <div class="social-login-item" id="kakaoItem">
                                    <div class="social-icon social-icon-kakao">K</div>
                                    <div class="social-badge">로그인됨</div>
                                </div>
                                <div class="social-login-item" id="googleItem">
                                    <div class="social-icon social-icon-google">G</div>
                                    <div class="social-badge">로그인됨</div>
                                </div>
                            </div>
                        </td>
                    </tr>
                    <!-- 사용자 ID -->
                    <tr>
                        <th>사용자 ID</th>
                        <td><span class="info-value" id="infoUid">-</span></td>
                    </tr>
                    <!-- 비밀번호: 버튼 클릭 시 팝업으로 변경 -->
                    <tr>
                        <th>비밀번호</th>
                        <td>
                            <button type="button" class="btn-info-action" id="pwChangeBtn">비밀번호수정</button>
                        </td>
                    </tr>
                    <!-- 이름 -->
                    <tr>
                        <th>이름</th>
                        <td><span class="info-value" id="infoName">-</span></td>
                    </tr>
                    <!-- 생년월일 -->
                    <tr>
                        <th>생년 월일</th>
                        <td><span class="info-value" id="infoBirth">-</span></td>
                    </tr>
                    <!-- Email: 수정 금지 -> 읽기 전용 표시만 -->
                    <tr>
                        <th>Email</th>
                        <td><span class="info-value" id="infoEmail">-</span></td>
                    </tr>
                    <!-- 휴대폰 -->
                    <tr>
                        <th>휴대폰</th>
                        <td>
                            <div class="info-phone-row">
                                <input type="text" class="info-input info-phone-full" id="phoneInput" maxlength="13" disabled>
                                <button type="button" class="btn-info-edit" id="phoneEditBtn">수정하기</button>
                            </div>
                        </td>
                    </tr>
                    <!-- 주소 -->
                    <tr>
                        <th>주소</th>
                        <td>
                            <div class="info-addr-row">
                                <input type="text" class="info-input info-postcode" id="postcode" placeholder="우편번호" readonly>
                                <button type="button" class="btn-info-edit" id="addrSearchBtn">주소검색</button>
                            </div>
                            <input type="text" class="info-input info-addr-full" id="addrBasic" placeholder="기본주소검색" readonly>
                            <input type="text" class="info-input info-addr-full" id="addrDetail" placeholder="상세주소입력">
                        </td>
                    </tr>
                    <!-- 탈퇴 -->
                    <tr>
                        <th>탈퇴</th>
                        <td>
                            <button type="button" class="btn-withdraw" id="withdrawBtn">탈퇴 하기</button>
                        </td>
                    </tr>
                    </tbody>
                </table>

                <div class="info-submit-wrap">
                    <button type="button" class="btn-info-submit" id="infoSubmitBtn">수정하기</button>
                </div>
            </section>

        </div>
    </div>
</main>

<!-- 비밀번호 변경 모달 -->
<div class="modal-overlay" id="pwModal">
    <div class="modal-box modal-box-pw">
        <button type="button" class="modal-close modal-close-plain" data-close="pwModal">&times;</button>
        <div class="modal-body modal-body-pw">
            <p class="modal-confirm-title modal-title-left">비밀번호 변경</p>

            <div class="pw-check-row">
                <div class="pw-check-row-inputs">
                    <input type="password" class="info-input" id="currentPwInput" placeholder="현재 비밀번호 확인">
                    <button type="button" class="btn-info-edit" id="pwVerifyBtn">확인</button>
                </div>
                <span class="pw-msg" id="pwCheckMsg"></span>
            </div>

            <!-- 현재 비밀번호가 확인된 경우에만 나타남 -->
            <div class="pw-new-row" id="pwNewSection" style="display:none;">
                <div class="pw-field">
                    <input type="password" class="info-input" id="newPwInput" placeholder="새 비밀번호">
                    <span class="pw-msg" id="pwRuleMsg"></span>
                </div>
                <div class="pw-field">
                    <input type="password" class="info-input" id="newPwConfirmInput" placeholder="새 비밀번호 확인">
                    <span class="pw-msg" id="pwMatchMsg"></span>
                </div>
            </div>

            <div class="modal-confirm-btn-group">
                <button type="button" class="modal-btn-cancel" data-close="pwModal">취소</button>
                <button type="button" class="modal-btn-primary" id="pwSaveBtn">저장</button>
            </div>
        </div>
    </div>
</div>

<!-- 탈퇴 확인 모달 -->
<div class="modal-overlay" id="withdrawModal">
    <div class="modal-box modal-box-confirm modal-box-withdraw">
        <button type="button" class="modal-close modal-close-plain" data-close="withdrawModal">&times;</button>
        <div class="modal-body modal-body-withdraw">
            <div class="modal-warning-icon">!</div>
            <p class="modal-confirm-title">정말 탈퇴하시겠어요?</p>
            <p class="modal-confirm-text">
                탈퇴 시 모든 정보가 삭제되며<br>
                복구가 불가능합니다.
            </p>
            <div class="modal-confirm-btn-group">
                <button type="button" class="modal-btn-cancel" data-close="withdrawModal">취소</button>
                <button type="button" class="modal-btn-danger" id="withdrawConfirmBtn">탈퇴하기</button>
            </div>
        </div>
    </div>
</div>

<script th:src="@{/js/my/info.js}"></script>

</body>
</html>
