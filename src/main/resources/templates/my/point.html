


<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="context-path" th:content="@{/}">
    <title>포인트내역 | K-Market</title>
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/index.css}">
    <link rel="stylesheet" th:href="@{/css/my/point.css}">
</head>
<body>

<!-- ===== HEADER ===== -->
<div th:replace="~{fragments/header :: header}"></div>

<!-- ===== MAIN ===== -->
<div class="page-wrapper">
    <div class="main-content">
        <main>

    <!-- 1번 영역: 요약 정보 (가로 풀폭, 회색바탕) -->
            <section class="my-summary">
                <span class="my-summary-title">나의 쇼핑정보</span>
                <div class="summary-items">
                    <div class="summary-item">
                        <span class="summary-label">주문</span>
                        <span class="summary-num" th:text="${totalOrderCount}">0</span>
                    </div>
                    <div class="summary-divider"></div>
                    <div class="summary-item">
                        <span class="summary-label">쿠폰</span>
                        <span class="summary-num" th:text="${myCouponCount}">0</span>
                    </div>
                    <div class="summary-divider"></div>
                    <div class="summary-item">
                        <span class="summary-label">포인트</span>
                        <span class="summary-num" th:text="${myPointBalance}">0</span>
                    </div>
                    <div class="summary-divider"></div>
                    <div class="summary-item"><span class="summary-label">문의</span><span class="summary-num">0</span></div>
                </div>
            </section>

    <!-- 2번 영역(사이드바) + 콘텐츠 영역을 나란히 배치 -->
    <div class="my-wrapper">

        <!-- 2번 영역: 사이드바 (전체주문내역 active) -->
        <aside class="sidebar">
            <nav class="sidebar-menu">
                <ul>
                    <li><a th:href="@{/my/order}" data-menu="orders">전체주문내역</a></li>
                    <li><a th:href="@{/point/list}" class="active" data-menu="points">포인트내역</a></li>
                    <li><a th:href="@{/my/coupon}"  data-menu="coupons">쿠폰</a></li>
                    <li><a th:href="@{/review/list}" data-menu="reviews">나의리뷰</a></li>
                    <li><a th:href="@{/my/qna}" data-menu="inquiry">문의하기</a></li>
                    <li><a th:href="@{/my/info}"  data-menu="settings">나의설정</a></li>
                </ul>
            </nav>
        </aside>

        <!-- 콘텐츠 영역 -->
        <div class="my-content">

            <!-- 3번 영역: 배너 광고 -->
            <div class="my-banner">
                <a th:if="${myPageBanner != null}"
                   th:href="${myPageBanner.link != null and !#strings.isEmpty(myPageBanner.link) ? myPageBanner.link : '#'}"
                   target="_blank">
                    <img th:src="@{|/files/${myPageBanner.fileId}|}" th:alt="${myPageBanner.name}">
                </a>
                <a th:unless="${myPageBanner != null}" th:href="@{/event/summer-sale}" target="_blank">
                    <img th:src="@{/images/banner/banner_810x86.png}" alt="K-Market 이벤트 배너">
                </a>
            </div>

            <!-- 4번 영역: 포인트내역 -->
            <section class="my-section">
                <div class="section-header">
                    <span class="section-title">포인트내역</span>
                </div>

                <!-- 기간별조회 -->
                <div class="period-search">
                    <span class="period-search-label">기간별조회</span>

                    <div class="period-group">
                        <label class="period-radio">
                            <input type="radio" name="periodType" value="week" data-days="7">
                            1 주일
                        </label>
                        <label class="period-radio">
                            <input type="radio" name="periodType" value="halfmonth" data-days="15">
                            15 일
                        </label>
                        <label class="period-radio">
                            <input type="radio" name="periodType" value="month" data-days="30" checked>
                            1 개월
                        </label>
                    </div>

                    <div class="period-divider"></div>

                    <div class="period-group">
                        <select id="periodMonthSelect" class="period-select">
                            <option value="0">이번 달</option>
                            <option value="1">1 개월 전</option>
                            <option value="2">2 개월 전</option>
                            <option value="3">3 개월 전</option>
                            <option value="4">4 개월 전</option>
                        </select>
                    </div>

                    <div class="period-divider"></div>

                    <div class="period-group period-range">
                        <input type="date" id="periodStartDate" class="period-date-input">
                        <span class="period-range-tilde">~</span>
                        <input type="date" id="periodEndDate" class="period-date-input">
                    </div>

                    <button type="button" class="btn-period-search" id="periodSearchBtn">조회</button>
                </div>

                <table class="point-table">
                    <thead>
                    <tr>
                        <th>날짜</th>
                        <th>구분</th>
                        <th>주문번호</th>
                        <th>적립금액</th>
                        <th>비고</th>
                        <th>유효기간</th>
                    </tr>
                    </thead>
                    <tbody id="pointListBody">
                    <!-- JS로 동적 렌더링 -->
                    </tbody>
                </table>

                <!-- 페이지네이션 -->
                <div class="pagination" id="pagination"></div>
            </section>

        </div>
    </div>
</main>

<!-- ===== FOOTER (축약형) ===== -->
                <footer th:replace="~{fragments/footer :: footer}"></footer>
    </div>
</div>
    </div>
</div>


<!-- =========================================================
     모달 영역 (home.html과 동일한 모달 시스템 재사용)
     ========================================================= -->

<!-- 문의하기 모달 (No 6-1-3) -->
<div class="modal-overlay" id="inquiryModal">
    <div class="modal-box modal-box-small">
        <div class="modal-header modal-header-blue">
            <span class="modal-title">문의하기</span>
            <button type="button" class="modal-close" data-close="inquiryModal">&times;</button>
        </div>

        <div class="modal-body">
            <table class="modal-inquiry-table">
                <tbody>
                <tr>
                    <th>문의종류</th>
                    <td>
                        <label class="inquiry-radio"><input type="radio" name="inquiryType" value="product"> 상품</label>
                        <label class="inquiry-radio"><input type="radio" name="inquiryType" value="delivery"> 배송</label>
                        <label class="inquiry-radio"><input type="radio" name="inquiryType" value="return"> 반품/취소</label>
                        <label class="inquiry-radio"><input type="radio" name="inquiryType" value="exchange"> 교환</label>
                        <label class="inquiry-radio"><input type="radio" name="inquiryType" value="etc"> 기타</label>
                    </td>
                </tr>
                <tr>
                    <th>Email</th>
                    <td><input type="email" class="inquiry-input" id="inquiryEmail" value="chh**@gmail.com"></td>
                </tr>
                <tr>
                    <th>제목</th>
                    <td><input type="text" class="inquiry-input" id="inquiryTitle"></td>
                </tr>
                <tr>
                    <th>내용</th>
                    <td><textarea class="inquiry-textarea" id="inquiryContent"></textarea></td>
                </tr>
                </tbody>
            </table>

            <div class="modal-inquiry-btn-group">
                <button type="button" class="modal-btn-submit" id="inquirySubmitBtn">등록하기</button>
                <button type="button" class="modal-btn-cancel" data-close="inquiryModal">취소</button>
            </div>
        </div>
    </div>
</div>


<script type="module" th:src="@{/js/my/point.js}"></script>

</body>
</html>
