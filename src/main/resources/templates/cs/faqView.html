<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">

  <title>FAQ 상세 - 케이마켓 고객센터</title>

  <link rel="stylesheet" th:href="@{/css/common.css}">
  <link rel="stylesheet" th:href="@{/css/index.css}">

  <link rel="stylesheet"
        th:href="@{/css/cs/cs-common.css}">

  <link rel="stylesheet"
        th:href="@{/css/cs/faqView.css}">
</head>

<body>

<div th:replace="~{fragments/header :: header}"></div>

<div class="page-wrapper">
  <aside th:replace="~{fragments/aside :: aside}"></aside>
  <div class="main-content">
    <div id="wrapper">

  <!-- 현재 페이지 경로 -->
  <div class="breadcrumb">
    <a th:href="@{/}">
      홈
    </a>

    <span>&gt;</span>

    <a th:href="@{/cs/index}">
      고객센터
    </a>

    <span>&gt;</span>

    <a th:href="@{/cs/faqList}">
      자주하는 질문
    </a>

    <span>&gt;</span>

    <span>상세보기</span>
  </div>

  <!-- 메인 영역 -->
  <main>
    <div class="cs-flex">

      <!-- FAQ 사이드 메뉴 -->
      <aside class="cs-aside">
        <h2>자주하는 질문</h2>

        <ul>
          <li>
            <a th:href="@{/cs/faqList}"
               th:classappend="${#strings.isEmpty(selectedCategory1)}
                               ? ' active'
                               : ''">
              전체
            </a>
          </li>

          <li>
            <a th:href="@{/cs/faqList(category1='회원')}"
               th:classappend="${selectedCategory1 == '회원'}
                               ? ' active'
                               : ''">
              회원
            </a>
          </li>

          <li>
            <a th:href="@{/cs/faqList(category1='쿠폰 / 이벤트')}"
               th:classappend="${selectedCategory1 == '쿠폰 / 이벤트'}
                               ? ' active'
                               : ''">
              쿠폰 / 이벤트
            </a>
          </li>

          <li>
            <a th:href="@{/cs/faqList(category1='주문 / 결제')}"
               th:classappend="${selectedCategory1 == '주문 / 결제'}
                               ? ' active'
                               : ''">
              주문 / 결제
            </a>
          </li>

          <li>
            <a th:href="@{/cs/faqList(category1='배송')}"
               th:classappend="${selectedCategory1 == '배송'}
                               ? ' active'
                               : ''">
              배송
            </a>
          </li>

          <li>
            <a th:href="@{/cs/faqList(category1='취소 / 반품 / 환불')}"
               th:classappend="${selectedCategory1 == '취소 / 반품 / 환불'}
                               ? ' active'
                               : ''">
              취소 / 반품 / 환불
            </a>
          </li>

          <li>
            <a th:href="@{/cs/faqList(category1='여행 / 숙박 / 항공')}"
               th:classappend="${selectedCategory1 == '여행 / 숙박 / 항공'}
                               ? ' active'
                               : ''">
              여행 / 숙박 / 항공
            </a>
          </li>

          <li>
            <a th:href="@{/cs/faqList(category1='안전거래')}"
               th:classappend="${selectedCategory1 == '안전거래'}
                               ? ' active'
                               : ''">
              안전거래
            </a>
          </li>
        </ul>
      </aside>

      <!-- FAQ 상세 콘텐츠 -->
      <section class="cs-content">

        <!-- 콘텐츠 제목 -->
        <div class="content-heading">
          <div>
            <h2 th:text="${faq.category1}">
              FAQ
            </h2>

            <p class="desc">
              자주하는 질문 상세 내용입니다.
            </p>
          </div>

          <a th:href="@{/cs/index}"
             class="cs-home-link">
            고객센터 홈
          </a>
        </div>

        <!-- FAQ 상세 내용 -->
        <div class="view-box">
          <div class="view-title">
            <h3 th:text="|Q. [${faq.category2}] ${faq.title}|">
              질문
            </h3>
          </div>

          <div class="view-content"
               th:text="${faq.content}">
            답변
          </div>
        </div>

        <!-- 목록 버튼 -->
        <div class="btn-area">
          <a th:href="@{/cs/faqList(category1=${faq.category1})}"
             class="btn btn-gray">
            목록
          </a>
        </div>

      </section>

    </div>
  </main>
    </div>

    <footer th:replace="~{fragments/footer :: footer}"></footer>
  </div>
</div>

</body>
</html>
