<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>케이마켓 고객센터 - 문의글 작성</title>
    <link rel="stylesheet" th:href="@{/css/cs/qnaWrite.css}">
</head>
<body>
<div id="wrapper">

    <header>
        <div class="header-top">
            <a href="#">로그인</a>
            <a href="#">회원가입</a>
            <a href="#">마이페이지</a>
            <a href="#">장바구니</a>
        </div>

        <div class="logo-area">
            <a href="./index.html" class="logo-box">CI ( 로고 )</a>
        </div>
    </header>

    <div class="breadcrumb">
        홈 &gt; 문의하기
    </div>

    <main>
        <div class="cs-flex">

            <aside class="cs-aside">
                <h2>문의하기</h2>
                <ul>
                    <li><a href="#" class="active">회원</a></li>
                    <li><a href="#">쿠폰 / 이벤트</a></li>
                    <li><a href="#">주문 / 결제</a></li>
                    <li><a href="#">배송</a></li>
                    <li><a href="#">취소 / 반품 / 환불</a></li>
                    <li><a href="#">여행 / 숙박 / 항공</a></li>
                    <li><a href="#">안전거래</a></li>
                </ul>
            </aside>

            <section class="cs-content">
                <h2>회원</h2>
                <p class="desc">회원 관련 문의 내용입니다.</p>

                <form action="#" method="post" class="write-form">

                    <div class="form-row">
                        <label for="type1">문의유형</label>

                        <select id="type1" name="type1">
                            <option value="">1차 선택</option>
                            <option value="member">회원</option>
                            <option value="coupon">쿠폰 / 이벤트</option>
                            <option value="order">주문 / 결제</option>
                            <option value="delivery">배송</option>
                            <option value="cancel">취소 / 반품 / 환불</option>
                        </select>

                        <select id="type2" name="type2">
                            <option value="">2차 선택</option>
                            <option value="join">가입</option>
                            <option value="leave">탈퇴</option>
                            <option value="info">회원정보</option>
                            <option value="login">로그인</option>
                        </select>
                    </div>

                    <div class="form-row">
                        <label for="title">제목</label>
                        <input type="text" id="title" name="title" placeholder="제목을 입력하세요.">
                    </div>

                    <div class="form-row">
                        <label for="content">내용</label>
                        <textarea id="content" name="content" placeholder="내용을 입력하세요."></textarea>
                    </div>

                    <div class="btn-area">
                        <a href="./qna-list.html" class="btn btn-gray">취소하기</a>
                        <button type="submit" class="btn btn-blue">등록하기</button>
                    </div>

                </form>
            </section>

        </div>
    </main>

    <footer>
        <div class="footer-menu">
            <a href="#">회사소개</a>
            <a href="#">서비스이용약관</a>
            <a href="#">개인정보처리방침</a>
            <a href="#">전자금융거래약관</a>
        </div>

        <div class="footer-info">
            <div class="footer-logo">이미지</div>

            <div class="company-info">
                <strong>(주)케이마켓</strong><br>
                부산광역시 부산진구 중앙대로 300<br>
                대표이사 : 홍길동<br>
                사업자등록번호 : 123-45-12345
            </div>

            <div class="customer-info">
                <h3>고객센터</h3>
                Tel : 1234-5678<br>
                평일 09:00 ~ 18:00
            </div>
        </div>
    </footer>
</div>
</body>
</html>
