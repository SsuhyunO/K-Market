<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">

  <title th:text="${notice != null and !#strings.isEmpty(notice.title)
            ? notice.title + ' - 케이마켓 고객센터'
            : '공지사항 상세 - 케이마켓 고객센터'}">
    공지사항 상세 - 케이마켓 고객센터
  </title>

  <link rel="stylesheet" th:href="@{/css/common.css}">
  <link rel="stylesheet" th:href="@{/css/index.css}">

  <link rel="stylesheet"
        th:href="@{/css/cs/cs-common.css}">

  <link rel="stylesheet"
        th:href="@{/css/cs/noticeView.css}">
</head>

<body>

<div th:replace="~{fragments/header :: header}"></div>

<div class="page-wrapper">
  <aside th:replace="~{fragments/aside :: aside}"></aside>
  <div class="main-content">
    <div id="wrapper">

  <!-- 현재 위치 -->
  <div class="breadcrumb">
    <a th:href="@{/}">
      홈
    </a>

    <span>&gt;</span>

    <a th:href="@{/cs/index}">
      고객센터
    </a>

    <span>&gt;</span>

    <a th:href="@{/cs/noticeList}">
      공지사항
    </a>

    <span>&gt;</span>

    <span>상세보기</span>
  </div>

  <!-- 메인 영역 -->
  <main>
    <div class="cs-flex">

      <!-- 공지사항 유형 메뉴 -->
      <aside class="cs-aside">
        <h2>공지사항</h2>

        <ul>
          <li>
            <a th:href="@{/cs/noticeList}"
               th:classappend="${notice == null
                               or #strings.isEmpty(notice.type)}
                               ? ' active'
                               : ''">
              전체
            </a>
          </li>

          <li>
            <a th:href="@{/cs/noticeList(type='고객서비스')}"
               th:classappend="${notice != null
                               and notice.type == '고객서비스'}
                               ? ' active'
                               : ''">
              고객서비스
            </a>
          </li>

          <li>
            <a th:href="@{/cs/noticeList(type='안전거래')}"
               th:classappend="${notice != null
                               and notice.type == '안전거래'}
                               ? ' active'
                               : ''">
              안전거래
            </a>
          </li>

          <li>
            <a th:href="@{/cs/noticeList(type='위해상품')}"
               th:classappend="${notice != null
                               and notice.type == '위해상품'}
                               ? ' active'
                               : ''">
              위해상품
            </a>
          </li>

          <li>
            <a th:href="@{/cs/noticeList(type='이벤트 당첨')}"
               th:classappend="${notice != null
                               and notice.type == '이벤트 당첨'}
                               ? ' active'
                               : ''">
              이벤트 당첨
            </a>
          </li>
        </ul>
      </aside>

      <!-- 공지사항 상세 내용 -->
      <section class="cs-content">

        <!-- 제목 영역 -->
        <div class="content-heading">
          <div>
            <h2 th:text="${notice != null
                                and !#strings.isEmpty(notice.type)
                                ? notice.type
                                : '공지사항'}">
              공지사항
            </h2>

            <p class="desc">
              케이마켓의 공지사항 상세 내용입니다.
            </p>
          </div>

          <a th:href="@{/cs/index}"
             class="cs-home-link">
            고객센터 홈
          </a>
        </div>

        <!-- 공지사항 상세보기 -->
        <div class="view-box">

          <!-- 공지사항 제목 -->
          <div class="view-title">
            <h3 th:text="${notice != null
                                ? (!#strings.isEmpty(notice.type)
                                    ? '[' + notice.type + '] '
                                        + notice.title
                                    : notice.title)
                                : '공지사항 제목'}">
              공지사항 제목
            </h3>
          </div>

          <!-- 공지사항 작성 정보 -->
          <div class="view-meta">
                        <span>
                            작성일
                        </span>

            <span th:text="${notice != null
                                and notice.createdAt != null
                                ? #temporals.format(
                                    notice.createdAt,
                                    'yyyy.MM.dd'
                                  )
                                : '-'}">
                            -
                        </span>
          </div>

          <!-- 공지사항 본문 -->
          <div class="view-content"
               th:text="${notice != null
                             ? notice.content
                             : '공지사항을 찾을 수 없습니다.'}">
            공지사항 내용
          </div>

        </div>

        <!-- 목록 버튼 -->
        <div class="btn-area">
          <a th:if="${notice != null
                            and !#strings.isEmpty(notice.type)}"
             th:href="@{/cs/noticeList(type=${notice.type})}"
             class="btn btn-gray">
            목록
          </a>

          <a th:unless="${notice != null
                            and !#strings.isEmpty(notice.type)}"
             th:href="@{/cs/noticeList}"
             class="btn btn-gray">
            목록
          </a>
        </div>

      </section>
    </div>
  </main>
    </div>

    <footer th:replace="~{fragments/footer :: footer}"></footer>
  </div>
</div>

</body>
</html>
