<!DOCTYPE html><html lang="ko" xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"><title>공지사항 상세 - 케이마켓 고객센터</title>
<link rel="stylesheet" th:href="@{/css/cs/cs-common.css}">
<link rel="stylesheet" th:href="@{/css/cs/noticeView.css}"></head><body><div id="wrapper">
<header>
  <div class="header-top">
    <a th:href="@{/member/login}">로그인</a>
    <a th:href="@{/member/register}">회원가입</a>
    <a th:href="@{/my/home}">마이페이지</a>
    <a th:href="@{/cart}">장바구니</a>
  </div>
  <div class="logo-area"><a th:href="@{/}" class="logo-box">CI ( 로고 )</a></div>
</header>

<div class="breadcrumb"><a th:href="@{/}">홈</a><span>&gt;</span><a th:href="@{/cs/index}">고객센터</a><span>&gt;</span><a th:href="@{/cs/noticeList}">공지사항</a><span>&gt;</span><span>상세보기</span></div>
<main><div class="cs-flex">
<aside class="cs-aside"><h2>공지사항</h2><ul>
<li><a th:href="@{/cs/noticeList}" class="active">전체</a></li>
<li><a th:href="@{/cs/noticeList}">고객서비스</a></li>
<li><a th:href="@{/cs/noticeList}">안전거래</a></li>
<li><a th:href="@{/cs/noticeList}">위해상품</a></li>
<li><a th:href="@{/cs/noticeList}">이벤트당첨</a></li>
</ul></aside>
<section class="cs-content">
<div class="content-heading"><div><h2 th:text="${notice.type}">공지사항</h2><p class="desc">공지사항 상세 내용입니다.</p></div><a th:href="@{/cs/index}" class="cs-home-link">고객센터 홈</a></div>
<div class="view-box"><div class="view-title"><h3 th:text="|[${notice.type}] ${notice.title}|">제목</h3><span th:text="${notice.createdAt!=null?#temporals.format(notice.createdAt,'yyyy.MM.dd'):'-'}">-</span></div><div class="view-content" th:text="${notice.content}">내용</div></div>
<div class="btn-area"><a th:href="@{/cs/noticeList}" class="btn btn-gray">목록</a></div>
</section></div></main>
<footer>
  <div class="footer-menu">
    <a th:href="@{/company/index}">회사소개</a>
    <a th:href="@{/policy/terms}">서비스이용약관</a>
    <a th:href="@{/policy/privacy}">개인정보처리방침</a>
    <a th:href="@{/policy/finance}">전자금융거래약관</a>
  </div>
  <div class="footer-info">
    <div class="footer-logo">이미지</div>
    <div class="company-info">
      <strong>(주)케이마켓</strong><br>
      부산광역시 부산진구 중앙대로 300<br>
      대표이사 : 홍길동<br>
      사업자등록번호 : 123-45-12345
    </div>
    <div class="customer-info"><h3>고객센터</h3>Tel : 1234-5678<br>평일 09:00 ~ 18:00</div>
  </div>
</footer>
</div></body></html>
