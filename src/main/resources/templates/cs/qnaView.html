<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">

  <title th:text="${qna != null and !#strings.isEmpty(qna.title)
            ? qna.title + ' - 케이마켓 고객센터'
            : '문의글 상세 - 케이마켓 고객센터'}">
    문의글 상세 - 케이마켓 고객센터
  </title>

  <link rel="stylesheet" th:href="@{/css/common.css}">
  <link rel="stylesheet" th:href="@{/css/index.css}">

  <link rel="stylesheet"
        th:href="@{/css/cs/cs-common.css}">

  <link rel="stylesheet"
        th:href="@{/css/cs/qnaView.css}">
</head>

<body>

<div th:replace="~{fragments/header :: header}"></div>

<div class="page-wrapper">
  <aside th:replace="~{fragments/aside :: aside}"></aside>
  <div class="main-content">
    <div id="wrapper">

  <!-- 현재 위치 -->
  <div class="breadcrumb">
    <a th:href="@{/}">
      홈
    </a>

    <span>&gt;</span>

    <a th:href="@{/cs/index}">
      고객센터
    </a>

    <span>&gt;</span>

    <a th:href="@{/cs/qnaList}">
      문의하기
    </a>

    <span>&gt;</span>

    <span>상세보기</span>
  </div>

  <!-- 메인 영역 -->
  <main>
    <div class="cs-flex">

      <!-- 문의 유형 메뉴 -->
      <aside class="cs-aside">
        <h2>문의하기</h2>

        <ul>
          <li>
            <a th:href="@{/cs/qnaList}"
               th:classappend="${qna == null
                               or #strings.isEmpty(qna.category1)}
                               ? ' active'
                               : ''">
              전체
            </a>
          </li>

          <li>
            <a th:href="@{/cs/qnaList(category1='회원')}"
               th:classappend="${qna != null
                               and qna.category1 == '회원'}
                               ? ' active'
                               : ''">
              회원
            </a>
          </li>

          <li>
            <a th:href="@{/cs/qnaList(category1='상품')}"
               th:classappend="${qna != null
                               and qna.category1 == '상품'}
                               ? ' active'
                               : ''">
              상품
            </a>
          </li>

          <li>
            <a th:href="@{/cs/qnaList(category1='주문')}"
               th:classappend="${qna != null
                               and qna.category1 == '주문'}
                               ? ' active'
                               : ''">
              주문
            </a>
          </li>

          <li>
            <a th:href="@{/cs/qnaList(category1='결제')}"
               th:classappend="${qna != null
                               and qna.category1 == '결제'}
                               ? ' active'
                               : ''">
              결제
            </a>
          </li>

          <li>
            <a th:href="@{/cs/qnaList(category1='배송')}"
               th:classappend="${qna != null
                               and qna.category1 == '배송'}
                               ? ' active'
                               : ''">
              배송
            </a>
          </li>

          <li>
            <a th:href="@{/cs/qnaList(category1='취소·반품·교환')}"
               th:classappend="${qna != null
                               and qna.category1 == '취소·반품·교환'}
                               ? ' active'
                               : ''">
              취소·반품·교환
            </a>
          </li>

          <li>
            <a th:href="@{/cs/qnaList(category1='쿠폰·혜택')}"
               th:classappend="${qna != null
                               and qna.category1 == '쿠폰·혜택'}
                               ? ' active'
                               : ''">
              쿠폰·혜택
            </a>
          </li>
        </ul>
      </aside>

      <!-- 문의 상세 콘텐츠 -->
      <section class="cs-content">

        <!-- 제목 영역 -->
        <div class="content-heading">
          <div>
            <h2 th:text="${qna != null
                                and !#strings.isEmpty(qna.category1)
                                ? qna.category1
                                : '문의하기'}">
              문의하기
            </h2>

            <p class="desc">
              문의글 상세 내용입니다.
            </p>
          </div>

          <a th:href="@{/cs/index}"
             class="cs-home-link">
            고객센터 홈
          </a>
        </div>

        <!-- 문의 상세보기 -->
        <div class="view-box">

          <!-- 문의 제목 -->
          <div class="view-title">
            <h3 th:text="${qna != null
                                ? (!#strings.isEmpty(qna.category2)
                                    ? '[' + qna.category2 + '] ' + qna.title
                                    : qna.title)
                                : '문의글 제목'}">
              문의글 제목
            </h3>

            <span class="status"
                  th:classappend="${qna != null and qna.answered}
                                  ? ' answered'
                                  : ' waiting'"
                  th:text="${qna != null
                                  and !#strings.isEmpty(qna.status)
                                  ? qna.status
                                  : qna != null and qna.answered
                                      ? '답변완료'
                                      : '검토중'}">
                            검토중
                        </span>
          </div>

          <!-- 문의 작성 정보 -->
          <div class="view-meta">
                        <span>
                            작성자
                            <strong th:text="${qna != null
                                    and !#strings.isEmpty(qna.maskedMemberUid)
                                    ? qna.maskedMemberUid
                                    : '-'}">
                                -
                            </strong>
                        </span>

            <span>
                            작성일
                            <strong th:text="${qna != null
                                    and qna.createdAt != null
                                    ? #temporals.format(
                                        qna.createdAt,
                                        'yyyy.MM.dd HH:mm'
                                      )
                                    : '-'}">
                                -
                            </strong>
                        </span>
          </div>

          <!-- 문의 본문 -->
          <div class="view-content"
               th:text="${qna != null
                             ? qna.content
                             : '문의글을 찾을 수 없습니다.'}">
            문의 내용
          </div>

          <!-- 관리자 답변 -->
          <div class="answer-box"
               th:if="${qna != null and qna.answered}">

            <div class="answer-head">
              <h3>고객센터 답변</h3>

              <span th:text="${qna.answeredAt != null
                                ? #temporals.format(
                                    qna.answeredAt,
                                    'yyyy.MM.dd HH:mm'
                                  )
                                : '-'}">
                                -
                            </span>
            </div>

            <div class="answer-content"
                 th:text="${!#strings.isEmpty(qna.answer)
                                 ? qna.answer
                                 : '등록된 답변 내용이 없습니다.'}">
              답변 내용
            </div>
          </div>

          <!-- 답변 대기 -->
          <div class="answer-waiting"
               th:if="${qna != null and !qna.answered}">

            <strong>
              답변을 준비 중입니다.
            </strong>

            <p>
              담당자가 확인 후 답변드리겠습니다.
            </p>
          </div>

        </div>

        <!-- 목록 버튼 -->
        <div class="btn-area">
          <a th:if="${qna != null
                            and !#strings.isEmpty(qna.category1)}"
             th:href="@{/cs/qnaList(
                            category1=${qna.category1}
                       )}"
             class="btn btn-gray">
            목록
          </a>

          <a th:unless="${qna != null
                            and !#strings.isEmpty(qna.category1)}"
             th:href="@{/cs/qnaList}"
             class="btn btn-gray">
            목록
          </a>
        </div>

      </section>
    </div>
  </main>
    </div>

    <footer th:replace="~{fragments/footer :: footer}"></footer>
  </div>
</div>

</body>
</html>
