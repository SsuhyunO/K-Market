<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">

  <title>케이마켓 고객센터</title>

  <link rel="stylesheet" th:href="@{/css/common.css}">
  <link rel="stylesheet" th:href="@{/css/index.css}">

  <link rel="stylesheet"
        th:href="@{/css/cs/cs-common.css}">

  <link rel="stylesheet"
        th:href="@{/css/cs/index.css}">
</head>

<body>

<div th:replace="~{fragments/header :: header}"></div>

<div class="page-wrapper">
  <aside th:replace="~{fragments/aside :: aside}"></aside>
  <div class="main-content">
    <div id="wrapper">

  <!-- 고객센터 메인 -->
  <main class="cs-index">

    <!-- 고객센터 제목 -->
    <h1 class="cs-index-title">
      <span>케이마켓</span>이 도와드릴게요!
    </h1>

    <!-- 공지사항 -->
    <section class="cs-section">

      <div class="cs-section-title">
        <h3>공지사항</h3>

        <a th:href="@{/cs/noticeList}"
           class="more">
          전체보기
        </a>
      </div>

      <ul class="notice-preview">

        <li th:each="notice : ${noticeList}">

          <a th:href="@{/cs/noticeView(
                                        boardNo=${notice.boardNo}
                                   )}"
             th:text="|[${notice.type}] ${notice.title}|">
            공지사항 제목
          </a>

          <span class="date"
                th:text="${notice.createdAt != null
                              ? #temporals.format(
                                  notice.createdAt,
                                  'yy.MM.dd'
                              )
                              : '-'}">
                        -
                    </span>

        </li>

        <li class="preview-empty"
            th:if="${noticeList == null
                        or #lists.isEmpty(noticeList)}">
          등록된 공지사항이 없습니다.
        </li>

      </ul>

    </section>

    <!-- 자주하는 질문 -->
    <section class="cs-section">

      <div class="cs-section-title">
        <h3>자주하는 질문</h3>

        <a th:href="@{/cs/faqList}"
           class="more">
          전체보기
        </a>
      </div>

      <div class="faq-icons">

        <a th:href="@{/cs/faqList(category1='회원')}"
           class="faq-icon">

          <div class="faq-img"
               aria-hidden="true">
            👤
          </div>

          <p>회원</p>

        </a>

        <a th:href="@{/cs/faqList(category1='상품')}"
           class="faq-icon">

          <div class="faq-img"
               aria-hidden="true">
            📦
          </div>

          <p>상품</p>

        </a>

        <a th:href="@{/cs/faqList(category1='주문')}"
           class="faq-icon">

          <div class="faq-img"
               aria-hidden="true">
            🛒
          </div>

          <p>주문</p>

        </a>

        <a th:href="@{/cs/faqList(category1='결제')}"
           class="faq-icon">

          <div class="faq-img"
               aria-hidden="true">
            💳
          </div>

          <p>결제</p>

        </a>

        <a th:href="@{/cs/faqList(category1='배송')}"
           class="faq-icon">

          <div class="faq-img"
               aria-hidden="true">
            🚚
          </div>

          <p>배송</p>

        </a>

        <a th:href="@{/cs/faqList(
                                    category1='취소·반품·교환'
                               )}"
           class="faq-icon">

          <div class="faq-img"
               aria-hidden="true">
            ↩
          </div>

          <p>취소·반품</p>

        </a>

        <a th:href="@{/cs/faqList(
                                    category1='쿠폰·혜택'
                               )}"
           class="faq-icon">

          <div class="faq-img"
               aria-hidden="true">
            🎟
          </div>

          <p>쿠폰·혜택</p>

        </a>

      </div>

    </section>

    <!-- 문의하기 -->
    <section class="cs-section">

      <div class="cs-section-title">
        <h3>문의하기</h3>

        <a th:href="@{/cs/qnaList}"
           class="more">
          전체보기
        </a>
      </div>

      <ul class="qna-preview">

        <li th:each="qna : ${qnaList}">

          <a th:href="@{/cs/qnaView(
                                        boardNo=${qna.boardNo}
                                   )}"
             th:text="|[${qna.category1}] ${qna.title}|">
            문의 제목
          </a>

          <span class="writer"
                th:text="${qna.maskedMemberUid != null
                              and !qna.maskedMemberUid.isBlank()
                              ? qna.maskedMemberUid
                              : '-'}">
                        -
                    </span>

          <span class="date"
                th:text="${qna.createdAt != null
                              ? #temporals.format(
                                  qna.createdAt,
                                  'yy.MM.dd'
                              )
                              : '-'}">
                        -
                    </span>

        </li>

        <li class="preview-empty"
            th:if="${qnaList == null
                        or #lists.isEmpty(qnaList)}">
          등록된 문의글이 없습니다.
        </li>

      </ul>

      <div class="qna-write-area">
        <a th:href="@{/cs/qnaWrite}"
           class="qna-write-btn">
          문의글 작성 &gt;
        </a>
      </div>

    </section>

    <!-- 상담 안내 -->
    <section class="cs-section">

      <div class="cs-section-title">
        <h3>1:1 상담안내</h3>
      </div>

      <div class="cs-info-box-wrap">

        <div class="cs-info-box">

          <h4>이용안내</h4>

          <div class="cs-info-content">
            <p>일반회원 / 비회원</p>

            <strong>1566-0001</strong>

            <span>평일 09:00 ~ 18:00</span>
          </div>

        </div>

        <div class="cs-info-box">

          <h4>판매상담 이용안내</h4>

          <div class="cs-info-content">
            <p>판매고객</p>

            <strong>1566-5700</strong>

            <span>평일 09:00 ~ 18:00</span>
          </div>

        </div>

      </div>

    </section>

  </main>
    </div>

    <footer th:replace="~{fragments/footer :: footer}"></footer>
  </div>
</div>

</body>
</html>
