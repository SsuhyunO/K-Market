<!DOCTYPE html>
<html lang="en">
<head>
    <title>KMarket 상품목록</title>
    <th:block th:replace="~{admin/fragments/head::head}"></th:block>
    <link rel="stylesheet" th:href="@{/css/admin/global/management-table-form.css}">
    <link rel="stylesheet" th:href="@{/css/admin/global/action-bar.css}">
    <link rel="stylesheet" th:href="@{/css/admin/global/modal-form.css}">
    <link rel="stylesheet" th:href="@{/css/admin/global/search-form.css}">
    <link rel="stylesheet" th:href="@{/css/admin/product/list.css}">
    <script type="module" th:src="@{/js/admin/product/list/list.js}"></script>
</head>
<body>
<header th:replace="~{admin/fragments/header::header}"></header>
<div class="admin-layout">
    <aside th:replace="~{admin/fragments/aside::aside}"></aside>

    <main id="admin-main">
        <div th:replace="~{admin/fragments/page-header::page-header}"></div>

        <section th:replace="~{admin/fragments/dash-section::dash-section(null, null, null, ~{::main_content})}">
            <th:block th:fragment="main_content">
                <p class="product-list-message"
                   th:if="${productMessage != null}"
                   th:text="${productMessage}">상품 처리가 완료되었습니다.</p>
                <p class="product-list-error"
                   th:if="${productListErrorMessage != null}"
                   th:text="${productListErrorMessage}">상품 처리에 실패했습니다.</p>

                <form class="search-form product-search-form" name="searchForm"
                      th:action="@{/admin/product/list}" method="get">
                    <label class="search-form-label" for="search-type">검색조건</label>
                    <select id="search-type" name="searchType" aria-label="검색조건">
                        <option value="NAME" th:selected="${param.type == null or param.type[0] == 'NAME'}">상품명</option>
                        <option value="CODE" th:selected="${param.type != null and param.type[0] == 'CODE'}">상품코드</option>
                        <option th:if="${session.loginMemberType eq 'ADMIN'}" value="SELLER"
                                th:selected="${param.type != null and param.type[0] == 'SELLER'}">판매자</option>
                    </select>
                    <input type="text" name="keyword" th:value="${param.keyword}" placeholder="검색어입력" aria-label="검색어">
                    <label class="product-uncategorized-filter">
                        <input type="checkbox" name="uncategorizedOnly" value="true"
                               th:checked="${param.uncategorizedOnly != null and param.uncategorizedOnly[0] == 'true'}">
                        <span>미분류 상품</span>
                    </label>
                    <button type="submit">검색</button>
                </form>

                <form th:replace="~{admin/fragments/management-table-form::management-table-form(
                    @{/admin/product/remove},
                    ~{::table_content},
                    ~{::product_table_footer},
                    'productNo')}">
                    <th:block th:fragment="table_content">
                        <tr>
                            <th><label><input type="checkbox" id="select-all"></label></th>
                            <th>사진</th>
                            <th>상품코드</th>
                            <th>분류</th>
                            <th>상품명</th>
                            <th>판매가격</th>
                            <th>할인율</th>
                            <th>포인트</th>
                            <th>재고</th>
                            <th>판매자</th>
                            <th>조회</th>
                            <th>관리</th>
                        </tr>
                    </th:block>

                    <th:block th:fragment="product_table_footer">
                        <button type="submit"
                                data-management-action="bulk-submit"
                                data-empty-message="삭제할 상품을 선택해주세요."
                                data-confirm-message="선택한 상품을 삭제하시겠습니까?"
                                data-action-variant="secondary">선택삭제</button>
                        <nav class="admin-pagination"></nav>
                        <button type="button"
                                th:onclick="|location.href='@{/admin/product/register}'|"
                                data-action-variant="primary">상품등록</button>
                    </th:block>
                </form>

                <div th:replace="~{admin/fragments/modal::modal('product-detail-modal', '상품상세', ~{::product_detail_modal_content})}">
                    <th:block th:fragment="product_detail_modal_content">
                        <div class="product-detail-modal">
                            <div class="product-detail-summary">
                                <div class="product-detail-media">
                                    <span class="product-detail-thumb" aria-hidden="true"></span>
                                </div>
                                <dl class="product-detail-list">
                                    <div>
                                        <dt>상품코드</dt>
                                        <dd id="product-detail-product-code"></dd>
                                    </div>
                                    <div>
                                        <dt>상품명</dt>
                                        <dd id="product-detail-product-name"></dd>
                                    </div>
                                    <div>
                                        <dt>판매자</dt>
                                        <dd id="product-detail-seller"></dd>
                                    </div>
                                    <div>
                                        <dt>조회</dt>
                                        <dd id="product-detail-view-count"></dd>
                                    </div>
                                </dl>
                            </div>

                            <section class="product-detail-section">
                                <h4>상품분류</h4>
                                <dl class="product-detail-list">
                                    <div>
                                        <dt>1차 분류</dt>
                                        <dd id="product-detail-root-category"></dd>
                                    </div>
                                    <div>
                                        <dt>2차 분류</dt>
                                        <dd id="product-detail-sub-category"></dd>
                                    </div>
                                </dl>
                            </section>

                            <section class="product-detail-section">
                                <h4>기본정보</h4>
                                <dl class="product-detail-list">
                                    <div>
                                        <dt>기본설명</dt>
                                        <dd id="product-detail-description"></dd>
                                    </div>
                                    <div>
                                        <dt>제조사</dt>
                                        <dd id="product-detail-maker"></dd>
                                    </div>
                                    <div>
                                        <dt>상품금액</dt>
                                        <dd id="product-detail-price"></dd>
                                    </div>
                                    <div>
                                        <dt>할인율</dt>
                                        <dd id="product-detail-discount"></dd>
                                    </div>
                                    <div>
                                        <dt>포인트</dt>
                                        <dd id="product-detail-point"></dd>
                                    </div>
                                    <div>
                                        <dt>재고수량</dt>
                                        <dd id="product-detail-stock"></dd>
                                    </div>
                                    <div>
                                        <dt>배송비</dt>
                                        <dd id="product-detail-delivery-fee"></dd>
                                    </div>
                                </dl>
                            </section>

                            <section class="product-detail-section">
                                <h4>상품 이미지</h4>
                                <div id="product-detail-images" class="product-detail-image-grid"></div>
                            </section>

                            <section class="product-detail-section">
                                <h4>상품 선택정보</h4>
                                <div id="product-detail-option-groups" class="product-detail-stack"></div>
                                <div id="product-detail-variants" class="product-detail-table-wrap"></div>
                            </section>

                            <section class="product-detail-section">
                                <h4>상품정보 제공고시</h4>
                                <dl id="product-detail-notice-values" class="product-detail-list"></dl>
                            </section>
                        </div>
                        <div class="modal-form-actions">
                            <button type="button" data-modal-close>닫기</button>
                        </div>
                    </th:block>
                </div>
            </th:block>
        </section>
    </main>
</div>

<footer th:replace="~{admin/fragments/footer::footer}"></footer>
</body>
</html>
