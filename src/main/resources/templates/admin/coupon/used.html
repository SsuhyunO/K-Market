<!DOCTYPE html>
<html lang="en">
<head>
    <title>KMarket 쿠폰발급현황</title>
    <th:block th:replace="~{admin/fragments/head::head}"></th:block>
    <link rel="stylesheet" th:href="@{/css/admin/global/management-table-form.css}">
    <link rel="stylesheet" th:href="@{/css/admin/global/action-bar.css}">
    <link rel="stylesheet" th:href="@{/css/admin/global/modal-form.css}">
    <link rel="stylesheet" th:href="@{/css/admin/global/search-form.css}">
    <link rel="stylesheet" th:href="@{/css/admin/global/section-table.css}">
    <link rel="stylesheet" th:href="@{/css/admin/coupon/coupon.css}">
    <script type="module" th:src="@{/js/admin/coupon/used.js}"></script>
    <script th:inline="javascript">
        const CONTEXT_PATH = /*[[@{/}]]*/ '';
    </script>
</head>
<body class="coupon-issued-page">
<header th:replace="~{admin/fragments/header::header}"></header>
<div class="admin-layout">
    <aside th:replace="~{admin/fragments/aside::aside}"></aside>

    <main id="admin-main">
        <div th:replace="~{admin/fragments/page-header::page-header}"></div>

        <section th:replace="~{admin/fragments/dash-section::dash-section(null, null, null, ~{::main_content})}">
            <th:block th:fragment="main_content">
                <th:block th:replace="~{admin/fragments/search-form::search-form('/admin/coupon/used',~{::options})}">
                    <th:block th:fragment="options">
                        <option value="발급번호" th:selected="${searchType == '발급번호'}">발급번호</option>
                        <option value="쿠폰번호" th:selected="${searchType == '쿠폰번호'}">쿠폰번호</option>
                        <option value="쿠폰명" th:selected="${searchType == '쿠폰명'}">쿠폰명</option>
                        <option value="사용자" th:selected="${searchType == '사용자'}">사용자</option>
                    </th:block>
                </th:block>

                <div th:replace="~{admin/fragments/management-table-form::management-table(~{::table_content})}">
                    <th:block th:fragment="table_content">
                        <tr>
                            <th>발급번호</th>
                            <th>쿠폰번호</th>
                            <th>쿠폰명</th>
                            <th>혜택</th>
                            <th>사용자</th>
                            <th>상태</th>
                            <th>발급시간</th>
                            <th>사용일</th>
                            <th>관리</th>
                        </tr>
                        <tr th:each="issue : ${issueList}"
                            th:with="statusDisplay=${
                                        issue.status == 0 ? '미사용' :
                                        (issue.status == 1 ? '사용완료' :
                                        (issue.status == 2 ? '기간만료' :
                                        (issue.status == 3 ? '중단' : issue.status)))
                                     },
                                     statusClass=${
                                        issue.status == 0 ? 'ready' :
                                        (issue.status == 1 ? 'used' :
                                        (issue.status == 2 ? 'expired' : 'disabled'))
                                     },
                                     couponTypeDisplay=${
                                        issue.couponType == 'PRODUCT' ? '개별상품 할인' :
                                        (issue.couponType == 'ORDER' ? '주문상품 할인' :
                                        (issue.couponType == 'DELIVERY' ? '배송비 무료' : issue.couponType))
                                     },
                                     benefitDisplay=${
                                        issue.benefit == '1000' ? '1,000 할인' :
                                        (issue.benefit == '2000' ? '2,000 할인' :
                                        (issue.benefit == '3000' ? '3,000 할인' :
                                        (issue.benefit == '4000' ? '4,000 할인' :
                                        (issue.benefit == '5000' ? '5,000 할인' :
                                        (issue.benefit == '10' ? '10% 할인' :
                                        (issue.benefit == '20' ? '20% 할인' :
                                        (issue.benefit == '30' ? '30% 할인' :
                                        (issue.benefit == '40' ? '40% 할인' :
                                        (issue.benefit == '50' ? '50% 할인' :
                                        (issue.benefit == 'DELIVERY_FREE' ? '배송비 무료' : issue.benefit)
                                        )))))))))
                                     },
                                     usedAtDisplay=${issue.status == 1 ? issue.updatedAt : '-'},
                                     issuerDisplay=${issue.companyName != null ? issue.companyName : '최고관리자'},
                                     issuerBadge=${issue.sellerStatus == 'SUSPENDED' ? ' (정지)' : ''},
                                     memberDisplay=${issue.memberStatus == 'WITHDRAWN' ? issue.memberUid + ' (탈퇴)' : issue.memberUid}"
                            th:attr="data-issue-no=${issue.issueNo},
                                     data-coupon-no=${issue.couponNo},
                                     data-coupon-type=${couponTypeDisplay},
                                     data-coupon-name=${issue.couponName},
                                     data-benefit=${benefitDisplay},
                                     data-period=${issue.startDate + ' ~ ' + issue.expireDate},
                                     data-used-at=${usedAtDisplay},
                                     data-status=${statusDisplay},
                                     data-issuer=${issuerDisplay + issuerBadge},
                                     data-description=${issue.notice},
                                     data-member-id=${memberDisplay}">

                            <td>
                                <button class="coupon-link-button" type="button" data-coupon-issued-detail-button
                                        th:text="${issue.issueNo}"></button>
                            </td>
                            <td th:text="${issue.couponNo}"></td>
                            <td th:text="${issue.couponName}"></td>
                            <td th:text="${benefitDisplay}"></td>
                            <td>
                                <span th:text="${memberDisplay}"></span>
                            </td>
                            <td>
                                <span class="coupon-status" th:classappend="${statusClass}" th:text="${statusDisplay}"></span>
                            </td>
                            <td th:text="${issue.createdAt}"></td>
                            <td th:text="${usedAtDisplay}"></td>
                            <td>
                                <button class="coupon-action-button" type="button" data-issued-coupon-stop-button
                                        th:attr="data-issue-no=${issue.issueNo}"
                                        th:disabled="${issue.status != 0}">중단</button>
                            </td>
                        </tr>
                    </th:block>
                </div>

                <div th:replace="~{admin/fragments/action-bar::action-bar(~{::coupon_issued_table_footer})}">
                    <th:block th:fragment="coupon_issued_table_footer">
                        <div style="flex: 1; display: flex; justify-content: center;">
                            <nav th:replace="~{admin/fragments/admin-pagination::admin-pagination(
                                    pageInfo=${pageInfo},
                                    baseUrl='/admin/coupon/used')}"></nav>
                        </div>
                    </th:block>
                </div>

                <div th:replace="~{admin/fragments/modal::modal('coupon-issued-detail-modal', '쿠폰정보', ~{::coupon_issued_detail_modal_content})}">
                    <th:block th:fragment="coupon_issued_detail_modal_content">
                        <div class="coupon-modal-detail">
                            <table class="section-table">
                                <tr>
                                    <th>쿠폰번호</th>
                                    <td id="coupon-issued-detail-coupon-no"></td>
                                    <th>발급처</th>
                                    <td id="coupon-issued-detail-issuer"></td>
                                </tr>
                                <tr>
                                    <th>발급번호</th>
                                    <td id="coupon-issued-detail-issue-no"></td>
                                    <th>사용여부</th>
                                    <td id="coupon-issued-detail-status"></td>
                                </tr>
                                <tr>
                                    <th>쿠폰종류</th>
                                    <td id="coupon-issued-detail-coupon-type"></td>
                                    <th>발급대상</th>
                                    <td id="coupon-issued-detail-member-id"></td>
                                </tr>
                                <tr>
                                    <th>쿠폰명</th>
                                    <td colspan="3" id="coupon-issued-detail-coupon-name"></td>
                                </tr>
                                <tr>
                                    <th>혜택</th>
                                    <td colspan="3" id="coupon-issued-detail-benefit"></td>
                                </tr>
                                <tr>
                                    <th>사용기간</th>
                                    <td colspan="3" id="coupon-issued-detail-period"></td>
                                </tr>
                                <tr>
                                    <th>사용일</th>
                                    <td colspan="3" id="coupon-issued-detail-used-at"></td>
                                </tr>
                                <tr>
                                    <th>안내사항</th>
                                    <td colspan="3" id="coupon-issued-detail-description"></td>
                                </tr>
                            </table>
                            <div class="modal-form-actions">
                                <button type="button" data-modal-close>닫기</button>
                            </div>
                        </div>
                    </th:block>
                </div>
            </th:block>
        </section>
    </main>
</div>

<footer th:replace="~{admin/fragments/footer::footer}"></footer>
</body>
</html>
