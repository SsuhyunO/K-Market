<!DOCTYPE html>
<html lang="en">
<head>
    <title>KMarket 쿠폰목록</title>
    <th:block th:replace="~{admin/fragments/head::head}"></th:block>
    <link rel="stylesheet" th:href="@{/css/admin/global/management-table-form.css}">
    <link rel="stylesheet" th:href="@{/css/admin/global/action-bar.css}">
    <link rel="stylesheet" th:href="@{/css/admin/global/modal-form.css}">
    <link rel="stylesheet" th:href="@{/css/admin/global/search-form.css}">
    <link rel="stylesheet" th:href="@{/css/admin/global/section-table.css}">
    <link rel="stylesheet" th:href="@{/css/admin/coupon/coupon.css}">
    <script type="module" th:src="@{/js/admin/coupon/list.js}"></script>
    <script th:inline="javascript">
        const CONTEXT_PATH = /*[[@{/}]]*/ '';
    </script>
</head>
<body class="coupon-list-page">
<header th:replace="~{admin/fragments/header::header}"></header>
<div class="admin-layout">
    <aside th:replace="~{admin/fragments/aside::aside}"></aside>

    <main id="admin-main">
        <div th:replace="~{admin/fragments/page-header::page-header}"></div>

        <section th:replace="~{admin/fragments/dash-section::dash-section(null, null, null, ~{::main_content})}">
            <th:block th:fragment="main_content">
                <th:block th:replace="~{admin/fragments/search-form::search-form('/admin/coupon/list', ~{::options})}">
                    <th:block th:fragment="options">
                        <option value="쿠폰번호" th:selected="${searchType == '쿠폰번호'}">쿠폰번호</option>
                        <option value="쿠폰명" th:selected="${searchType == '쿠폰명'}">쿠폰명</option>
                        <option value="발급자" th:selected="${searchType == '발급자'}">발급자</option>
                    </th:block>
                </th:block>

                <div th:replace="~{admin/fragments/management-table-form::management-table(~{::table_content})}">
                    <th:block th:fragment="table_content">
                        <tr>
                            <th>쿠폰번호</th>
                            <th>쿠폰종류</th>
                            <th>쿠폰명</th>
                            <th>혜택</th>
                            <th>사용기간</th>
                            <th>발급수</th>
                            <th>사용수</th>
                            <th>상태</th>
                            <th>관리</th>
                        </tr>
                        <tr th:each="coupon : ${couponList}"
                            th:with="benefitDisplay=${
                                        coupon.benefit == '1000' ? '1,000 할인' :
                                        (coupon.benefit == '2000' ? '2,000 할인' :
                                        (coupon.benefit == '3000' ? '3,000 할인' :
                                        (coupon.benefit == '4000' ? '4,000 할인' :
                                        (coupon.benefit == '5000' ? '5,000 할인' :
                                        (coupon.benefit == '10' ? '10% 할인' :
                                        (coupon.benefit == '20' ? '20% 할인' :
                                        (coupon.benefit == '30' ? '30% 할인' :
                                        (coupon.benefit == '40' ? '40% 할인' :
                                        (coupon.benefit == '50' ? '50% 할인' :
                                        (coupon.benefit == 'DELIVERY_FREE' ? '배송비 무료' : coupon.benefit)
                                        )))))))))
                                     },
                                     couponTypeDisplay=${
                                        coupon.couponType == 'PRODUCT' ? '개별상품 할인' :
                                        (coupon.couponType == 'ORDER' ? '주문상품 할인' :
                                        (coupon.couponType == 'DELIVERY' ? '배송비 무료' : coupon.couponType))
                                     },
                                     statusDisplay=${
                                            coupon.status == 'ACTIVE' ? '발급중' :
                                            (coupon.status == 'EXPIRED' ? '기간만료' : '강제종료')
                                        },
                                     issuerDisplay=${coupon.companyName != null ? coupon.companyName : '최고관리자'},
                                     issuerBadge=${coupon.sellerStatus == 'SUSPENDED' ? ' (정지)' : ''}"
                            th:attr="data-coupon-no=${coupon.couponNo},
                                     data-coupon-type=${couponTypeDisplay},
                                     data-coupon-name=${coupon.name},
                                     data-benefit=${benefitDisplay},
                                     data-period=${coupon.startDate + ' ~ ' + coupon.expireDate},
                                     data-issuer=${issuerDisplay + issuerBadge},
                                     data-issue-count=${coupon.issuedCnt},
                                     data-used-count=${coupon.usedCnt},
                                     data-status=${statusDisplay},
                                     data-description=${coupon.notice}">

                            <td>
                                <button class="coupon-link-button" type="button" data-coupon-detail-button
                                        th:text="${coupon.couponNo}"></button>
                            </td>

                            <td th:text="${couponTypeDisplay}"></td>

                            <td th:text="${coupon.name}"></td>
                            <td th:text="${benefitDisplay}"></td>
                            <td th:text="${coupon.startDate + ' ~ ' + coupon.expireDate}"></td>
                            <td th:text="${coupon.issuedCnt}"></td>
                            <td th:text="${coupon.usedCnt}"></td>

                            <td>
                                <span class="coupon-status"
                                      th:classappend="${coupon.status == 'ACTIVE'} ? 'active' :
                                                        (${coupon.status == 'EXPIRED'} ? 'expired' : 'disabled')"
                                      th:text="${statusDisplay}"></span>
                            </td>

                            <td>
                                <button class="coupon-action-button" type="button" data-coupon-end-button
                                        th:if="${memberType == 'ADMIN' or (memberType == 'SELLER' and coupon.sellerUid == loginUid)}"
                                        th:disabled="${coupon.status != 'ACTIVE'}">종료</button>
                            </td>
                        </tr>
                    </th:block>
                </div>

                <div th:replace="~{admin/fragments/action-bar::action-bar(~{::coupon_table_footer})}">
                    <th:block th:fragment="coupon_table_footer">
                        <div style="flex: 1; display: flex; justify-content: center;">
                            <nav th:replace="~{admin/fragments/admin-pagination::admin-pagination(
                                    pageInfo=${pageInfo},
                                    baseUrl='/admin/coupon/list')}"></nav>
                        </div>
                        <button type="button"
                                data-modal-target="coupon-register-modal"
                                data-action-variant="primary">쿠폰등록</button>
                    </th:block>
                </div>

                <div th:replace="~{admin/fragments/modal::modal('coupon-register-modal', '쿠폰등록', ~{::coupon_register_modal_content})}">
                    <th:block th:fragment="coupon_register_modal_content">
                        <form id="coupon-register-form" th:action="@{/admin/coupon/register}" method="post" novalidate>
                            <table class="section-table coupon-modal-table">
                                <tr>
                                    <th><label for="coupon-register-issuer">발급처</label></th>
                                    <td>
                                        <input id="coupon-register-issuer" type="text" name="issuer" th:value="${companyName}">
                                    </td>
                                </tr>
                                <tr>
                                    <th><label for="coupon-register-type">쿠폰종류</label></th>
                                    <td>
                                        <!-- ADMIN: 3개 다 선택 가능 -->
                                        <select id="coupon-register-type" name="couponType" th:if="${memberType == 'ADMIN'}">
                                            <option value="">종류선택</option>
                                            <option value="PRODUCT">개별상품 할인</option>
                                            <option value="ORDER">주문상품 할인</option>
                                            <option value="DELIVERY">배송비 무료</option>
                                        </select>

                                        <!-- SELLER: 개별상품 할인만 표시, 값은 고정으로 넘어감 -->
                                        <div th:if="${memberType == 'SELLER'}">
                                            <input type="text" value="개별상품 할인" readonly>
                                            <input type="hidden" name="couponType" value="PRODUCT">
                                        </div>
                                    </td>
                                </tr>
                                <tr>
                                    <th><label for="coupon-register-name">쿠폰명</label></th>
                                    <td>
                                        <input id="coupon-register-name" type="text" name="name">
                                    </td>
                                </tr>
                                <tr>
                                    <th><label for="coupon-register-issued-cnt">총 발급수</label></th>
                                    <td>
                                        <div class="coupon-issue-count-field" style="display: flex; align-items: center; gap: 5px;">
                                            <input id="coupon-register-issued-cnt" type="number" name="issuedCnt" min="1" placeholder="예: 1000">
                                            <span>개</span>
                                        </div>
                                    </td>
                                </tr>
                                <tr>
                                    <th>혜택</th>
                                    <td>
                                        <div class="coupon-benefit-options">
                                            <label data-benefit-kind="amount"><input type="radio" name="benefit" value="1000"> 1,000 할인</label>
                                            <label data-benefit-kind="amount"><input type="radio" name="benefit" value="2000"> 2,000 할인</label>
                                            <label data-benefit-kind="amount"><input type="radio" name="benefit" value="3000"> 3,000 할인</label>
                                            <label data-benefit-kind="amount"><input type="radio" name="benefit" value="4000"> 4,000 할인</label>
                                            <label data-benefit-kind="amount"><input type="radio" name="benefit" value="5000"> 5,000 할인</label>
                                            <label data-benefit-kind="amount"><input type="radio" name="benefit" value="10"> 10% 할인</label>
                                            <label data-benefit-kind="amount"><input type="radio" name="benefit" value="20"> 20% 할인</label>
                                            <label data-benefit-kind="amount"><input type="radio" name="benefit" value="30"> 30% 할인</label>
                                            <label data-benefit-kind="amount"><input type="radio" name="benefit" value="40"> 40% 할인</label>
                                            <label data-benefit-kind="amount"><input type="radio" name="benefit" value="50"> 50% 할인</label>
                                            <label data-benefit-kind="delivery"><input type="radio" name="benefit" value="DELIVERY_FREE"> 배송비 무료</label>
                                        </div>
                                    </td>
                                </tr>
                                <tr>
                                    <th>사용기간</th>
                                    <td>
                                        <div class="coupon-period-fields">
                                            <input id="coupon-register-start-date" type="date" name="startDate" aria-label="시작일">
                                            <span>~</span>
                                            <input id="coupon-register-end-date" type="date" name="expireDate" aria-label="종료일">
                                        </div>
                                        <div class="coupon-period-fields">
                                            <span>또는 발급일로부터</span>
                                            <input id="coupon-register-valid-days" type="number" name="validDays" min="1" aria-label="발급일 기준 사용일수">
                                            <span>이내</span>
                                        </div>
                                    </td>
                                </tr>
                                <tr>
                                    <th><label for="coupon-register-description">유의사항</label></th>
                                    <td>
                                        <textarea id="coupon-register-description" name="notice"></textarea>
                                    </td>
                                </tr>
                            </table>
                            <div class="modal-form-actions coupon-register-actions">
                                <button type="button" data-modal-close>취소</button>
                                <button type="submit">등록</button>
                            </div>
                        </form>
                    </th:block>
                </div>

                <div th:replace="~{admin/fragments/modal::modal('coupon-detail-modal', '쿠폰정보', ~{::coupon_detail_modal_content})}">
                    <th:block th:fragment="coupon_detail_modal_content">
                        <div class="coupon-modal-detail">
                            <table class="section-table">
                                <tr>
                                    <th>쿠폰번호</th>
                                    <td id="coupon-detail-coupon-no"></td>
                                    <th>발급자</th>
                                    <td id="coupon-detail-issuer"></td>
                                </tr>
                                <tr>
                                    <th>쿠폰종류</th>
                                    <td id="coupon-detail-coupon-type"></td>
                                    <th>상태</th>
                                    <td id="coupon-detail-status"></td>
                                </tr>
                                <tr>
                                    <th>쿠폰명</th>
                                    <td colspan="3" id="coupon-detail-coupon-name"></td>
                                </tr>
                                <tr>
                                    <th>혜택</th>
                                    <td colspan="3" id="coupon-detail-benefit"></td>
                                </tr>
                                <tr>
                                    <th>사용기간</th>
                                    <td colspan="3" id="coupon-detail-period"></td>
                                </tr>
                                <tr>
                                    <th>발급 / 사용</th>
                                    <td colspan="3"><span id="coupon-detail-issue-count"></span> / <span id="coupon-detail-used-count"></span></td>
                                </tr>
                                <tr>
                                    <th>안내사항</th>
                                    <td colspan="3" id="coupon-detail-description"></td>
                                </tr>
                            </table>
                            <div class="modal-form-actions">
                                <button type="button" data-modal-close>닫기</button>
                            </div>
                        </div>
                    </th:block>
                </div>
            </th:block>
        </section>
    </main>
</div>

<footer th:replace="~{admin/fragments/footer::footer}"></footer>
</body>
</html>
