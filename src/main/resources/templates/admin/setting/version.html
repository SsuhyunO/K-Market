<!DOCTYPE html>
<html lang="en">
<head>
    <title>KMarket 버전관리</title>
    <th:block th:replace="~{admin/fragments/head::head}"></th:block>
    <link rel="stylesheet" th:href="@{/css/admin/global/management-table-form.css}">
    <link rel="stylesheet" th:href="@{/css/admin/global/action-bar.css}">
    <link rel="stylesheet" th:href="@{/css/admin/global/modal-form.css}">
    <link rel="stylesheet" th:href="@{/css/admin/global/section-table.css}">
    <link rel="stylesheet" th:href="@{/css/admin/setting/version.css}">
    <script type="module" th:src="@{/js/admin/setting/version.js}"></script>
</head>
<body>
<header th:replace="~{admin/fragments/header::header}"></header>
<div class="admin-layout">
    <aside th:replace="~{admin/fragments/aside::aside}"></aside>

    <main id="admin-main">
        <div th:replace="~{admin/fragments/page-header::page-header}"></div>

        <section th:replace="~{admin/fragments/dash-section::dash-section(null, '버전 목록', '사이트 버전 목록 입니다.', ~{::version_content})}">
            <th:block th:fragment="version_content">
                <form th:replace="~{admin/fragments/management-table-form::management-table-form(
                    @{/admin/version-management/delete},
                    ~{::management-content},
                    ~{::version-table-footer},
                    'versionNo')}">
                    <th:block th:fragment="management-content">
                        <tr>
                            <th><label><input type="checkbox" id="select-all"></label></th>
                            <th>번호</th>
                            <th>버전</th>
                            <th>작성자</th>
                            <th>등록일시</th>
                            <th>변경내역</th>
                        </tr>
                        <tr th:if="${#lists.isEmpty(versionList)}">
                            <td colspan="6">등록된 버전 내역이 없습니다.</td>
                        </tr>
                        <tr th:each="v, iter : ${versionList}">
                            <td><label><input type="checkbox" name="versionNo" th:value="${v.id}"></label></td>
                            <td th:text="${versionList.size() - iter.index}"></td>
                            <td th:text="${v.version}"></td>
                            <td th:text="${v.writerUid}"></td>
                            <td th:text="${#temporals.format(v.createdAt, 'yyyy.MM.dd HH:mm:ss')}"></td>
                            <td class="version-action-cell">
                                <button class="version-detail-button" type="button"
                                        data-modal-target="version-detail-modal"
                                        th:attr="data-version=${v.version},data-content=${v.content}">[ 확인 ]</button>
                                <button class="version-detail-button" type="button"
                                        data-modal-target="version-edit-modal"
                                        th:attr="data-id=${v.id},data-version=${v.version},data-content=${v.content}">[ 수정 ]</button>
                            </td>
                        </tr>
                    </th:block>

                    <th:block th:fragment="version-table-footer">
                        <button type="submit"
                                data-management-action="bulk-submit"
                                data-empty-message="삭제할 버전을 선택해주세요."
                                data-confirm-message="선택한 버전을 삭제하시겠습니까?"
                                data-action-variant="secondary">선택삭제</button>
                        <button type="button"
                                data-modal-target="version-register-modal"
                                data-action-variant="primary">등록</button>
                    </th:block>
                </form>

                <div th:replace="~{admin/fragments/modal::modal('version-register-modal', '버전등록', ~{::version_register_modal_content})}">
                    <th:block th:fragment="version_register_modal_content">
                        <form id="version-register-form" th:action="@{/admin/version-management/register}" method="post" novalidate>
                            <table class="section-table version-modal-table">
                                <tr>
                                    <th><label for="version-name">버전</label></th>
                                    <td>
                                        <input id="version-name" type="text" name="version"
                                               th:value="${currentBuildVersion}" placeholder="버전입력하기 (예: 0.0.5-SNAPSHOT)">
                                        <p class="field-error" data-error-for="version-name"></p>
                                    </td>
                                </tr>
                                <tr>
                                    <th><label for="version-change">변경내역</label></th>
                                    <td>
                                        <textarea id="version-change" name="content" placeholder="변경내역작성하기 (한 줄에 하나씩)"></textarea>
                                        <p class="field-error" data-error-for="version-change"></p>
                                    </td>
                                </tr>
                            </table>
                            <div class="modal-form-actions">
                                <button type="submit">등록하기</button>
                            </div>
                        </form>
                    </th:block>
                </div>

                <div th:replace="~{admin/fragments/modal::modal('version-edit-modal', '버전수정', ~{::version_edit_modal_content})}">
                    <th:block th:fragment="version_edit_modal_content">
                        <form id="version-edit-form" th:action="@{/admin/version-management/update}" method="post" novalidate>
                            <input type="hidden" id="edit-version-id" name="id">
                            <table class="section-table version-modal-table">
                                <tr>
                                    <th><label for="edit-version-name">버전</label></th>
                                    <td>
                                        <input id="edit-version-name" type="text" name="version"
                                               placeholder="버전입력하기 (예: 0.0.5-SNAPSHOT)">
                                        <p class="field-error" data-error-for="edit-version-name"></p>
                                    </td>
                                </tr>
                                <tr>
                                    <th><label for="edit-version-change">변경내역</label></th>
                                    <td>
                                        <textarea id="edit-version-change" name="content" placeholder="변경내역작성하기 (한 줄에 하나씩)"></textarea>
                                        <p class="field-error" data-error-for="edit-version-change"></p>
                                    </td>
                                </tr>
                            </table>
                            <div class="modal-form-actions">
                                <button type="submit">수정하기</button>
                            </div>
                        </form>
                    </th:block>
                </div>

                <div th:replace="~{admin/fragments/modal::modal('version-detail-modal', '버전확인', ~{::version_detail_modal_content})}">
                    <th:block th:fragment="version_detail_modal_content">
                        <table class="section-table version-modal-table">
                            <tr>
                                <th>버전</th>
                                <td id="version-detail-name"></td>
                            </tr>
                            <tr>
                                <th>변경내역</th>
                                <td>
                                    <ul class="version-change-list" id="version-detail-change"></ul>
                                </td>
                            </tr>
                        </table>
                        <div class="modal-form-actions">
                            <button type="button" data-modal-close>닫기</button>
                        </div>
                    </th:block>
                </div>
            </th:block>
        </section>
    </main>
</div>

<footer th:replace="~{admin/fragments/footer::footer}"></footer>
</body>
</html>
