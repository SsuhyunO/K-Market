<!DOCTYPE html>
<html lang="en">
<head>
    <title>KMarket 약관관리</title>
    <th:block th:replace="~{admin/fragments/head::head}"></th:block>
    <link rel="stylesheet" th:href="@{/css/admin/global/section-table.css}">
    <script type="module" th:src="@{/js/admin/setting/terms.js}"></script>
</head>
<body>
<header th:replace="~{admin/fragments/header::header}"></header>
<div class="admin-layout">
    <aside th:replace="~{admin/fragments/aside::aside}"></aside>
    
    <main id="admin-main">
        <div th:replace="~{admin/fragments/page-header::page-header}"></div>
        
        <section th:replace="~{admin/fragments/dash-section::dash-section(null, '구매회원 약관', '회원가입 및 정책 페이지 노출 약관 입니다.', ~{::buyer_terms_content})}">
            <th:block th:fragment="buyer_terms_content">
                <th:block th:replace="~{admin/fragments/section-form::section-form('/admin/terms-management', false, ~{::buyer_terms_rows})}">
                    <th:block th:fragment="buyer_terms_rows">
                        <tr>
                            <th><label for="buyer-terms">약관내용</label></th>
                            <td>
                                <input type="hidden" name="policyType" value="BUYER">
                                <textarea id="buyer-terms" name="content" th:text="${buyerPolicy}"></textarea>
                            </td>
                        </tr>
                    </th:block>
                </th:block>
            </th:block>
        </section>
        
        <section th:replace="~{admin/fragments/dash-section::dash-section(null, '판매회원 약관', '회원가입 및 정책 페이지 노출 약관 입니다.', ~{::seller_terms_content})}">
            <th:block th:fragment="seller_terms_content">
                <th:block th:replace="~{admin/fragments/section-form::section-form('/admin/terms-management', false, ~{::seller_terms_rows})}">
                    <th:block th:fragment="seller_terms_rows">
                        <tr>
                            <th><label for="seller-terms">약관내용</label></th>
                            <td>
                                <input type="hidden" name="policyType" value="SELLER">
                                <textarea id="seller-terms" name="content" th:text="${sellerPolicy}"></textarea>
                            </td>
                        </tr>
                    </th:block>
                </th:block>
            </th:block>
        </section>
        
        <section th:replace="~{admin/fragments/dash-section::dash-section(null, '전자금융거래 약관', '회원가입 및 정책 페이지 노출 약관 입니다.', ~{::finance_terms_content})}">
            <th:block th:fragment="finance_terms_content">
                <th:block th:replace="~{admin/fragments/section-form::section-form('/admin/terms-management', false, ~{::finance_terms_rows})}">
                    <th:block th:fragment="finance_terms_rows">
                        <tr>
                            <th><label for="finance-terms">약관내용</label></th>
                            <td>
                                <input type="hidden" name="policyType" value="FINANCE">
                                <textarea id="finance-terms" name="content" th:text="${financePolicy}"></textarea>
                            </td>
                        </tr>
                    </th:block>
                </th:block>
            </th:block>
        </section>
        
        <section th:replace="~{admin/fragments/dash-section::dash-section(null, '위치정보 이용약관', '회원가입 및 정책 페이지 노출 약관 입니다.', ~{::location_terms_content})}">
            <th:block th:fragment="location_terms_content">
                <th:block th:replace="~{admin/fragments/section-form::section-form('/admin/terms-management', false, ~{::location_terms_rows})}">
                    <th:block th:fragment="location_terms_rows">
                        <tr>
                            <th><label for="location-terms">약관내용</label></th>
                            <td>
                                <input type="hidden" name="policyType" value="LOCATION">
                                <textarea id="location-terms" name="content" th:text="${locationPolicy}"></textarea>
                            </td>
                        </tr>
                    </th:block>
                </th:block>
            </th:block>
        </section>
        
        <section th:replace="~{admin/fragments/dash-section::dash-section(null, '개인정보처리방침', '회원가입 및 정책 페이지 노출 약관 입니다.', ~{::privacy_terms_content})}">
            <th:block th:fragment="privacy_terms_content">
                <th:block th:replace="~{admin/fragments/section-form::section-form('/admin/terms-management', false, ~{::privacy_terms_rows})}">
                    <th:block th:fragment="privacy_terms_rows">
                        <tr>
                            <th><label for="privacy-terms">약관내용</label></th>
                            <td>
                                <input type="hidden" name="policyType" value="PRIVACY">
                                <textarea id="privacy-terms" name="content" th:text="${privacyPolicy}"></textarea>
                            </td>
                        </tr>
                    </th:block>
                </th:block>
            </th:block>
        </section>
    </main>
</div>

<footer th:replace="~{admin/fragments/footer::footer}"></footer>
</body>
</html>
