<!DOCTYPE html>
<html lang="en">
<head>
    <title>KMarket 카테고리관리</title>
    <th:block th:replace="~{admin/fragments/head::head}"></th:block>
    <link rel="stylesheet" th:href="@{/css/admin/global/section-table.css}">
    <link rel="stylesheet" th:href="@{/css/admin/setting/category.css}">
    <script type="module" th:src="@{/js/admin/setting/category/category-modifier.js}"></script>
    <script type="module" th:src="@{/js/admin/setting/category/category-observer.js}"></script>
    <script type="module" th:src="@{/js/admin/setting/category/category-listener.js}"></script>
    <script type="module" th:src="@{/js/admin/setting/category/category-management.js}"></script>
    <script th:inline="javascript">
        window.productInfoNoticeTemplates = /*[[${productInfoNoticeTemplates}]]*/ {};
    </script>
</head>
<body>
<header th:replace="~{admin/fragments/header::header}"></header>
<div class="admin-layout">
    <aside th:replace="~{admin/fragments/aside::aside}"></aside>

    <main id="admin-main">
        <div th:replace="~{admin/fragments/page-header::page-header}"></div>

        <section class="dash-section">
            <h2 class="section-title">카테고리</h2>
            <p class="section-description">쇼핑몰 메인, 상품 페이지 사이드 카테고리 메뉴 입니다.</p>
            <form th:action="@{/admin/category-management}" method="post">
                <div class="category-tree">
                    <ul class="category-list">
                        <li class="category-item"
                            th:each="rootCategory : ${categoryTree}"
                            th:data-category-id="${rootCategory.cateId}">
                            <div class="category-row">
                                <button class="category-toggle" type="button" aria-label="하위 카테고리 열기/닫기"></button>
                                <span class="category-title" th:text="${rootCategory.name}"></span>
                                <div class="category-actions">
                                    <button class="category-modify-button" type="button">수정</button>
                                    <button class="category-delete-button" type="button">삭제</button>
                                </div>
                            </div>
                            <details open>
                                <summary class="category-hidden-summary">[[${rootCategory.name}]] 하위 카테고리</summary>

                                <ul class="category-list">
                                    <li class="category-item"
                                        th:each="childCategory : ${rootCategory.children}"
                                        th:data-category-id="${childCategory.cateId}"
                                        th:data-info-notice-type="${childCategory.infoNoticeType}">
                                        <div class="category-row">
                                            <span class="category-title" th:text="${childCategory.name}"></span>
                                            <div class="category-actions">
                                                <button class="category-modify-button" type="button">수정</button>
                                                <button class="category-delete-button" type="button">삭제</button>
                                            </div>
                                        </div>
                                    </li>
                                </ul>
                                <button class="category-add-button" type="button">+ 2차 카테고리 추가</button>
                            </details>
                        </li>
                    </ul>

                    <button class="category-add-button category-add-root-button" type="button">+ 1차 카테고리 추가</button>
                </div>

                <div class="section-form-actions">
                    <button class="section-submit-button" type="submit">수정하기</button>
                </div>
            </form>
        </section>
    </main>
</div>

<footer th:replace="~{admin/fragments/footer::footer}"></footer>
</body>
</html>
