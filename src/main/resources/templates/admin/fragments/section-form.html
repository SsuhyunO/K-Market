<form th:fragment="section-form(action, multipart, rows)"
      th:action="@{${action}}"
      method="post"
      th:attr="enctype=${multipart} ? 'multipart/form-data' : null">
	<table th:replace="~{admin/fragments/section-table::section-table(${rows})}"></table>
    <div class="section-form-actions">
        <button class="section-submit-button" type="submit">수정하기</button>
    </div>
</form>
