<form th:fragment="product-form(formName, submitLabel, actionUrl)"
      th:action="${actionUrl}"
      th:name="${formName}"
      method="post"
      enctype="multipart/form-data">
	<input type="hidden" name="prodNo" th:if="${product != null}" th:value="${product.prodNo}">
	<p class="product-form-error"
	   th:if="${productErrorMessage != null}"
	   th:text="${productErrorMessage}">상품 등록에 실패했습니다.</p>
	
	<section th:replace="~{admin/fragments/dash-section::dash-section(null, '상품분류', '1차, 2차 카테고리 기본분류는 반드시 선택하셔야 합니다.', ~{::current_category_state_section})}">
		<th:block th:fragment="current_category_state_section">
			<th:block th:replace="~{admin/fragments/section-table::section-table(~{::current_category_state_rows})}">
				<th:block th:fragment="current_category_state_rows">
					<tr>
						<th><label for="root-category-selector">1차 분류</label></th>
							<td>
								<select id="root-category-selector" name="rootCategorySelector" required>
									<option value="">1차 카테고리 선택</option>
									<option th:each="rootCategory : ${categoryTree}"
									        th:value="${rootCategory.cateId}"
									        th:selected="${product != null and product.rootCategoryId == rootCategory.cateId}"
									        th:text="${rootCategory.name}">1차 카테고리</option>
								</select>
							</td>
						</tr>
					<tr>
						<th><label for="sub-category-selector">2차 분류</label></th>
							<td>
								<select id="sub-category-selector" name="cateId" required>
									<option value="">2차 카테고리 선택</option>
									<th:block th:each="rootCategory : ${categoryTree}">
										<option th:each="childCategory : ${rootCategory.children}"
										        th:value="${childCategory.cateId}"
										        th:data-parent="${rootCategory.cateId}"
										        th:data-info-notice-type="${childCategory.infoNoticeType}"
										        th:selected="${product != null and product.cateId == childCategory.cateId}"
										        th:text="${childCategory.name}">2차 카테고리</option>
									</th:block>
								</select>
							</td>
						</tr>
				</th:block>
			</th:block>
		</th:block>
	</section>
	
	<section th:replace="~{admin/fragments/dash-section::dash-section(null, '기본정보', '기본정보는 반드시 입력하셔야 합니다.', ~{::product_default_info})}">
		<th:block th:fragment="product_default_info">
			<th:block th:replace="~{admin/fragments/section-table::section-table(~{::product_default_info_rows})}">
				<th:block th:fragment="product_default_info_rows">
					<tr>
						<th><label for="name-id">상품명</label></th>
						<td><input id="name-id" type="text" name="prodName" maxlength="255" th:value="${product?.prodName}" required/></td>
					</tr>
					<tr>
						<th><label for="description-id">기본설명</label></th>
						<td><input id="description-id" type="text" name="description" th:value="${product?.description}" required/></td>
					</tr>
					<tr>
						<th><label for="maker-id">제조사</label></th>
						<td><input id="maker-id" type="text" name="maker" th:value="${product?.maker}" required/></td>
					</tr>
					<tr>
						<th><label for="price-id">상품금액</label></th>
						<td><input id="price-id" type="number" name="price" min="0" th:value="${product?.price}" required/>원</td>
					</tr>
					<tr>
						<th><label for="discount-id">할인율</label></th>
						<td><input id="discount-id" type="number" name="discount" min="0" max="100" th:value="${product?.discount}" required/>%</td>
					</tr>
					<tr>
						<th><label for="point-id">포인트</label></th>
						<td><input id="point-id" type="number" name="point" min="0" th:value="${product?.point}" required/>원</td>
					</tr>
					<tr>
						<th><label for="stock">재고수량</label></th>
						<td>
							<input id="stock" type="number" th:value="${product != null ? product.stock : 0}" readonly required/>개
							<span class="row-description">옵션 조합별 재고수량 합계가 자동 반영됩니다.</span>
						</td>
					</tr>
					<tr>
						<th><label for="delivery-fee-id">배송비</label></th>
						<td><input id="delivery-fee-id" type="number" name="deliveryFee" th:value="${product?.deliveryFee}" required/>원</td>
					</tr>
					<tr>
						<th>상품 이미지</th>
						<td class="image-upload-section">
							<div>
								<div th:replace="~{admin/fragments/product-form::current_file(${product?.thumb1File})}"></div>
								<input type="file" name="thumb1" accept="image/*" th:attr="data-existing-file-id=${product?.thumb1FileId}" th:required="${product == null}"/>
								<label>크기 190 x 190, 상품 목록에서 보여줄 이미지입니다.</label>
							</div>
							
							<div>
								<div th:replace="~{admin/fragments/product-form::current_file(${product?.thumb2File})}"></div>
								<input type="file" name="thumb2" accept="image/*" th:attr="data-existing-file-id=${product?.thumb2FileId}" th:required="${product == null}"/>
								<label>크기 230 x 230, 메인페이지에서 출력할 이미지입니다.</label>
							</div>
							
							<div>
								<div th:replace="~{admin/fragments/product-form::current_file(${product?.thumb3File})}"></div>
								<input type="file" name="thumb3" accept="image/*" th:attr="data-existing-file-id=${product?.thumb3FileId}" th:required="${product == null}"/>
								<label>크기 456 x 456, 상품상세에서 보여줄 이미지입니다.</label>
							</div>
						</td>
					</tr>
					<tr>
						<th>상품 상세정보</th>
						<td>
							<div th:replace="~{admin/fragments/product-form::current_file(${product?.detailInfoFile})}"></div>
							<input type="file" name="detailInfoFile" accept="image/*" th:attr="data-existing-file-id=${product?.detailInfoFileId}" th:required="${product == null}"/>
							<label>크기 가로 940px, 높이 제약없음, 크기 최대 1MB</label>
						</td>
					</tr>
				</th:block>
			</th:block>
		</th:block>
	</section>
	
	<section th:replace="~{admin/fragments/dash-section::dash-section('product-option-section', '상품 선택정보', '상품별 선택정보(옵션) 입력입니다.', ~{::prod_option})}">
		<th:block th:fragment="prod_option">
			<th:block th:replace="~{admin/fragments/section-table::section-table(~{::prod_option_rows})}">
				<th:block th:fragment="prod_option_rows">
					<tr data-option-row>
						<th><label for="option1" data-option-label>옵션1</label></th>
						<td>
							<input id="option1" type="text" maxlength="50" data-option-name-input>
						</td>
						<th><label for="option1-value">옵션1 항목</label></th>
						<td>
							<div class="option-item-editor" data-option-item-editor>
								<button class="option-item-open-button" type="button" data-option-item-open>항목 추가</button>
								<div class="option-item-add-row" hidden>
									<input id="option1-value" type="text" maxlength="30" data-option-item-draft>
									<button class="option-item-add-button" type="button" data-option-item-add>확인</button>
									<button class="option-item-cancel-button" type="button" data-option-item-cancel>취소</button>
								</div>
								<div class="option-item-list" data-option-item-list></div>
							</div>
						</td>
						<td class="option-delete-cell">
							<button class="option-delete-button" type="button" data-option-delete>삭제</button>
						</td>
					</tr>
				</th:block>
			</th:block>
			
			<div class="product-btn-area">
				<button id="option-add-button" type="button">옵션 추가</button>
			</div>
			
			<div class="option-stock-section">
				<h4>옵션 조합별 재고</h4>
				<div class="option-stock-table-wrap">
					<table class="option-stock-table">
						<thead>
						<tr>
							<th>옵션 조합</th>
							<th>재고수량</th>
							<th>판매상태</th>
						</tr>
						</thead>
						<tbody data-option-stock-body></tbody>
					</table>
				</div>
				<div data-option-item-fields></div>
			</div>
		</th:block>
	</section>
	
	<section th:replace="~{admin/fragments/dash-section::dash-section(null, '상품정보 제공고시', '[전자상거래에 관한 상품정보 제공에 관한 고시] 항목에 의거 등록하는 정보입니다.', ~{::prod_info_notice})}">
		<th:block th:fragment="prod_info_notice">
			<div class="product-info-notice-group">
				<h3 class="product-info-notice-subtitle">공통 상품정보 제공고시</h3>
				<p class="product-info-notice-subtext">모든 상품에 공통으로 노출되는 정보입니다. 상품 기본정보와 겹치는 값은 자동으로 반영됩니다.</p>
				<th:block th:replace="~{admin/fragments/section-table::section-table(~{::common_product_notice_rows})}">
					<th:block th:fragment="common_product_notice_rows">
						<tr>
							<th><label for="notice-product-no">상품번호</label></th>
							<td><input id="notice-product-no" type="text" th:value="${product != null ? product.prodNo : '등록 후 자동 발급'}" readonly></td>
						</tr>
						<tr>
							<th><label for="notice-product-status">상품상태</label></th>
							<td><input id="notice-product-status" type="text" th:value="${product != null and product.status != null ? (product.status == 'ON_SALE' ? '새상품' : product.status) : '새상품'}" readonly></td>
						</tr>
						<tr>
							<th><label for="tax-type-id">부가세 면세여부</label></th>
							<td>
								<select id="tax-type-id" name="taxType" required>
									<option value="">선택</option>
									<option value="과세상품" th:selected="${product == null or product?.taxType == '과세상품'}">과세상품</option>
									<option value="면세상품" th:selected="${product?.taxType == '면세상품'}">면세상품</option>
								</select>
							</td>
						</tr>
						<tr>
							<th><label for="receipt-issue-type-id">영수증 발행</label></th>
							<td><input id="receipt-issue-type-id" type="text" name="receiptIssueType" th:value="${product != null ? product.receiptIssueType : '발행가능 - 신용카드 전표, 온라인 현금영수증'}" placeholder="예: 발행가능 - 신용카드 전표, 온라인 현금영수증" required/></td>
						</tr>
						<tr>
							<th><label for="business-type-id">사업자 구분</label></th>
							<td>
								<select id="business-type-id" name="businessType" required>
									<option value="">선택</option>
									<option value="개인사업자" th:selected="${product == null or product?.businessType == '개인사업자'}">개인사업자</option>
									<option value="법인사업자" th:selected="${product?.businessType == '법인사업자'}">법인사업자</option>
									<option value="일반판매자" th:selected="${product?.businessType == '일반판매자'}">일반판매자</option>
								</select>
							</td>
						</tr>
						<tr>
							<th><label for="brand-id">브랜드</label></th>
							<td><input id="brand-id" type="text" name="brand" th:value="${product?.brand}" required/></td>
						</tr>
						<tr>
							<th><label for="origin-id">원산지</label></th>
							<td><input id="origin-id" type="text" name="origin" th:value="${product?.origin}" required/></td>
						</tr>
					</th:block>
				</th:block>
			</div>

			<div class="product-info-notice-group product-info-notice-group-category">
				<h3 class="product-info-notice-subtitle">상품군별 상품정보 제공고시</h3>
				<div class="product-info-notice-toolbar">
					<label for="product-info-notice-type">상품군</label>
					<input id="product-info-notice-type-value" type="hidden" name="infoNoticeType"
					       th:value="${product != null ? product.infoNoticeType : productInfoNoticeTemplates.values().iterator().next().code}">
					<select id="product-info-notice-type" disabled>
						<option th:each="template, stat : ${productInfoNoticeTemplates.values()}"
						        th:value="${template.code}"
						        th:text="${template.name}"
					        th:selected="${product != null ? product.infoNoticeType == template.code : stat.first}">
						의류
					</option>
				</select>
				</div>
			
				<th:block th:with="selectedTemplate=${product != null and productInfoNoticeTemplates[product.infoNoticeType] != null ? productInfoNoticeTemplates[product.infoNoticeType] : productInfoNoticeTemplates.values().iterator().next()}">
					<th:block th:replace="~{admin/fragments/section-table::section-table(~{::prod_info_notice_rows})}">
						<th:block th:fragment="prod_info_notice_rows">
							<tbody id="product-info-notice-fields">
							<tr th:each="field : ${selectedTemplate.fields}">
								<th>
									<label th:for="|notice-${field.key}|" th:text="${field.label}">항목명</label>
									<span class="notice-required-mark" th:if="${field.required}">*</span>
								</th>
								<td>
									<input th:id="|notice-${field.key}|"
									       type="text"
									       th:name="|informationNoticeValues[${field.key}]|"
									       th:placeholder="${field.placeholder}"
									       th:required="${field.required}">
								</td>
							</tr>
							</tbody>
						</th:block>
					</th:block>
				</th:block>
			</div>
			
			<p class="product-info-notice-guide">
				상품군을 선택하면 전자상거래 상품정보 제공고시 기준에 맞는 입력 항목이 자동으로 변경됩니다.
			</p>
			
			<script th:inline="javascript">
                window.productInfoNoticeTemplates = /*[[${productInfoNoticeTemplates}]]*/ {};
                window.productEditData = /*[[${product}]]*/ null;
			</script>
		</th:block>
	</section>
	
	<section th:replace="~{admin/fragments/dash-section::dash-section('product-submit-section', null, null, ~{::product_submit_section})}">
		<th:block th:fragment="product_submit_section">
			<div class="section-form-actions">
				<p class="product-form-state-message" data-product-form-state>변경사항이 없습니다.</p>
				<button class="section-submit-button" type="submit" th:text="${submitLabel}">저장하기</button>
			</div>
		</th:block>
	</section>
</form>

<div th:fragment="current_file(file)" th:if="${file != null}" class="current-file-info">
	<span class="current-file-name" th:text="${file.originalName}">sample.jpg</span>
	<span class="current-file-meta" th:text="|${file.extension} · ${file.fileSize} bytes|">jpg · 1024 bytes</span>
</div>
