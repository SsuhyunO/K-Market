<form th:fragment="management-table-form(formAction, content, deleteBtnText, registerBtnText, checkboxName, deleteEmptyMessage, deleteConfirmMessage, registerModalTarget)"
      id="management-table-form"
      th:action="${formAction}"
      method="post"
      th:data-checkbox-name="${checkboxName}"
      th:data-delete-empty-message="${deleteEmptyMessage}"
      th:data-delete-confirm-message="${deleteConfirmMessage}">
    <div class="management-table-scroll">
        <table class="management-table">
            <th:block th:replace="${content}"></th:block>
        </table>
    </div>
    <div class="btn-area">
        <button id="delete-button" type="submit" th:text="${deleteBtnText}"></button>
        <nav class="management-pagination" aria-label="목록 페이지">
            <a href="#">이전</a>
            <span class="current">1</span>
            <a href="#">2</a>
            <a href="#">3</a>
            <a href="#">4</a>
            <a href="#">5</a>
            <a href="#">다음</a>
        </nav>
        <button id="register-button" type="button" th:text="${registerBtnText}" th:attr="data-modal-target=${registerModalTarget}"></button>
    </div>
</form>
