
<!DOCTYPE html>
<html lang="en">
<head>
	<title>KMarket 버전관리</title>
	<th:block th:replace="~{admin/fragments/head::head}"></th:block>
	<link rel="stylesheet" th:href="@{/css/admin/global/management-table-form.css}">
	<link rel="stylesheet" th:href="@{/css/admin/shop/sales.css}">
</head>
<body>
<header th:replace="~{admin/fragments/header::header}"></header>
<div class="admin-layout">
	<aside th:replace="~{admin/fragments/aside::aside}"></aside>

	<main id="admin-main">
		<div th:replace="~{admin/fragments/page-header::page-header}"></div>

		<section th:replace="~{admin/fragments/dash-section::dash-section(null, null, null, ~{::main_content})}">
			<th:block th:fragment="main_content">
				<div class="sales-status-select">
					<select id="periodSelect"
					        th:data-base-url="@{/admin/sales-status}"
					        onchange="location.href = this.getAttribute('data-base-url') + '?period=' + this.value + '&page=1'">
						<option value="DAILY" th:selected="${period == 'DAILY'}">일별</option>
						<option value="WEEKLY" th:selected="${period == 'WEEKLY'}">주간</option>
						<option value="MONTHLY" th:selected="${period == 'MONTHLY'}">한달</option>
					</select>
				</div>
				<div th:replace="~{admin/fragments/management-table-form::management-table(~{::table-content})}">
					<th:block th:fragment="table-content">
						<tr>
							<th>번호</th>
							<th>상호명</th>
							<th>사업자등록번호</th>
							<th>주문건수</th>
							<th>결제완료</th>
							<th>배송중</th>
							<th>배송완료</th>
							<th>구매확정</th>
							<th>주문합계</th>
							<th>매출합계</th>
						</tr>

						<!-- 데이터가 있을 때: result.items를 순회하며 행 출력 -->
						<tr th:each="item : ${result.items}">
							<td th:text="${item.no}"></td>
							<td th:text="${item.companyName}"></td>
							<td th:text="${item.bizRegNo}"></td>
							<td th:text="${item.orderCount}"></td>
							<td th:text="${item.paidCount}"></td>
							<td th:text="${item.shippingCount}"></td>
							<td th:text="${item.deliveredCount}"></td>
							<td th:text="${item.confirmedCount}"></td>
							<td th:text="${#numbers.formatInteger(item.orderTotal, 0, 'COMMA')}"></td>
							<td th:text="${#numbers.formatInteger(item.salesTotal, 0, 'COMMA')}"></td>
						</tr>

						<!-- 데이터가 없을 때 안내 문구 -->
						<tr th:if="${result.items == null or result.items.isEmpty()}">
							<td colspan="10" style="text-align:center;">조회된 데이터가 없습니다.</td>
						</tr>
					</th:block>
				</div>
				<nav th:replace="~{admin/fragments/admin-pagination::admin-pagination(${result.pageInfo}, @{/admin/sales-status(period=${period})})}"></nav>
			</th:block>
		</section>
	</main>
</div>

<footer th:replace="~{admin/fragments/footer::footer}"></footer>
</body>
</html>
