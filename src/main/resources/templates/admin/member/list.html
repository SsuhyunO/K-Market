


<!DOCTYPE html>
<html lang="en">
<head>
    <title>KMarket 회원목록</title>
    <th:block th:replace="~{admin/fragments/head::head}"></th:block>
    <link rel="stylesheet" th:href="@{/css/admin/global/management-table-form.css}">
    <link rel="stylesheet" th:href="@{/css/admin/global/action-bar.css}">
    <link rel="stylesheet" th:href="@{/css/admin/global/modal-form.css}">
    <link rel="stylesheet" th:href="@{/css/admin/global/section-table.css}">
    <link rel="stylesheet" th:href="@{/css/admin/global/search-form.css}">
    <link rel="stylesheet" th:href="@{/css/admin/member/list.css}">
    <script type="module" th:src="@{/js/admin/member/list.js}"></script>
</head>
<body>
<header th:replace="~{admin/fragments/header::header}"></header>
<div class="admin-layout">
    <aside th:replace="~{admin/fragments/aside::aside}"></aside>

    <main id="admin-main">
        <div th:replace="~{admin/fragments/page-header::page-header}"></div>

        <section th:replace="~{admin/fragments/dash-section::dash-section(null, null, null, ~{::main_content})}">
            <th:block th:fragment="main_content">
                <th:block th:replace="~{admin/fragments/search-form(~{::options})}">
                    <th:block th:fragment="options">
                        <option value="아이디">아이디</option>
                        <option value="이름">이름</option>
                        <option value="이메일">이메일</option>
                        <option value="휴대폰">휴대폰</option>
                    </th:block>
                </th:block>

                <form th:replace="~{admin/fragments/management-table-form::management-table-form(
                    null,
                    ~{::table-content},
                    ~{::member-table-footer},
                    'memberNo')}">
                    <th:block th:fragment="table-content">
                        <tr>
                            <th><label><input type="checkbox" id="select-all"></label></th>
                            <th>번호</th>
                            <th>아이디</th>
                            <th>이름</th>
                            <th>성별</th>
                            <th>등급</th>
                            <th>포인트</th>
                            <th>이메일</th>
                            <th>휴대폰</th>
                            <th>가입일</th>
                            <th>상태</th>
                            <th>관리</th>
                        </tr>
                        <tr th:each="member : ${memberList}">
                            <td>
                                <label>
                                    <input type="checkbox"
                                           name="memberNo"
                                           th:value="${member.no}"
                                           th:attr="data-user-id=${member.uid},
                                                    data-name=${member.name},
                                                    data-gender=${member.gender},
                                                    data-grade=${member.gradeLabel},
                                                    data-member-level=${member.memberLevel},
                                                    data-status=${member.statusLabel},
                                                    data-email=${member.email},
                                                    data-phone=${member.phone},
                                                    data-zip-code=${member.zipCode},
                                                    data-address=${member.address},
                                                    data-detail-address=${member.detailAddress},
                                                    data-created-at=${member.createdAt},
                                                    data-last-login-at=${member.lastLoginAt},
                                                    data-note=${member.note}">
                                </label>
                            </td>
                            <td th:text="${member.no}">5</td>
                            <td th:text="${member.uid}">xxxx...</td>
                            <td th:text="${member.name}">홍길동</td>
                            <td th:text="${member.gender}">M</td>
                            <td>
                                <select class="member-grade-select" th:attr="data-uid=${member.uid}">
                                    <option value="5" th:selected="${member.memberLevel} == 5">VVIP</option>
                                    <option value="4" th:selected="${member.memberLevel} == 4">VIP</option>
                                    <option value="3" th:selected="${member.memberLevel} == 3">GOLD</option>
                                    <option value="2" th:selected="${member.memberLevel} == 2">SILVER</option>
                                    <option value="1" th:selected="${member.memberLevel} == 1">FAMILY</option>
                                </select>
                            </td>
                            <td th:text="${#numbers.formatInteger(member.pointBalance, 0, 'COMMA')}">15,000</td>
                            <td th:text="${member.email}">xxxxx@...</td>
                            <td th:text="${member.phone}">010...</td>
                            <td th:text="${member.createdAt}">0000-00-00 00:00:00</td>
                            <td>
                                <span class="member-status"
                                      th:classappend="${member.status == 'ACTIVE'} ? 'active' : 'withdrawn'"
                                      th:text="${member.statusLabel}">정상</span>
                            </td>
                            <td><button class="member-action-button" type="button">[ 수정 ]</button></td>
                        </tr>
                    </th:block>

                    <th:block th:fragment="member-table-footer">
                        <span class="btn-area-spacer"></span>
                        <nav th:replace="~{admin/fragments/admin-pagination::admin-pagination(pageInfo=${pageInfo}, baseUrl='/admin/member-list')}"></nav>
                        <button type="button"
                                data-management-action="bulk-edit"
                                data-empty-message="수정할 회원을 선택해주세요."
                                data-action-variant="primary">
                            선택수정
                        </button>
                    </th:block>
                </form>

                <div th:replace="~{admin/fragments/modal::modal('member-edit-modal', '회원수정', ~{::member_edit_modal_content})}">
                    <th:block th:fragment="member_edit_modal_content">
                        <form id="member-edit-form" action="#" method="post">
                            <div class="member-edit-target">
                                <label for="member-edit-target-select">수정대상</label>
                                <select id="member-edit-target-select"></select>
                            </div>

                            <table class="section-table member-edit-modal-table">
                                <tr>
                                    <th><label for="member-edit-user-id">아이디</label></th>
                                    <td><input id="member-edit-user-id" name="userId" type="text" readonly></td>
                                </tr>
                                <tr>
                                    <th><label for="member-edit-name">이름</label></th>
                                    <td><input id="member-edit-name" name="name" type="text"></td>
                                </tr>
                                <tr>
                                    <th>성별</th>
                                    <td>
                                        <label class="member-radio-label">
                                            <input id="member-edit-gender-m" type="radio" name="gender" value="M"> 남
                                        </label>
                                        <label class="member-radio-label">
                                            <input id="member-edit-gender-f" type="radio" name="gender" value="F"> 여
                                        </label>
                                        <p class="field-error" data-error-for="member-edit-gender"></p>
                                    </td>
                                </tr>
                                <tr>
                                    <th><label for="member-edit-grade">등급</label></th>
                                    <td>
                                        <div class="member-edit-inline-field">
                                            <input id="member-edit-grade" name="grade" type="text" readonly>
                                            <span>등급 수정은 회원 목록에서 선택수정 가능</span>
                                        </div>
                                    </td>
                                </tr>
                                <tr>
                                    <th><label for="member-edit-status">상태</label></th>
                                    <td><input id="member-edit-status" name="status" type="text" readonly></td>
                                </tr>
                                <tr>
                                    <th><label for="member-edit-email">EMAIL</label></th>
                                    <td><input id="member-edit-email" name="email" type="email"></td>
                                </tr>
                                <tr>
                                    <th><label for="member-edit-phone">휴대폰</label></th>
                                    <td><input id="member-edit-phone" name="phone" type="tel"></td>
                                </tr>
                                <tr>
                                    <th><label for="member-edit-zip-code">우편번호</label></th>
                                    <td>
                                        <div class="member-edit-inline-field">
                                            <input id="member-edit-zip-code" name="zipCode" type="text" readonly>
                                            <button class="member-address-search" type="button">검색</button>
                                        </div>
                                    </td>
                                </tr>
                                <tr>
                                    <th><label for="member-edit-address">기본주소</label></th>
                                    <td><input id="member-edit-address" name="address" type="text" readonly></td>
                                </tr>
                                <tr>
                                    <th><label for="member-edit-detail-address">상세주소</label></th>
                                    <td><input id="member-edit-detail-address" name="detailAddress" type="text"></td>
                                </tr>
                                <tr>
                                    <th><label for="member-edit-created-at">가입일</label></th>
                                    <td><input id="member-edit-created-at" name="createdAt" type="text" readonly></td>
                                </tr>
                                <tr>
                                    <th><label for="member-edit-last-login-at">최근로그인날짜</label></th>
                                    <td><input id="member-edit-last-login-at" name="lastLoginAt" type="text" readonly></td>
                                </tr>
                                <tr>
                                    <th><label for="member-edit-note">기타</label></th>
                                    <td><textarea id="member-edit-note" name="note" placeholder="회원에대한기타정보입력"></textarea></td>
                                </tr>
                            </table>

                            <div class="modal-form-actions">
                                <button type="submit">수정하기</button>
                            </div>
                        </form>
                    </th:block>
                </div>
            </th:block>
        </section>
    </main>
</div>

<footer th:replace="~{admin/fragments/footer::footer}"></footer>
</body>
</html>
