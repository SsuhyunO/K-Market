<!DOCTYPE html>
<html lang="en">
<head>
    <title>KMarket 포인트관리</title>
    <th:block th:replace="~{admin/fragments/head::head}"></th:block>
    <link rel="stylesheet" th:href="@{/css/admin/global/management-table-form.css}">
    <link rel="stylesheet" th:href="@{/css/admin/global/action-bar.css}">
    <link rel="stylesheet" th:href="@{/css/admin/global/search-form.css}">
    <link rel="stylesheet" th:href="@{/css/admin/member/point.css}">
    <script type="module" th:src="@{/js/admin/member/point.js}"></script>
</head>
<body>
<header th:replace="~{admin/fragments/header::header}"></header>
<div class="admin-layout">
    <aside th:replace="~{admin/fragments/aside::aside}"></aside>

    <main id="admin-main">
        <div th:replace="~{admin/fragments/page-header::page-header}"></div>

        <section th:replace="~{admin/fragments/dash-section::dash-section(null, null, null, ~{::main_content})}">
            <th:block th:fragment="main_content">
                <th:block th:replace="~{admin/fragments/search-form::search-form('/admin/management-point' ,~{::options})}">
                    <th:block th:fragment="options">
                        <option value="uid" th:selected="${searchType == 'uid'}">아이디</option>
                        <option value="name" th:selected="${searchType == 'name'}">이름</option>
                        <option value="email" th:selected="${searchType == 'email'}">이메일</option>
                        <option value="phone" th:selected="${searchType == 'phone'}">휴대폰</option>
                    </th:block>
                </th:block>

                <form th:replace="~{admin/fragments/management-table-form::management-table-form(
        '/admin/management-point/delete',
        ~{::table-content},
        ~{::point-table-footer},
        'pointNo')}">

                    <th:block th:fragment="table-content">
                        <tr>
                            <th><label><input type="checkbox" id="select-all"></label></th>
                            <th>번호</th>
                            <th>아이디</th>
                            <th>이름</th>
                            <th>지급 포인트</th>
                            <th>잔여 포인트</th>
                            <th>지급 내용</th>
                            <th>지급 날짜</th>
                        </tr>

                        <tr th:if="${#lists.isEmpty(pointList)}">
                            <td colspan="8" style="text-align: center; padding: 30px 0;">조회된 포인트 내역이 없습니다.</td>
                        </tr>

                        <tr th:each="point : ${pointList}">
                            <td><label><input type="checkbox" name="pointNo" th:value="${point.pointNo}"></label></td>

                            <td th:text="${point.pointNo}">5</td>
                            <td th:text="${point.memberUid}">abc1234</td>
                            <td th:text="${point.memberName}">정우성</td>

                            <td th:class="${point.point > 0 ? 'point-amount positive' : 'point-amount negative'}"
                                th:text="${point.point > 0 ? '+' : ''} + ${#numbers.formatInteger(point.point, 0, 'COMMA')}">
                                +1,000
                            </td>

                            <td th:text="${#numbers.formatInteger(point.pointBalance, 0, 'COMMA')}">15,000</td>

                            <td th:text="${point.note}">구매확정 포인트 지급</td>

                            <td>
                                <th:block th:if="${point.createdAt != null}">
                                    <span th:utext="${#strings.replace(point.createdAt, 'T', '<br>')}">
                                        2026-07-14<br>15:36:33
                                    </span>
                                </th:block>

                                <span th:unless="${point.createdAt != null}">-</span>
                            </td>
                        </tr>
                    </th:block>

                    <th:block th:fragment="point-table-footer">
                        <button type="submit"
                                data-management-action="bulk-submit"
                                data-empty-message="삭제할 포인트 기록을 선택해주세요."
                                data-confirm-message="정말 삭제하시겠습니까?"
                                data-action-variant="secondary">선택삭제</button>

                        <nav th:replace="~{admin/fragments/admin-pagination::admin-pagination(
                              pageInfo=${pageInfo},
                              baseUrl='/admin/management-point')}"></nav>
                        <span class="btn-area-spacer"></span>
                    </th:block>
                </form>
            </th:block>
        </section>
    </main>
</div>

<footer th:replace="~{admin/fragments/footer::footer}"></footer>
</body>
</html>
