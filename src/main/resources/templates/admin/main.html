<!DOCTYPE html>
<html lang="en">
<head>
    <title>KMarket 관리자</title>
    <th:block th:replace="~{admin/fragments/head::head}"></th:block>
    <link rel="stylesheet" th:href="@{/css/admin/main.css}">
    <script type="module" th:src="@{/js/admin/main-dashboard.js}"></script>
    <script th:inline="javascript">
        window.categorySalesDaily = /*[[${categorySalesDaily}]]*/ [];
        window.categorySalesTotal = /*[[${categorySalesTotal}]]*/ [];
    </script>
</head>
<body>
<header th:replace="~{admin/fragments/header::header}"></header>
<div class="admin-layout">
    <aside th:replace="~{admin/fragments/aside::aside}"></aside>
    
    <main id="admin-main">
        <!-- 브레드크럼 + 타이틀 -->
        <div th:replace="~{admin/fragments/page-header::page-header}"></div>
        
        <!-- ① 집계현황 -->
        <section th:replace="~{admin/fragments/dash-section::dash-section(|section-summary|, |집계현황|, null, ~{::main-section-content-1})}">
            <th:block th:fragment="main-section-content-1">
                <div class="summary-wrap">
                    
                    <!-- 막대 차트 (주문/결제/취소) -->
                    <div class="chart-bar-wrap">
                        <div class="chart-bar" id="barChart">
                            <!-- JS로 렌더링 -->
                        </div>
                        <div class="chart-bar-labels" id="barLabels"></div>
                    </div>
                    
                    <!-- 파이 차트 (주요매출) -->
                    <div class="chart-pie-wrap">
                        <div class="chart-pie-title">주요매출</div>
                        <canvas id="pieChart"></canvas>
                        <div class="pie-legend" id="pieLegend"></div>
                    </div>
                
                </div>
            </th:block>
        </section>
        
        <!-- ② 운영현황 -->
        <section th:replace="~{admin/fragments/dash-section::dash-section(|section-operation|, |운영현황|, null, ~{::main-section-content-2})}">
            <th:block th:fragment="main-section-content-2">
                <!-- 처리현황 카드 -->
                <div class="op-cards">
                    <div class="op-card red">
                        <div class="op-label">결제완료</div>
                        <div class="op-value" th:text="${operationCard.paid}">0</div>
                    </div>
                    <div class="op-card blue">
                        <div class="op-label">배송준비</div>
                        <div class="op-value" th:text="${operationCard.ready}">0</div>
                    </div>
                    <div class="op-card orange">
                        <div class="op-label">취소요청</div>
                        <div class="op-value" th:text="${operationCard.cancelRequested}">0</div>
                    </div>
                    <div class="op-card purple">
                        <div class="op-label">교환요청</div>
                        <div class="op-value" th:text="${operationCard.exchangeRequested}">0</div>
                    </div>
                    <div class="op-card green">
                        <div class="op-label">반품요청</div>
                        <div class="op-value" th:text="${operationCard.returnRequested}">0</div>
                    </div>
                </div>
                
                <!-- 통계 테이블 -->
                <div class="op-stats">
                    <div class="stat-item">
                        <div class="stat-label">주문건수</div>
                        <div class="stat-value red" th:text="${orderStat.totalOrderCount}">131</div>
                        <div class="stat-sub">
                            <span>오늘 <b th:text="${orderStat.todayOrderCount}">60</b></span>
                            <span>어제 <b th:text="${orderStat.yesterdayOrderCount}">71</b></span>
                        </div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">주문금액</div>
                        <div class="stat-value red" th:text="${#numbers.formatInteger(orderStat.totalOrderAmount, 0, 'COMMA')}">3,700,000</div>
                        <div class="stat-sub">
                            <span>오늘 <b th:text="${#numbers.formatInteger(orderStat.todayOrderAmount, 0, 'COMMA')}">1,200,000</b></span>
                            <span>어제 <b th:text="${#numbers.formatInteger(orderStat.yesterdayOrderAmount, 0, 'COMMA')}">2,500,000</b></span>
                        </div>
                    </div>
                    <div class="stat-item" th:if="${loginMemberType == 'ADMIN'}">
                        <div class="stat-label">회원가입</div>
                        <div class="stat-value red" th:text="${memberStat.totalJoinCount}">232</div>
                        <div class="stat-sub">
                            <span>오늘 <b th:text="${memberStat.todayJoinCount}">102</b></span>
                            <span>어제 <b th:text="${memberStat.yesterdayJoinCount}">130</b></span>
                        </div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">방문자 수</div>
                        <div class="stat-value red" th:text="${#numbers.formatInteger(visitStat, 0, 'COMMA')}">2,500</div>
                    </div>
                    <div class="stat-item" th:if="${loginMemberType == 'ADMIN'}">
                        <div class="stat-label">문의 게시물</div>
                        <div class="stat-value red" th:text="${inquiryStat.totalInquiryCount}">25</div>
                        <div class="stat-sub">
                            <span>오늘 <b th:text="${inquiryStat.todayInquiryCount}">13</b></span>
                            <span>어제 <b th:text="${inquiryStat.yesterdayInquiryCount}">12</b></span>
                        </div>
                    </div>
                </div>
            </th:block>
        </section>

        <!-- ③ 공지사항 + 고객문의 -->
        <th:block th:if="${loginMemberType == 'ADMIN'}">
            <section th:replace="~{admin/fragments/dash-section::dash-section(|section-board|, null, null, ~{::main-section-content-3})}">
                <th:block th:fragment="main-section-content-3">
                    <div class="board-wrap">

                        <!-- 공지사항 (최신 5건) -->
                        <div class="board-box">
                            <div class="board-title">공지사항</div>
                            <ul class="board-list">
                                <li th:each="notice : ${recentNotices}">
                                    <a th:href="@{/admin/cs/notice/view(boardNo=${notice.boardNo})}" class="board-link">
                                        <span class="board-badge" th:text="${notice.category}">안내</span>
                                        <span class="board-text" th:text="${notice.title}">제목</span>
                                    </a>
                                    <span class="board-date" th:text="${#temporals.format(notice.createdAt, 'yy.MM.dd')}">22.10.31</span>
                                </li>
                            </ul>
                        </div>

                        <!-- 고객문의 (최신 5건) -->
                        <div class="board-box">
                            <div class="board-title">고객문의</div>
                            <ul class="board-list">
                                <li th:each="inquiry : ${recentInquiries}">
                                    <a th:href="@{/admin/cs/qna/view(boardNo=${inquiry.boardNo})}" class="board-link">
                                        <span class="board-badge cs" th:text="${inquiry.category}">회원</span>
                                        <span class="board-text" th:text="${inquiry.title}">제목</span>
                                    </a>
                                    <span class="board-writer" th:text="${#strings.substring(inquiry.memberUid, 0, 3) + '**'}">chh**</span>
                                    <span class="board-date" th:text="${#temporals.format(inquiry.createdAt, 'yy.MM.dd')}">22.10.31</span>
                                </li>
                            </ul>
                        </div>
                    </div>
                </th:block>
            </section>
        </th:block>
    </main>
</div>
<!-- /MAIN CONTENT -->

<footer th:replace="~{admin/fragments/footer::footer}"></footer>
</body>
</html>
