<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>KMarket 자주묻는질문 목록</title>

    <th:block th:replace="~{admin/fragments/head::head}"></th:block>

    <link rel="stylesheet"
          th:href="@{/css/admin/global/management-table-form.css}">

    <link rel="stylesheet"
          th:href="@{/css/admin/global/action-bar.css}">

    <link rel="stylesheet"
          th:href="@{/css/admin/cs/board.css}">

    <script type="module"
            th:src="@{/js/admin/cs/cs-board.js}"></script>
</head>

<body class="cs-board-page">

<header th:replace="~{admin/fragments/header::header}"></header>

<div class="admin-layout">

    <aside th:replace="~{admin/fragments/aside::aside}"></aside>

    <main id="admin-main">

        <div th:replace="~{admin/fragments/page-header::page-header}"></div>

        <section th:replace="~{admin/fragments/dash-section::dash-section(
                    null,
                    '자주묻는질문 목록',
                    null,
                    ~{::content}
                )}">

            <th:block th:fragment="content">

                <!-- 등록·수정·삭제 결과 메시지 -->
                <script th:if="${message}"
                        th:inline="javascript">
                    alert([[${message}]]);
                </script>

                <!-- DB 기준 1차 유형 필터 -->
                <div class="cs-type-filter">

                    <form id="faq-filter-form"
                          th:action="@{/admin/cs/faq/list}"
                          method="get">

                        <select id="faq-type-filter"
                                name="category1"
                                aria-label="자주묻는질문 유형 선택"
                                onchange="this.form.submit()">

                            <option value=""
                                    th:selected="${selectedCategory1 == null
                                        or selectedCategory1 == ''}">
                                유형선택
                            </option>

                            <option value="회원"
                                    th:selected="${selectedCategory1 == '회원'}">
                                회원
                            </option>

                            <option value="상품"
                                    th:selected="${selectedCategory1 == '상품'}">
                                상품
                            </option>

                            <option value="주문"
                                    th:selected="${selectedCategory1 == '주문'}">
                                주문
                            </option>

                            <option value="결제"
                                    th:selected="${selectedCategory1 == '결제'}">
                                결제
                            </option>

                            <option value="배송"
                                    th:selected="${selectedCategory1 == '배송'}">
                                배송
                            </option>

                            <option value="취소·반품·교환"
                                    th:selected="${selectedCategory1
                                        == '취소·반품·교환'}">
                                취소·반품·교환
                            </option>

                            <option value="쿠폰·혜택"
                                    th:selected="${selectedCategory1
                                        == '쿠폰·혜택'}">
                                쿠폰·혜택
                            </option>

                        </select>

                    </form>

                </div>

                <!-- FAQ 삭제 폼 -->
                <form id="management-table-form"
                      th:action="@{/admin/cs/faq/delete}"
                      method="post"
                      data-checkbox-name="boardNo">

                    <div class="management-table-scroll">

                        <table class="management-table">

                            <thead>
                            <tr>
                                <th>
                                    <label>
                                        <input type="checkbox"
                                               id="select-all">
                                    </label>
                                </th>

                                <th>번호</th>
                                <th>1차 유형</th>
                                <th>2차 유형</th>
                                <th>제목</th>
                                <th>조회</th>
                                <th>날짜</th>
                                <th>관리</th>
                            </tr>
                            </thead>

                            <tbody>

                            <!-- 조회 결과가 없을 때 -->
                            <tr th:if="${faqList == null
                                or #lists.isEmpty(faqList)}">

                                <td colspan="8"
                                    class="cs-empty-row">

                                    <span th:if="${selectedCategory1 == null
                                        or selectedCategory1 == ''}">
                                        등록된 자주묻는질문이 없습니다.
                                    </span>

                                    <span th:unless="${selectedCategory1 == null
                                        or selectedCategory1 == ''}"
                                          th:text="|${selectedCategory1} 유형에 등록된 글이 없습니다.|">
                                    </span>

                                </td>

                            </tr>

                            <!-- FAQ 목록 -->
                            <tr th:each="faq : ${faqList}">

                                <td>
                                    <label>
                                        <input type="checkbox"
                                               name="boardNo"
                                               th:value="${faq.boardNo}">
                                    </label>
                                </td>

                                <td th:text="${faq.boardNo}">
                                    1
                                </td>

                                <td th:text="${faq.category1}">
                                    회원
                                </td>

                                <td th:text="${faq.category2}">
                                    회원가입
                                </td>

                                <td>
                                    <button class="cs-title-button"
                                            type="button"
                                            th:data-cs-link="@{/admin/cs/faq/view(
                                                boardNo=${faq.boardNo}
                                            )}"
                                            th:text="${faq.title}">
                                        FAQ 제목
                                    </button>
                                </td>

                                <!-- 조회수 기능 미구현 -->
                                <td>-</td>

                                <td th:text="${faq.createdAt != null
                                    ? #temporals.format(
                                        faq.createdAt,
                                        'yyyy.MM.dd'
                                    )
                                    : '-'}">
                                    2026.07.13
                                </td>

                                <td>
                                    <div class="cs-manage-actions">

                                        <!-- 단일 삭제 -->
                                        <button type="button"
                                                data-cs-delete-single
                                                th:data-checkbox-value="${faq.boardNo}"
                                                data-confirm-message="자주묻는질문을 삭제하시겠습니까?">
                                            [삭제]
                                        </button>

                                        <!-- 수정 화면 이동 -->
                                        <button type="button"
                                                th:data-cs-link="@{/admin/cs/faq/modify(
                                                    boardNo=${faq.boardNo}
                                                )}">
                                            [수정]
                                        </button>

                                    </div>
                                </td>

                            </tr>

                            </tbody>

                        </table>

                    </div>

                    <div class="btn-area"
                         style="
                            display:flex;
                            justify-content:space-between;
                            align-items:center;
                            margin-top:20px;
                         ">

                        <!-- 선택 삭제 -->
                        <button type="submit"
                                data-management-action="bulk-submit"
                                data-empty-message="삭제할 자주묻는질문을 선택해주세요."
                                data-confirm-message="선택한 자주묻는질문을 삭제하시겠습니까?"
                                data-action-variant="secondary">
                            선택삭제
                        </button>

                        <!-- 선택한 유형을 유지하는 페이징 -->
                        <nav th:if="${pageInfo != null}"
                             th:replace="~{admin/fragments/admin-pagination
                                ::admin-pagination(
                                    ${pageInfo},
                                    ${faqPageUrl}
                                )}">
                        </nav>

                        <!-- 작성 화면 이동 -->
                        <button type="button"
                                th:data-cs-link="@{/admin/cs/faq/write}"
                                data-action-variant="primary">
                            작성하기
                        </button>

                    </div>

                </form>

            </th:block>

        </section>

    </main>

</div>

<footer th:replace="~{admin/fragments/footer::footer}"></footer>

</body>
</html>
