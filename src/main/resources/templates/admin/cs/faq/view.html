<!DOCTYPE html>
<html lang="en">
<head>
    <title>KMarket 자주묻는질문 보기</title>
    <th:block th:replace="~{admin/fragments/head::head}"></th:block>
    <link rel="stylesheet" th:href="@{/css/admin/global/action-bar.css}">
    <link rel="stylesheet" th:href="@{/css/admin/global/section-table.css}">
    <link rel="stylesheet" th:href="@{/css/admin/cs/board.css}">
    <script type="module" th:src="@{/js/admin/cs/cs-board.js}"></script>
</head>
<body>
<header th:replace="~{admin/fragments/header::header}"></header>
<div class="admin-layout">
    <aside th:replace="~{admin/fragments/aside::aside}"></aside>

    <main id="admin-main">
        <div th:replace="~{admin/fragments/page-header::page-header}"></div>

        <section th:replace="~{admin/fragments/dash-section::dash-section(null, '자주묻는질문 보기', null, ~{::content})}">
            <th:block th:fragment="content">
                <table class="section-table cs-view-table">
                    <tr>
                        <th>유형</th>
                        <td>회원</td>
                    </tr>
                    <tr>
                        <th>제목</th>
                        <td>회원가입은 어떻게 하나요?</td>
                    </tr>
                    <tr>
                        <th>내용</th>
                        <td class="cs-view-content">회원가입은 화면 상단 회원가입 메뉴에서 진행할 수 있습니다.
자주묻는질문의 답변 내용이 출력되는 영역입니다.</td>
                    </tr>
                </table>

                <div th:replace="~{admin/fragments/action-bar::action-bar(~{::actions})}">
                    <th:block th:fragment="actions">
                        <button class="cs-board-button danger" type="button" data-cs-delete data-confirm-message="자주묻는질문을 삭제하시겠습니까?">삭제</button>
                        <button class="cs-board-button secondary" type="button" th:data-cs-link="@{/admin/cs/faq/modify}">수정</button>
                        <button class="cs-board-button primary" type="button" th:data-cs-link="@{/admin/cs/faq/list}">목록</button>
                    </th:block>
                </div>
            </th:block>
        </section>
    </main>
</div>
<footer th:replace="~{admin/fragments/footer::footer}"></footer>
</body>
</html>
