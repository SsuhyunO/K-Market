<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>KMarket 채용하기 목록</title>

    <th:block th:replace="~{admin/fragments/head::head}"></th:block>

    <link rel="stylesheet" th:href="@{/css/admin/global/management-table-form.css}">
    <link rel="stylesheet" th:href="@{/css/admin/global/action-bar.css}">
    <link rel="stylesheet" th:href="@{/css/admin/global/modal-form.css}">
    <link rel="stylesheet" th:href="@{/css/admin/global/section-table.css}">
    <link rel="stylesheet" th:href="@{/css/admin/global/search-form.css}">
    <link rel="stylesheet" th:href="@{/css/admin/cs/board.css}">

    <script type="module" th:src="@{/js/admin/cs/cs-board.js}"></script>
    <script type="module" th:src="@{/js/admin/cs/recruit.js}"></script>
</head>

<body class="cs-board-page cs-recruit-page">

<!-- 등록/수정/삭제 완료 메시지 -->
<script th:if="${message != null}" th:inline="javascript">
    alert([[${message}]]);
</script>

<header th:replace="~{admin/fragments/header::header}"></header>

<div class="admin-layout">
    <aside th:replace="~{admin/fragments/aside::aside}"></aside>

    <main id="admin-main">
        <div th:replace="~{admin/fragments/page-header::page-header}"></div>

        <section th:replace="~{admin/fragments/dash-section::dash-section(null, '채용하기 목록', null, ~{::content})}">
            <th:block th:fragment="content">

                <!-- 검색 영역 -->
                <form class="search-form cs-recruit-search-form"
                      name="search-form"
                      th:action="@{/admin/cs/recruit/list}"
                      method="get">

                    <select name="searchType" aria-label="채용 검색조건">
                        <option value="id">채용번호</option>
                        <option value="department">채용부서</option>
                        <option value="experience">경력사항</option>
                        <option value="recruitCategory">채용형태</option>
                        <option value="title">제목</option>
                    </select>

                    <input type="text"
                           name="keyword"
                           placeholder="검색어입력"
                           aria-label="검색어">

                    <button type="submit">검색</button>
                </form>

                <!-- 채용 목록/삭제 form -->
                <form th:action="@{/admin/cs/recruit/delete}"
                      method="post"
                      id="recruit-list-form">

                    <table class="management-table">
                        <thead>
                        <tr>
                            <th>
                                <label>
                                    <input type="checkbox" id="select-all">
                                </label>
                            </th>
                            <th>번호</th>
                            <th>채용부서</th>
                            <th>경력사항</th>
                            <th>채용형태</th>
                            <th>제목</th>
                            <th>작성자</th>
                            <th>상태</th>
                            <th>모집기간</th>
                            <th>작성일</th>
                        </tr>
                        </thead>

                        <tbody>
                        <!-- 데이터 없을 때 -->
                        <tr th:if="${dtoList == null or #lists.isEmpty(dtoList)}">
                            <td colspan="10" style="text-align:center; padding:30px 0;">
                                등록된 채용공고가 없습니다.
                            </td>
                        </tr>

                        <!-- DB 데이터 출력 -->
                        <tr th:each="recruit : ${dtoList}">
                            <td>
                                <label>
                                    <input class="checkboxes"
                                           type="checkbox"
                                           name="recruitNo"
                                           th:value="${recruit.id}">
                                </label>
                            </td>

                            <td th:text="${recruit.id}">120</td>

                            <td th:text="${recruit.department}">광고사업</td>

                            <td th:text="${recruit.experience}">경력 4 ~ 15년</td>

                            <td th:text="${recruit.recruitCategory}">정규직</td>

                            <td th:text="${recruit.title}">광고 플랫폼 기획</td>

                            <td th:text="${recruit.sellerUid}">관리자</td>

                            <td>
                                <span th:class="${recruit.status == '모집중' ? 'cs-recruit-status active' : 'cs-recruit-status ended'}"
                                      th:text="${recruit.status}">
                                    모집중
                                </span>
                            </td>

                            <td>
                                <span th:text="${recruit.recruitStartAt != null ? #temporals.format(recruit.recruitStartAt, 'yyyy-MM-dd') : '0000-00-00'}"></span>
                                <br>
                                ~
                                <span th:text="${recruit.recruitEndAt != null ? #temporals.format(recruit.recruitEndAt, 'yyyy-MM-dd') : '0000-00-00'}"></span>
                            </td>

                            <td>
                                <span th:text="${recruit.createdAt != null ? #temporals.format(recruit.createdAt, 'yyyy-MM-dd') : '0000-00-00'}"></span>
                                <br>
                                <span th:text="${recruit.createdAt != null ? #temporals.format(recruit.createdAt, 'HH.mm.ss') : '00.00.00'}"></span>
                            </td>
                        </tr>
                        </tbody>
                    </table>

                    <!-- 하단 버튼 영역 -->
                    <div style="display:flex; align-items:center; justify-content:space-between; margin-top:20px;">

                        <div style="display:flex; gap:10px;">
                            <button type="submit"
                                    onclick="return confirm('선택한 채용공고를 삭제하시겠습니까?');"
                                    style="padding:8px 15px; border:1px solid #ccc; background:#fff; cursor:pointer;">
                                선택삭제
                            </button>

                            <button type="button"
                                    id="btn-select-edit"
                                    style="border:1px solid #ccc; padding:6px 12px; border-radius:4px; background:#fff;">
                                선택수정
                            </button>
                        </div>

                        <div>
                            <button type="button"
                                    data-modal-target="recruit-register-modal"
                                    style="padding:8px 15px; border:1px solid #315efb; background:#315efb; color:#fff; cursor:pointer;">
                                채용등록
                            </button>
                        </div>
                    </div>
                </form>

                <!-- 채용등록 모달 -->
                <div th:replace="~{admin/fragments/modal::modal('recruit-register-modal', '채용등록', ~{::recruit_register_modal_content})}">
                    <th:block th:fragment="recruit_register_modal_content">

                        <form id="recruit-register-form"
                              th:action="@{/admin/cs/recruit/register}"
                              method="post"
                              novalidate>

                            <table class="section-table cs-recruit-modal-table">

                                <tr>
                                    <th>
                                        <label for="recruit-title">제목</label>
                                    </th>
                                    <td>
                                        <input id="recruit-title"
                                               type="text"
                                               name="title"
                                               placeholder="채용공고 제목">
                                    </td>
                                </tr>

                                <tr>
                                    <th>
                                        <label for="recruit-department">채용부서</label>
                                    </th>
                                    <td>
                                        <select id="recruit-department" name="department">
                                            <option value="">채용부서 선택</option>
                                            <option value="광고사업">광고사업</option>
                                            <option value="IT">IT</option>
                                            <option value="운영">운영</option>
                                            <option value="경영">경영</option>
                                        </select>
                                    </td>
                                </tr>

                                <tr>
                                    <th>
                                        <label for="recruit-experience">경력사항</label>
                                    </th>
                                    <td>
                                        <select id="recruit-experience" name="experience">
                                            <option value="">경력사항 선택</option>
                                            <option value="신입">신입</option>
                                            <option value="무관">무관</option>
                                            <option value="경력 2 ~ 15년">경력 2 ~ 15년</option>
                                            <option value="경력 4 ~ 15년">경력 4 ~ 15년</option>
                                        </select>
                                    </td>
                                </tr>

                                <tr>
                                    <th>
                                        <label for="recruit-category">채용형태</label>
                                    </th>
                                    <td>
                                        <select id="recruit-category" name="recruitCategory">
                                            <option value="">채용형태 선택</option>
                                            <option value="정규직">정규직</option>
                                            <option value="계약직">계약직</option>
                                        </select>
                                    </td>
                                </tr>

                                <tr>
                                    <th>
                                        <label for="recruit-status">상태</label>
                                    </th>
                                    <td>
                                        <select id="recruit-status" name="status">
                                            <option value="모집중">모집중</option>
                                            <option value="종료">종료</option>
                                        </select>
                                    </td>
                                </tr>

                                <tr>
                                    <th>모집기간</th>
                                    <td>
                                        <div class="cs-recruit-period-fields">
                                            <input id="recruit-start-date"
                                                   type="date"
                                                   name="startDate"
                                                   aria-label="모집 시작일">

                                            <span>~</span>

                                            <input id="recruit-end-date"
                                                   type="date"
                                                   name="endDate"
                                                   aria-label="모집 종료일">
                                        </div>
                                    </td>
                                </tr>

                                <tr>
                                    <th>
                                        <label for="recruit-content">내용</label>
                                    </th>
                                    <td>
                                        <textarea id="recruit-content"
                                                  name="content"
                                                  placeholder="채용공고 내용을 입력하세요."></textarea>
                                    </td>
                                </tr>

                            </table>

                            <div class="modal-form-actions cs-recruit-modal-actions">
                                <button type="button" data-modal-close>취소</button>
                                <button type="submit">등록</button>
                            </div>
                        </form>

                    </th:block>
                </div>

            </th:block>
        </section>
    </main>
</div>

<footer th:replace="~{admin/fragments/footer::footer}"></footer>
</body>
</html>
