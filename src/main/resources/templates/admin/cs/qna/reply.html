<!DOCTYPE html>
<html lang="en">
<head>
    <title>KMarket 문의하기 답변</title>
    <th:block th:replace="~{admin/fragments/head::head}"></th:block>
    <link rel="stylesheet" th:href="@{/css/admin/global/action-bar.css}">
    <link rel="stylesheet" th:href="@{/css/admin/global/section-table.css}">
    <link rel="stylesheet" th:href="@{/css/admin/cs/board.css}">
    <script type="module" th:src="@{/js/admin/cs/cs-board.js}"></script>
</head>
<body>
<header th:replace="~{admin/fragments/header::header}"></header>
<div class="admin-layout">
    <aside th:replace="~{admin/fragments/aside::aside}"></aside>

    <main id="admin-main">
        <div th:replace="~{admin/fragments/page-header::page-header}"></div>

        <section th:replace="~{admin/fragments/dash-section::dash-section(null, '문의하기 답변', null, ~{::content})}">
            <th:block th:fragment="content">
                <form action="#" method="post">
                    <table class="section-table cs-view-table">
                        <tr>
                            <th>유형</th>
                            <td>회원 - 가입</td>
                        </tr>
                        <tr>
                            <th>제목</th>
                            <td>개인회원과 법인회원에 차이가 있나요?</td>
                        </tr>
                        <tr>
                            <th>내용</th>
                            <td class="cs-view-content">개인회원하고 법인회원하고 차이를 알고 싶어요.
그리고 법인회원으로 가입하면 혜택이 있나요?</td>
                        </tr>
                        <tr>
                            <th><label for="qna-answer">답변</label></th>
                            <td><textarea id="qna-answer" name="answer" class="cs-answer-input"></textarea></td>
                        </tr>
                    </table>

                    <div th:replace="~{admin/fragments/action-bar::action-bar(~{::actions})}">
                        <th:block th:fragment="actions">
                            <button class="cs-board-button danger" type="button" data-cs-delete data-confirm-message="문의글을 삭제하시겠습니까?">삭제</button>
                            <button class="cs-board-button primary" type="submit">답변등록</button>
                            <button class="cs-board-button primary" type="button" th:data-cs-link="@{/admin/cs/qna/list}">목록</button>
                        </th:block>
                    </div>
                </form>
            </th:block>
        </section>
    </main>
</div>
<footer th:replace="~{admin/fragments/footer::footer}"></footer>
</body>
</html>
