<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org">

<head>
    <title>KMarket 문의하기 답변</title>

    <th:block th:replace="~{admin/fragments/head::head}"></th:block>

    <link rel="stylesheet"
          th:href="@{/css/admin/global/action-bar.css}">

    <link rel="stylesheet"
          th:href="@{/css/admin/global/section-table.css}">

    <link rel="stylesheet"
          th:href="@{/css/admin/cs/board.css}">

    <script type="module"
            th:src="@{/js/admin/cs/cs-board.js}"></script>
</head>

<body class="cs-board-page cs-qna-page">

<header th:replace="~{admin/fragments/header::header}"></header>

<div class="admin-layout">

    <aside th:replace="~{admin/fragments/aside::aside}"></aside>

    <main id="admin-main">

        <div th:replace="~{admin/fragments/page-header::page-header}"></div>

        <section th:replace="~{admin/fragments/dash-section::dash-section(
                    null,
                    '문의하기 답변',
                    null,
                    ~{::content}
                )}">

            <th:block th:fragment="content">

                <!-- 관리자 답변 등록 및 수정 폼 -->
                <form th:action="@{/admin/cs/qna/reply}"
                      method="post"
                      id="qna-reply-form">

                    <input type="hidden"
                           name="boardNo"
                           th:value="${qna.boardNo}">

                    <table class="section-table cs-view-table">

                        <tbody>

                        <tr>
                            <th>번호</th>
                            <td th:text="${qna.boardNo}">
                                0
                            </td>
                        </tr>

                        <tr>
                            <th>유형</th>
                            <td>
                                <span th:text="${qna.category1}">
                                    1차 유형
                                </span>

                                <span th:if="${!#strings.isEmpty(qna.category2)}">
                                    -
                                </span>

                                <span th:if="${!#strings.isEmpty(qna.category2)}"
                                      th:text="${qna.category2}">
                                    2차 유형
                                </span>
                            </td>
                        </tr>

                        <tr>
                            <th>상태</th>
                            <td>
                                <span class="cs-qna-status"
                                      th:classappend="${qna.answered
                                          ? ' answered'
                                          : ' waiting'}"
                                      th:text="${qna.status}">
                                    검토중
                                </span>
                            </td>
                        </tr>

                        <tr>
                            <th>작성자</th>
                            <td th:text="${qna.maskedMemberUid}">
                                -
                            </td>
                        </tr>

                        <tr>
                            <th>작성일</th>
                            <td th:text="${qna.createdAt != null
                                ? #temporals.format(
                                    qna.createdAt,
                                    'yyyy.MM.dd HH:mm'
                                )
                                : '-'}">
                                -
                            </td>
                        </tr>

                        <tr>
                            <th>제목</th>
                            <td th:text="${qna.title}">
                                문의 제목
                            </td>
                        </tr>

                        <tr>
                            <th>내용</th>
                            <td class="cs-view-content"
                                th:text="${qna.content}">
                                문의 내용
                            </td>
                        </tr>

                        <tr>
                            <th>
                                <label for="qna-answer">
                                    답변
                                </label>
                            </th>

                            <td>
                                <textarea id="qna-answer"
                                          name="answer"
                                          class="cs-answer-input"
                                          maxlength="3000"
                                          required
                                          th:text="${qna.answer}"
                                          placeholder="사용자 문의에 대한 답변을 입력하세요."></textarea>

                                <div class="cs-answer-info">
                                    <span>
                                        문의 내용에 맞는 답변을 정확하게 입력해주세요.
                                    </span>

                                    <span id="qna-answer-count">
                                        0 / 3000
                                    </span>
                                </div>
                            </td>
                        </tr>

                        </tbody>

                    </table>

                    <!-- 하단 버튼 -->
                    <div th:replace="~{admin/fragments/action-bar::action-bar(
                                ~{::actions}
                            )}">

                        <th:block th:fragment="actions">

                            <button class="cs-board-button danger"
                                    type="button"
                                    id="qna-delete-button">
                                삭제
                            </button>

                            <button class="cs-board-button secondary"
                                    type="button"
                                    th:data-cs-link="@{/admin/cs/qna/view(
                                        boardNo=${qna.boardNo}
                                    )}">
                                취소
                            </button>

                            <button class="cs-board-button primary"
                                    type="submit"
                                    th:text="${qna.answered
                                        ? '답변수정'
                                        : '답변등록'}">
                                답변등록
                            </button>

                        </th:block>

                    </div>

                </form>

                <!-- 문의글 삭제 폼 -->
                <form id="qna-delete-form"
                      th:action="@{/admin/cs/qna/delete}"
                      method="post"
                      hidden>

                    <input type="hidden"
                           name="boardNo"
                           th:value="${qna.boardNo}">

                </form>

                <script>
                    document.addEventListener("DOMContentLoaded", () => {
                        const deleteButton =
                            document.getElementById("qna-delete-button");

                        const deleteForm =
                            document.getElementById("qna-delete-form");

                        const answerInput =
                            document.getElementById("qna-answer");

                        const answerCount =
                            document.getElementById("qna-answer-count");

                        /* 문의글 삭제 */
                        deleteButton?.addEventListener("click", () => {
                            const confirmed = confirm(
                                "문의글을 삭제하시겠습니까?"
                            );

                            if (confirmed) {
                                deleteForm.submit();
                            }
                        });

                        /* 답변 글자 수 표시 */
                        const updateAnswerCount = () => {
                            answerCount.textContent =
                                `${answerInput.value.length} / 3000`;
                        };

                        updateAnswerCount();

                        answerInput.addEventListener(
                            "input",
                            updateAnswerCount
                        );
                    });
                </script>

            </th:block>

        </section>

    </main>

</div>

<footer th:replace="~{admin/fragments/footer::footer}"></footer>

</body>
</html>
