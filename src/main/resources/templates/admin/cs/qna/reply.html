<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>KMarket 문의하기 답변</title>

    <th:block th:replace="~{admin/fragments/head::head}"></th:block>

    <link rel="stylesheet"
          th:href="@{/css/admin/global/action-bar.css}">

    <link rel="stylesheet"
          th:href="@{/css/admin/global/section-table.css}">

    <link rel="stylesheet"
          th:href="@{/css/admin/cs/board.css}">

    <script type="module"
            th:src="@{/js/admin/cs/cs-board.js}"></script>
</head>

<body class="cs-board-page cs-qna-page">

<header th:replace="~{admin/fragments/header::header}"></header>

<div class="admin-layout">

    <aside th:replace="~{admin/fragments/aside::aside}"></aside>

    <main id="admin-main">

        <div th:replace="~{admin/fragments/page-header::page-header}"></div>

        <section th:replace="~{admin/fragments/dash-section::dash-section(
                    null,
                    '문의하기 답변',
                    null,
                    ~{::content}
                )}">

            <th:block th:fragment="content">

                <!-- 답변 등록 폼 -->
                <form th:action="@{/admin/cs/qna/reply}"
                      method="post">

                    <input type="hidden"
                           name="boardNo"
                           th:value="${qna.boardNo}">

                    <table class="section-table cs-view-table">

                        <tbody>

                        <tr>
                            <th>번호</th>
                            <td th:text="${qna.boardNo}"></td>
                        </tr>

                        <tr>
                            <th>유형</th>
                            <td>
                                <span th:text="${qna.category1}"></span>
                                <span> - </span>
                                <span th:text="${qna.category2}"></span>
                            </td>
                        </tr>

                        <tr>
                            <th>작성자</th>
                            <td th:text="${qna.maskedMemberUid}"></td>
                        </tr>

                        <tr>
                            <th>제목</th>
                            <td th:text="${qna.title}"></td>
                        </tr>

                        <tr>
                            <th>내용</th>
                            <td class="cs-view-content"
                                th:text="${qna.content}">
                            </td>
                        </tr>

                        <tr>
                            <th>
                                <label for="qna-answer">
                                    답변
                                </label>
                            </th>

                            <td>
                                <textarea id="qna-answer"
                                          name="answer"
                                          class="cs-answer-input"
                                          placeholder="답변을 입력하세요."
                                          required
                                          th:text="${qna.answer}"></textarea>
                            </td>
                        </tr>

                        </tbody>

                    </table>

                    <div th:replace="~{admin/fragments/action-bar::action-bar(
                                ~{::actions}
                            )}">

                        <th:block th:fragment="actions">

                            <button class="cs-board-button danger"
                                    type="button"
                                    id="qna-delete-button">
                                삭제
                            </button>

                            <button class="cs-board-button primary"
                                    type="submit">
                                답변등록
                            </button>

                            <button class="cs-board-button secondary"
                                    type="button"
                                    th:data-cs-link="@{/admin/cs/qna/list}">
                                목록
                            </button>

                        </th:block>

                    </div>

                </form>

                <!-- 삭제 폼 -->
                <form id="qna-delete-form"
                      th:action="@{/admin/cs/qna/delete}"
                      method="post"
                      style="display:none;">

                    <input type="hidden"
                           name="boardNo"
                           th:value="${qna.boardNo}">

                </form>

                <script>
                    document.addEventListener('DOMContentLoaded', () => {

                        const deleteButton =
                            document.getElementById('qna-delete-button');

                        const deleteForm =
                            document.getElementById('qna-delete-form');

                        deleteButton?.addEventListener('click', () => {

                            const confirmed = confirm(
                                '문의글을 삭제하시겠습니까?'
                            );

                            if (confirmed) {
                                deleteForm.submit();
                            }
                        });
                    });
                </script>

            </th:block>

        </section>

    </main>

</div>

<footer th:replace="~{admin/fragments/footer::footer}"></footer>

</body>
</html>
