<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>KMarket 문의하기 목록</title>

    <th:block th:replace="~{admin/fragments/head::head}"></th:block>

    <link rel="stylesheet"
          th:href="@{/css/admin/global/management-table-form.css}">

    <link rel="stylesheet"
          th:href="@{/css/admin/global/action-bar.css}">

    <link rel="stylesheet"
          th:href="@{/css/admin/cs/board.css}">

    <script type="module"
            th:src="@{/js/admin/cs/cs-board.js}"></script>
</head>

<body class="cs-board-page cs-qna-page">

<header th:replace="~{admin/fragments/header::header}"></header>

<div class="admin-layout">

    <aside th:replace="~{admin/fragments/aside::aside}"></aside>

    <main id="admin-main">

        <div th:replace="~{admin/fragments/page-header::page-header}"></div>

        <section th:replace="~{admin/fragments/dash-section::dash-section(
                    null,
                    '문의하기 목록',
                    null,
                    ~{::content}
                )}">

            <th:block th:fragment="content">

                <script th:if="${message}"
                        th:inline="javascript">
                    alert([[${message}]]);
                </script>

                <!-- 문의 유형 필터 -->
                <div class="cs-type-filter">

                    <form id="qna-filter-form"
                          th:action="@{/admin/cs/qna/list}"
                          method="get">

                        <select id="qna-category1"
                                name="category1"
                                aria-label="문의하기 1차 유형 선택">

                            <option value="">1차 유형 선택</option>

                            <option value="회원"
                                    th:selected="${selectedCategory1 == '회원'}">
                                회원
                            </option>

                            <option value="상품"
                                    th:selected="${selectedCategory1 == '상품'}">
                                상품
                            </option>

                            <option value="주문"
                                    th:selected="${selectedCategory1 == '주문'}">
                                주문
                            </option>

                            <option value="결제"
                                    th:selected="${selectedCategory1 == '결제'}">
                                결제
                            </option>

                            <option value="배송"
                                    th:selected="${selectedCategory1 == '배송'}">
                                배송
                            </option>

                            <option value="취소·반품·교환"
                                    th:selected="${selectedCategory1 == '취소·반품·교환'}">
                                취소·반품·교환
                            </option>

                            <option value="판매자"
                                    th:selected="${selectedCategory1 == '판매자'}">
                                판매자
                            </option>

                        </select>

                        <select id="qna-category2"
                                name="category2"
                                aria-label="문의하기 2차 유형 선택"
                                th:data-selected-category="${selectedCategory2}">

                            <option value="">2차 유형 선택</option>

                        </select>

                    </form>

                </div>

                <!-- 문의글 삭제 폼 -->
                <form id="management-table-form"
                      th:action="@{/admin/cs/qna/delete}"
                      method="post"
                      data-checkbox-name="boardNo">

                    <div class="management-table-scroll">

                        <table class="management-table">

                            <thead>
                            <tr>
                                <th>
                                    <label>
                                        <input type="checkbox"
                                               id="select-all">
                                    </label>
                                </th>

                                <th>번호</th>
                                <th>1차 유형</th>
                                <th>2차 유형</th>
                                <th>제목</th>
                                <th>작성자</th>
                                <th>작성일</th>
                                <th>상태</th>
                            </tr>
                            </thead>

                            <tbody>

                            <tr th:if="${qnaList == null
                                or #lists.isEmpty(qnaList)}">

                                <td colspan="8"
                                    class="cs-empty-row">
                                    등록된 문의글이 없습니다.
                                </td>

                            </tr>

                            <tr th:each="qna : ${qnaList}">

                                <td>
                                    <label>
                                        <input type="checkbox"
                                               name="boardNo"
                                               th:value="${qna.boardNo}">
                                    </label>
                                </td>

                                <td th:text="${qna.boardNo}">
                                    1
                                </td>

                                <td th:text="${qna.category1}">
                                    회원
                                </td>

                                <td th:text="${qna.category2}">
                                    가입
                                </td>

                                <td>
                                    <!-- 미답변 문의 -->
                                    <button th:if="${!qna.answered}"
                                            class="cs-title-button"
                                            type="button"
                                            th:data-cs-link="@{/admin/cs/qna/reply(
                                                boardNo=${qna.boardNo}
                                            )}"
                                            th:text="${qna.title}">
                                        문의 제목
                                    </button>

                                    <!-- 답변 완료 문의 -->
                                    <button th:if="${qna.answered}"
                                            class="cs-title-button"
                                            type="button"
                                            th:data-cs-link="@{/admin/cs/qna/view(
                                                boardNo=${qna.boardNo}
                                            )}"
                                            th:text="${qna.title}">
                                        문의 제목
                                    </button>
                                </td>

                                <td th:text="${qna.maskedMemberUid}">
                                    abc**
                                </td>

                                <td th:text="${qna.createdAt != null
                                    ? #temporals.format(
                                        qna.createdAt,
                                        'yyyy.MM.dd'
                                    )
                                    : '-'}">
                                    2026.07.13
                                </td>

                                <td>
                                    <span th:if="${qna.answered}"
                                          class="cs-status-complete">
                                        답변완료
                                    </span>

                                    <span th:unless="${qna.answered}">
                                        검토중
                                    </span>
                                </td>

                            </tr>

                            </tbody>

                        </table>

                    </div>

                    <div class="btn-area"
                         style="
                            display:flex;
                            justify-content:space-between;
                            align-items:center;
                            margin-top:20px;
                         ">

                        <button type="submit"
                                data-management-action="bulk-submit"
                                data-empty-message="삭제할 문의글을 선택해주세요."
                                data-confirm-message="선택한 문의글을 삭제하시겠습니까?"
                                data-action-variant="secondary">
                            선택삭제
                        </button>

                        <nav th:if="${pageInfo != null}"
                             th:replace="~{admin/fragments/admin-pagination
                                ::admin-pagination(
                                    ${pageInfo},
                                    ${qnaPageUrl}
                                )}">
                        </nav>

                        <span class="btn-area-spacer"></span>

                    </div>

                </form>

                <script>
                    document.addEventListener('DOMContentLoaded', () => {

                        const category1 =
                            document.getElementById('qna-category1');

                        const category2 =
                            document.getElementById('qna-category2');

                        const filterForm =
                            document.getElementById('qna-filter-form');

                        const selectedCategory2 =
                            category2.dataset.selectedCategory || '';

                        const categoryMap = {
                            '회원': [
                                '가입',
                                '로그인',
                                '비밀번호',
                                '회원정보',
                                '탈퇴'
                            ],

                            '상품': [
                                '상품정보',
                                '상품옵션',
                                '재입고',
                                '품절'
                            ],

                            '주문': [
                                '주문조회',
                                '주문변경',
                                '주문취소',
                                '주문오류'
                            ],

                            '결제': [
                                '결제방법',
                                '무통장입금',
                                '결제오류',
                                '현금영수증'
                            ],

                            '배송': [
                                '배송조회',
                                '배송지변경',
                                '배송지연',
                                '배송완료'
                            ],

                            '취소·반품·교환': [
                                '주문취소',
                                '반품신청',
                                '교환신청',
                                '환불'
                            ],

                            '판매자': [
                                '판매자가입',
                                '상품등록',
                                '주문관리',
                                '정산',
                                '판매자탈퇴'
                            ]
                        };

                        function updateCategory2(
                            selectedValue = ''
                        ) {
                            const selectedCategory1 =
                                category1.value;

                            category2.innerHTML =
                                '<option value="">2차 유형 선택</option>';

                            if (!selectedCategory1 ||
                                !categoryMap[selectedCategory1]) {

                                category2.disabled = true;
                                return;
                            }

                            categoryMap[selectedCategory1]
                                .forEach(value => {

                                    const option =
                                        document.createElement('option');

                                    option.value = value;
                                    option.textContent = value;

                                    if (value === selectedValue) {
                                        option.selected = true;
                                    }

                                    category2.appendChild(option);
                                });

                            category2.disabled = false;
                        }

                        category1.addEventListener('change', () => {
                            updateCategory2();
                            filterForm.submit();
                        });

                        category2.addEventListener('change', () => {
                            filterForm.submit();
                        });

                        updateCategory2(selectedCategory2);
                    });
                </script>

            </th:block>

        </section>

    </main>

</div>

<footer th:replace="~{admin/fragments/footer::footer}"></footer>

</body>
</html>
