<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>KMarket 공지사항 목록</title>
    <th:block th:replace="~{admin/fragments/head::head}"></th:block>
    <link rel="stylesheet" th:href="@{/css/admin/global/management-table-form.css}">
    <link rel="stylesheet" th:href="@{/css/admin/global/action-bar.css}">
    <link rel="stylesheet" th:href="@{/css/admin/cs/board.css}">
    <script type="module" th:src="@{/js/admin/cs/cs-board.js}"></script>
</head>
<body class="cs-board-page">
<header th:replace="~{admin/fragments/header::header}"></header>

<div class="admin-layout">
    <aside th:replace="~{admin/fragments/aside::aside}"></aside>

    <main id="admin-main">
        <div th:replace="~{admin/fragments/page-header::page-header}"></div>

        <section th:replace="~{admin/fragments/dash-section::dash-section(null, '공지사항 목록', null, ~{::content})}">
            <th:block th:fragment="content">

                <div class="cs-type-filter">
                    <select id="notice-type-filter" aria-label="공지사항 유형 선택">
                        <option value="">유형선택</option>
                        <option value="고객서비스">고객서비스</option>
                        <option value="이벤트 당첨">이벤트 당첨</option>
                        <option value="안전거래">안전거래</option>
                        <option value="위해상품">위해상품</option>
                    </select>
                </div>

                <form id="management-table-form" th:action="@{/admin/cs/notice/delete}" method="post" data-checkbox-name="noticeNo">

                    <div class="management-table-scroll">
                        <table class="management-table">
                            <tr>
                                <th><label><input type="checkbox" id="select-all"></label></th>
                                <th>번호</th>
                                <th>유형</th>
                                <th>제목</th>
                                <th>조회</th>
                                <th>날짜</th>
                                <th>관리</th>
                            </tr>
                            <tr th:each="notice : ${noticeList}" data-notice-row th:data-notice-type="${notice.type}">
                                <td><label><input type="checkbox" name="noticeNo" th:value="${notice.boardNo}"></label></td>
                                <td th:text="${notice.boardNo}"></td>
                                <td th:text="${notice.type}"></td>
                                <td>
                                    <button class="cs-title-button" type="button" th:data-cs-link="@{/admin/cs/notice/view(noticeNo=${notice.boardNo})}" th:text="${notice.title}"></button>
                                </td>
                                <td>-</td>
                                <td th:text="${#temporals.format(notice.createdAt, 'yyyy.MM.dd')}"></td>
                                <td>
                                    <div class="cs-manage-actions">
                                        <button type="button" data-cs-delete-single th:data-checkbox-value="${notice.boardNo}" data-confirm-message="공지사항을 삭제하시겠습니까?">[삭제]</button>
                                        <button type="button" th:data-cs-link="@{/admin/cs/notice/modify(noticeNo=${notice.boardNo})}">[수정]</button>
                                    </div>
                                </td>
                            </tr>
                        </table>
                    </div>

                    <div class="btn-area" style="display: flex; justify-content: space-between; align-items: center; margin-top: 20px;">
                        <button type="submit"
                                data-management-action="bulk-submit"
                                data-empty-message="삭제할 공지사항을 선택해주세요."
                                data-confirm-message="선택한 공지사항을 삭제하시겠습니까?"
                                data-action-variant="secondary">선택삭제</button>

                        <nav th:replace="~{admin/fragments/admin-pagination::admin-pagination(${pageInfo}, '/admin/cs/notice/list')}"></nav>

                        <button type="button"
                                th:onclick="|location.href='@{/admin/cs/notice/write}'|"
                                data-action-variant="primary">작성하기</button>
                    </div>
                </form>

            </th:block>
        </section>
    </main>
</div>

<footer th:replace="~{admin/fragments/footer::footer}"></footer>
</body>
</html>
