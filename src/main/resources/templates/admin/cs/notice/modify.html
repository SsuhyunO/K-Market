<!DOCTYPE html>
<html lang="en">
<head>
    <title>KMarket 공지사항 수정</title>
    <th:block th:replace="~{admin/fragments/head::head}"></th:block>
    <link rel="stylesheet" th:href="@{/css/admin/global/action-bar.css}">
    <link rel="stylesheet" th:href="@{/css/admin/global/section-table.css}">
    <link rel="stylesheet" th:href="@{/css/admin/cs/board.css}">
    <script type="module" th:src="@{/js/admin/cs/cs-board.js}"></script>
</head>
<body>
<header th:replace="~{admin/fragments/header::header}"></header>
<div class="admin-layout">
    <aside th:replace="~{admin/fragments/aside::aside}"></aside>

    <main id="admin-main">
        <div th:replace="~{admin/fragments/page-header::page-header}"></div>

        <section th:replace="~{admin/fragments/dash-section::dash-section(null, '공지사항 수정', null, ~{::content})}">
            <th:block th:fragment="content">
                <form action="#" method="post">
                    <table class="section-table cs-form-table">
                        <tr>
                            <th><label for="notice-type">유형</label></th>
                            <td><input id="notice-type" type="text" name="type" value="고객서비스"></td>
                        </tr>
                        <tr>
                            <th><label for="notice-title">제목</label></th>
                            <td><input id="notice-title" type="text" name="title" value="[필독] 사이트 이용 안내"></td>
                        </tr>
                        <tr>
                            <th><label for="notice-content">내용</label></th>
                            <td><textarea id="notice-content" name="content">공지사항 내용이 출력되는 영역입니다.</textarea></td>
                        </tr>
                    </table>

                    <div th:replace="~{admin/fragments/action-bar::action-bar(~{::actions})}">
                        <th:block th:fragment="actions">
                            <button class="cs-board-button secondary" type="button" th:data-cs-link="@{/admin/cs/notice/view}">취소</button>
                            <button class="cs-board-button primary" type="submit">수정하기</button>
                        </th:block>
                    </div>
                </form>
            </th:block>
        </section>
    </main>
</div>
<footer th:replace="~{admin/fragments/footer::footer}"></footer>
</body>
</html>
