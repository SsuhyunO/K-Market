<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KMarket - 케이마켓</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/bxslider/4.2.12/jquery.bxslider.css">

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.1.1/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/bxslider/4.2.12/jquery.bxslider.min.js"></script>

    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/index.css}">
</head>

<body>

<!-- HEADER -->
<header th:replace="~{fragments/header :: header}"></header>

<div class="page-wrapper">

    <!-- ASIDE -->
    <aside th:replace="~{fragments/aside :: aside}"></aside>

    <main class="main-content">

        <!-- 메인 슬라이드 배너 -->
        <div class="slider-section">
            <ul class="bxslider">

                <!-- DB에 등록된 메인슬라이더 배너가 있을 때 -->
                <th:block th:if="${mainSliderBanners != null and !#lists.isEmpty(mainSliderBanners)}">
                    <li th:each="banner : ${mainSliderBanners}">
                        <a th:href="${banner.link}" target="_blank">
                            <img th:src="@{/files/{id}(id=${banner.fileId})}"
                                 th:alt="${banner.name}"
                                 style="width:100%; height:289px; object-fit:cover; display:block;">
                        </a>
                    </li>
                </th:block>

                <!-- DB에 배너가 없을 때 기본 placeholder -->
                <th:block th:if="${mainSliderBanners == null or #lists.isEmpty(mainSliderBanners)}">
                    <li>
                        <div class="slide"
                             style="height: 290px; background: linear-gradient(135deg, #f8f8f8 0%, #ececec 100%);">
                            <div class="slide-placeholder"
                                 style="height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center;">
                                <div class="icon" style="font-size: 48px; opacity: .4;">🎁</div>
                                <p style="font-size: 13px; color: #999;">등록된 슬라이드 배너가 없습니다. (816 × 289)</p>
                            </div>
                        </div>
                    </li>
                </th:block>

            </ul>
        </div>

        <section th:replace="~{fragments/main-product-section :: section('section-hit', '🔥 히트상품', ${hitProducts})}"></section>
        <section th:replace="~{fragments/main-product-section :: section('section-recommend', '⭐ 추천상품', ${recommendProducts})}"></section>
        <section th:replace="~{fragments/main-product-section :: section('section-new', '🆕 최신상품', ${newProducts})}"></section>
        <section th:replace="~{fragments/main-product-section :: section('section-discount', '💸 할인상품', ${discountProducts})}"></section>

        <!-- FOOTER -->
        <footer th:replace="~{fragments/footer :: footer}"></footer>

    </main>

</div>

<script th:src="@{/js/common.js}"></script>

<script>
    $(document).ready(function () {
        $('.bxslider').bxSlider({
            auto: true,
            pause: 3000,
            speed: 500,
            controls: true,
            pager: true
        });
    });
</script>

</body>
</html>
