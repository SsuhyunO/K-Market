<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>케이마켓 - 아이디 찾기 결과</title>
    <link rel="stylesheet" th:href="@{/css/member/userid.css}">
    <link rel="stylesheet" th:href="@{/css/common.css}">
</head>
<body class="simple-header">

<header th:replace="~{fragments/header :: header}"></header>

<main class="result-wrapper">
    <h2 class="result-title">아이디 찾기 결과</h2>

    <table class="result-table">
        <tr><th>이름</th><td id="resName"></td></tr>
        <tr><th>아이디</th><td id="resUid"></td></tr>
        <tr><th>이메일</th><td id="resEmail"></td></tr>
        <tr><th>가입일</th><td id="resRegDate"></td></tr>
    </table>

    <p class="guide-text">고객님의 정보와 일치하는 아이디 입니다.</p>

    <div class="btn-area">
        <button type="button" class="btn-login" th:onclick="|location.href='@{/member/login}'|">로그인</button>
        <button type="button" class="btn-findpw" th:onclick="|location.href='@{/member/changepassword}'|">비밀번호 찾기</button>
    </div>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>

<script th:inline="javascript">
    const useridUrl = /*[[@{/member/userid}]]*/ '/member/userid';
</script>
<script>
    const result = JSON.parse(sessionStorage.getItem('findUidResult') || 'null');
    if (!result) {
        alert('잘못된 접근입니다. 아이디 찾기를 다시 진행해 주세요.');
        window.location.href = useridUrl;
    } else {
        document.getElementById('resName').textContent = result.name;
        document.getElementById('resUid').textContent = result.uid;
        document.getElementById('resEmail').textContent = result.email;
        document.getElementById('resRegDate').textContent = result.regDate;
        sessionStorage.removeItem('findUidResult');
    }
</script>

</body>
</html>
