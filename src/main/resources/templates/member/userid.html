
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>케이마켓 - 아이디 찾기</title>
    <link rel="stylesheet" th:href="@{/css/member/userid.css}">
    <link rel="stylesheet" th:href="@{/css/common.css}">
</head>
<body class="simple-header">

<header th:replace="~{fragments/header :: header}"></header>

<main>
    <h2 class="section-title">아이디 찾기</h2>

    <div class="tab-group">
        <div class="tab-btn active" onclick="switchTab(event, 'email')">이메일로 찾기</div>
        <div class="tab-btn" onclick="switchTab(event, 'phone')">휴대폰으로 찾기</div>
    </div>

    <div class="tab-content">
        <div id="panel-email" class="tab-panel active">
            <table class="form-table">
                <tr>
                    <th>이름</th>
                    <td><input type="text" id="email-name" placeholder="이름을 입력하세요"></td>
                </tr>
                <tr>
                    <th>이메일</th>
                    <td>
                        <div class="input-row">
                            <input type="email" id="email-addr" placeholder="이메일을 입력하세요">
                            <button type="button" class="btn-send" onclick="sendEmailCode()">인증번호 발송</button>
                        </div>
                    </td>
                </tr>
                <tr>
                    <th>인증번호</th>
                    <td>
                        <div class="input-row">
                            <input type="text" id="email-code" placeholder="인증번호 6자리를 입력하세요">
                            <button type="button" class="btn-confirm" onclick="confirmEmailCode()">확인</button>
                        </div>
                    </td>
                </tr>
            </table>
            <p id="guide-email" class="guide-text">이메일로 받은 인증번호를 입력해 주세요.</p>
        </div>

        <div id="panel-phone" class="tab-panel">
            <table class="form-table">
                <tr>
                    <th>이름</th>
                    <td><input type="text" id="phone-name" placeholder="이름을 입력하세요"></td>
                </tr>
                <tr>
                    <th>휴대폰 번호</th>
                    <td>
                        <div class="input-row">
                            <input type="tel" id="phone-num" placeholder="휴대폰 번호를 입력하세요">
                            <button type="button" class="btn-send" onclick="sendPhoneCode()">인증번호 발송</button>
                        </div>
                    </td>
                </tr>
                <tr>
                    <th>인증번호</th>
                    <td>
                        <div class="input-row">
                            <input type="text" id="phone-code" placeholder="인증번호 6자리를 입력하세요">
                            <button type="button" class="btn-confirm" onclick="confirmPhoneCode()">확인</button>
                        </div>
                    </td>
                </tr>
            </table>
            <p id="guide-phone" class="guide-text" style="display:none;">휴대폰 인증은 준비 중입니다.</p>
        </div>
    </div>

    <div class="btn-area">
        <button type="button" class="btn-cancel" th:onclick="|location.href='@{/member/login}'|">취소</button>
        <button type="button" class="btn-next" onclick="goNext()">다음</button>
    </div>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>

<script th:inline="javascript">
    const resultIdUrl = /*[[@{/member/resultid}]]*/ '/member/resultid';
</script>
<script th:src="@{/js/member/userid.js}"></script>

</body>
</html>
