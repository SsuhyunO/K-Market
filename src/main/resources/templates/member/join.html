

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>케이마켓 - 회원가입</title>
    <link rel="stylesheet" th:href="@{/css/member/join.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/common.css}">
</head>
<body class="simple-header">

<header th:replace="~{fragments/header :: header}"></header>

<!-- 메인 -->
<main>
    <div class="join-wrapper">

        <div class="welcome-text">
            <p>대한민국 1등 온라인 인터넷 쇼핑</p>
            <h2>케이마켓에 오신 것을 환영합니다.</h2>
        </div>

        <div class="join-cards">

            <!-- 일반 회원가입 -->
            <div class="join-card card-normal">
                <div class="card-header">일반회원가입</div>
                <div class="card-body">
                    <p class="card-desc">개인구매회원 (외국 인포함)</p>
                    <p class="card-sub">만 14세 이상가능</p>
                    <a th:href="@{/member/signup(type=normal)}" class="btn-join">회원가입</a>
                </div>
            </div>

            <!-- 판매 회원가입 -->
            <div class="join-card card-seller">
                <div class="card-header">판매회원가입</div>
                <div class="card-body">
                    <p class="card-desc">사업자판매회원</p>
                    <p class="card-sub">사업자등록증 증빙보 유한회원</p>
                    <a th:href="@{/member/signup(type=seller)}" class="btn-join">회원가입</a>
                </div>
            </div>

        </div>
    </div>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>

</body>
</html>
