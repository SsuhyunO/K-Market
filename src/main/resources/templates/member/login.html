


<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>케이마켓 - 로그인</title>
    <link rel="stylesheet" th:href="@{/css/member/login.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>
<body>

<header>
    <div class="header-inner">
        <a th:href="@{/}" class="logo">
            <img th:src="@{/images/ci-logo.svg}" alt="케이마켓 로고">
        </a>
        <nav class="header-nav">
            <a th:href="@{/member/login}">로그인</a>
            <a th:href="@{/member/join}">회원가입</a>
        </nav>
    </div>
</header>

<main>
    <div class="main-wrapper">

        <div class="login-container">

            <div class="login-box">
                <h2>로그인</h2>

                <form action="/kmarket/member/login" method="post">
                    <div class="login-form-row">
                        <div class="input-area">
                            <div class="input-row">
                                <label for="userId">아이디</label><div class="input-box"><i id="userIcon" class="fa-solid fa-user"></i><input type="text" id="userId" name="userId" placeholder="아이디를 입력하세요"></div></div>
                            <div class="input-row">
                                <label for="userPw">비밀번호</label><div class="input-box"><i id="pwIcon" class="fa-solid fa-lock"></i><input type="password" id="userPw" name="userPw" placeholder="비밀번호를 입력하세요"></div></div>
                        </div>
                        <button type="submit" class="btn-login">로그인</button>
                    </div>

                    <div class="login-options">
                        <label>
                            <input type="checkbox" name="autoLogin"> 자동로그인
                        </label>
                        <span>|</span>
                        <a th:href="@{/member/userid}">아이디찾기</a>
                        <span>|</span>
                        <a th:href="@{/member/password}">비밀번호 찾기</a>
                        <span>|</span>
                        <a th:href="@{/member/join}">회원가입</a>
                    </div>
                </form>

                <div class="social-login">
                    <button class="social-btn naver" title="네이버 로그인">N</button>
                    <button class="social-btn kakao" title="카카오 로그인">K</button>
                    <button class="social-btn google" title="구글 로그인">G</button>
                </div>
            </div>

            <div class="banner-box">
                <img th:src="@{/images/promo-banner-70.svg}" alt="70% 할인중" class="banner-image">
            </div>

        </div>

        <div class="award-logos">
            <div class="award-item"><img th:src="@{/images/award1.svg}" alt="베스트쇼핑몰"></div>
            <div class="award-item"><img th:src="@{/images/award2.svg}" alt="안전거래인증"></div>
            <div class="award-item"><img th:src="@{/images/award3.svg}" alt="고객만족대상"></div>
            <div class="award-item"><img th:src="@{/images/award4.svg}" alt="구매만족도1위"></div>
            <div class="award-item"><img th:src="@{/images/award5.svg}" alt="온라인쇼핑대상"></div>
            <div class="award-item"><img th:src="@{/images/award6.svg}" alt="친환경경영"></div>
        </div>

    </div>
</main>

<footer>
    <div class="footer-info">
        <div class="footer-nav">
            <a th:href="@{/company/index}">회사소개</a>
            <a th:href="@{/policy/buyer}">서비스이용약관</a>
            <a th:href="@{/policy/privacy}">개인정보처리방침</a>
            <a th:href="@{/policy/finance}">전자금융거래약관</a>
        </div>

        <div class="footer-info-inner">
            <div class="footer-logo-box">
                <img th:src="@{/images/ci-icon-animated-large.svg}" alt="케이마켓 로고">
            </div>
            <div class="footer-company">
                <strong>(주)케이마켓</strong>
                부산광역시 부산진구 중앙대로 103<br>
                대표이사 : 홍길동<br>
                사업자등록번호 : 123-45-12345
            </div>
            <div class="footer-cs">
                <strong>고객센터</strong>
                Tel : 1234-5678 평일 09:00~18:00<br>
                전자금융거래 분쟁 담당 : 1234-1234 (36팀) 09:00~18:00
            </div>
        </div>
    </div>
    <div class="footer-copyright">
        Copyright © 2025 김철학 All rights reserved.
    </div>
</footer>
<script th:inline="javascript">
    if (new URLSearchParams(location.search).get('loginRequired') === 'true') {
        alert('로그인이 필요한 페이지 입니다.');
    }
</script>
<script th:src="@{/js/member/login.js}"></script>
</body>
</html>
