

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>케이마켓 - 로그인</title>
    <link rel="stylesheet" th:href="@{/css/member/login.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/common.css}">
</head>
<body class="simple-header">

<header th:replace="~{fragments/header :: header}"></header>

<main>
    <div class="main-wrapper">

        <div class="login-container">

            <div class="login-box">
                <h2>로그인</h2>

                <form th:action="@{/member/login}" method="post">
                    <div class="login-form-row">
                        <div class="input-area">
                            <div class="input-row">
                                <label for="userId">아이디</label><div class="input-box"><i id="userIcon" class="fa-solid fa-user"></i><input type="text" id="userId" name="userId" placeholder="아이디를 입력하세요"></div></div>
                            <div class="input-row">
                                <label for="userPw">비밀번호</label><div class="input-box"><i id="pwIcon" class="fa-solid fa-lock"></i><input type="password" id="userPw" name="userPw" placeholder="비밀번호를 입력하세요"></div></div>
                        </div>
                        <button type="submit" class="btn-login">로그인</button>
                    </div>

                    <div class="login-options">
                        <label>
                            <input type="checkbox" name="autoLogin"> 자동로그인
                        </label>
                        <span>|</span>
                        <a th:href="@{/member/userid}">아이디찾기</a>
                        <span>|</span>
                        <a th:href="@{/member/password}">비밀번호 찾기</a>
                        <span>|</span>
                        <a th:href="@{/member/join}">회원가입</a>
                    </div>
                </form>

                <div class="social-login">
                    <button class="social-btn naver" title="네이버 로그인">N</button>
                    <button class="social-btn kakao" title="카카오 로그인">K</button>
                    <!-- 구글 로그인: a 태그로 변경, /oauth2/authorization/google 로 이동하면 Security가 알아서 구글로 리다이렉트함 -->
                    <a th:href="@{/oauth2/authorization/google}" class="social-btn google" title="구글 로그인">G</a>
                </div>
            </div>

            <!-- 관리자 페이지에서 등록한 로그인 배너 -->
            <div class="banner-box" th:if="${loginBanner != null}">
                <a th:if="${loginBanner.link != null and !#strings.isEmpty(loginBanner.link)}"
                   th:href="${loginBanner.link}">
                    <img th:src="@{/files/{id}(id=${loginBanner.fileId})}"
                         th:alt="${loginBanner.name}"
                         class="banner-image">
                </a>

                <img th:unless="${loginBanner.link != null and !#strings.isEmpty(loginBanner.link)}"
                     th:src="@{/files/{id}(id=${loginBanner.fileId})}"
                     th:alt="${loginBanner.name}"
                     class="banner-image">
            </div>

            <!-- 활성화된 로그인 배너가 없을 때 -->
            <div class="banner-box banner-empty"
                 th:unless="${loginBanner != null}">
                <span>등록된 로그인 배너가 없습니다.</span>
            </div>

        </div>

        <div class="award-logos">
            <div class="award-item"><img th:src="@{/images/award1.svg}" alt="베스트쇼핑몰"></div>
            <div class="award-item"><img th:src="@{/images/award2.svg}" alt="안전거래인증"></div>
            <div class="award-item"><img th:src="@{/images/award3.svg}" alt="고객만족대상"></div>
            <div class="award-item"><img th:src="@{/images/award4.svg}" alt="구매만족도1위"></div>
            <div class="award-item"><img th:src="@{/images/award5.svg}" alt="온라인쇼핑대상"></div>
            <div class="award-item"><img th:src="@{/images/award6.svg}" alt="친환경경영"></div>
        </div>

    </div>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>

<script th:inline="javascript">
    if (new URLSearchParams(location.search).get('loginRequired') === 'true') {
        alert('로그인이 필요한 페이지 입니다.');
    }
</script>
<script th:src="@{/js/member/login.js}"></script>
</body>
</html>
