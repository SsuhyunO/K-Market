


<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>케이마켓 - 판매자 회원가입</title>
    <link rel="stylesheet" th:href="@{/css/member/registerSeller.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/common.css}">
</head>
<body class="simple-header">

<!-- 헤더 -->
<header th:replace="~{fragments/header :: header}"></header>

<!-- 메인 -->
<main>
    <h2 class="section-title">판매자 회원가입</h2>

    <table class="form-table">

        <!-- ① 계정 정보 -->
        <tr>
            <th>아이디</th>
            <td>
                <input type="text" class="input-id" maxlength="12" id="userId">
                <button type="button" class="btn-verify" onclick="checkUserId()">중복확인</button>
                <span class="hint">영문, 숫자  4~12자 설정</span>
                <div id="userId-msg" style="font-size:13px; margin-top:4px;"></div>
            </td>
        </tr>
        <tr>
            <th>비밀번호</th>
            <td>
                <input type="password" class="input-pw" id="userPw">
                <span class="hint">영문, 숫자, 특수문자  8~12자 설정</span>
                <div id="pw-msg" style="font-size:13px; margin-top:4px;"></div>
            </td>
        </tr>
        <tr>
            <th>비밀번호확인</th>
            <td>
                <input type="password" class="input-pw" id="userPwConfirm">
                <div id="pwConfirm-msg" style="font-size:13px; margin-top:4px;"></div>
            </td>
        </tr>

        <!-- 구분선 -->
        <tr class="divider"><th></th><td></td></tr>

        <!-- ② 회사 정보 -->
        <tr>
            <th>회사명</th>
            <td>
                <input type="text" class="input-normal" placeholder="회사명입력 예) (주)삼호평" id="companyName">
            </td>
        </tr>
        <tr>
            <th>대표</th>
            <td>
                <input type="text" class="input-normal" placeholder="이름입력" id="ceoName">
            </td>
        </tr>
        <tr>
            <th>사업자등록번호</th>
            <td>
                <input type="text" class="input-biz" placeholder="- 포함 입력" id="bizNum">
                <button type="button" class="btn-verify" onclick="checkBizNum()">중복확인</button>
                <span class="hint-inline">예) 123-45-67890</span>
                <div id="bizNum-msg" style="font-size:13px; margin-top:4px;"></div>
            </td>
        </tr>
        <tr>
            <th>통신판매업번호</th>
            <td>
                <input type="text" class="input-normal" placeholder="예) 제2024-서울강남-01234호" id="mailOrderNum">
                <div id="mailOrderNum-msg" style="font-size:13px; margin-top:4px;"></div>
            </td>
        </tr>
        <tr>
            <th>전화번호</th>
            <td>
                <input type="tel" class="input-normal" placeholder="전화번호입력" id="tel">
                <div id="tel-msg" style="font-size:13px; margin-top:4px;"></div>
            </td>
        </tr>
        <tr>
            <th>팩스</th>
            <td>
                <input type="tel" class="input-normal" placeholder="팩스번호입력" id="fax">
                <div id="fax-msg" style="font-size:13px; margin-top:4px;"></div>
            </td>
        </tr>
        <tr>
            <th>이메일</th>
            <td>
                <input type="email" class="input-normal" placeholder="이메일입력" id="userEmail">
                <button type="button" class="btn-verify" onclick="checkEmail()">중복확인</button>
                <div id="userEmail-msg" style="font-size:13px; margin-top:4px;"></div>
            </td>
        </tr>
        <tr>
            <th>주소</th>
            <td>
                <div class="addr-group">
                    <div class="addr-row">
                        <input type="text" class="input-addr1" placeholder="우편번호검색클릭" id="postcode" readonly>
                        <button type="button" class="btn-postcode" onclick="openPostcode()">우편번호검색</button>
                    </div>
                    <div class="addr-row">
                        <input type="text" class="input-addr2" placeholder="기본주소검색" id="addrBase" readonly>
                    </div>
                    <div class="addr-row">
                        <input type="text" class="input-addr2" placeholder="상세주소입력" id="addrDetail">
                    </div>
                </div>
            </td>
        </tr>
    </table>

    <!-- ③ 회원가입 버튼 -->
    <div class="btn-area">
        <button type="button" class="btn-submit" onclick="submitJoin()">회원가입</button>
    </div>
</main>

<!-- 푸터 -->
<footer>
    <div class="footer-copyright">
        Copyright © 2025 김철학 All rights reserved.
    </div>
</footer>

<script th:inline="javascript">
    const loginUrl = /*[[@{/member/login}]]*/ '/member/login';
    const indexUrl = /*[[@{/}]]*/ '/';
</script>

<script src="//t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>

<script th:src="@{/js/member/registerSeller.js}"></script>

</body>
</html>
