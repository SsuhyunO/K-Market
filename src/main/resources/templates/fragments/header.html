<header th:fragment="header" id="header">

    <div class="header-banner">
        <span class="banner-placeholder">🛍️ 가로 × 세로 크기 배너광고 (1063 × 90)</span>
    </div>

    <div class="header-main">
        <div class="container" style="display:flex; align-items:center; gap:20px; height:100%;">
            <div class="logo">
                <a th:href="@{/}">
                    <div>
                        <div class="logo-text">K<span style="color:#222;font-weight:400;">market</span></div>
                        <div class="logo-sub">㈜케이마켓</div>
                    </div>
                </a>
            </div>

            <form th:action="@{/search}" method="GET" class="search-box">
                <input type="text" name="keyword" placeholder="검색어를 입력하세요" id="searchInput" required>
                <button type="submit" aria-label="검색">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
                    </svg>
                </button>
            </form>

            <nav class="util-nav" style="display:flex; gap:16px; white-space:nowrap; flex-shrink:0;">
                <a th:href="@{/login}" style="font-size:13px; color:var(--color-gray-600);">로그인</a>
                <span style="color:var(--color-gray-200);">|</span>
                <a th:href="@{/join}" style="font-size:13px; color:var(--color-gray-600);">회원가입</a>
                <span style="color:var(--color-gray-200);">|</span>
                <a th:href="@{/mypage}" style="font-size:13px; color:var(--color-gray-600);">마이페이지</a>
                <span style="color:var(--color-gray-200);">|</span>
                <a th:href="@{/cart}" style="font-size:13px; color:var(--color-gray-600);">🛒 장바구니</a>
            </nav>
        </div>
    </div>

    <nav class="header-nav">
        <div class="container">
            <a th:href="@{/}+'#section-hit'"       data-section="hit" class="active">히트상품</a>
            <a th:href="@{/}+'#section-recommend'" data-section="recommend">추천상품</a>
            <a th:href="@{/}+'#section-new'"       data-section="new">최신상품</a>
            <a th:href="@{/}+'#section-popular'"   data-section="popular">인기상품</a>
            <a th:href="@{/}+'#section-discount'"  data-section="discount">할인상품</a>
        </div>
    </nav>

</header>
