<div th:fragment="aside" id="aside">

    <!-- 1차/2차 카테고리 클릭 시 /product/list?category=ID 로 이동 → 상품목록 페이지 출력 -->
    <nav class="aside-category">
        <ul>
            <li>
                <a class="cat-item" th:href="@{/product/list(category=1)}">
                    <span class="cat-icon">👕</span>패션<span style="margin-left:auto;font-size:10px;color:var(--color-gray-400)">▾</span>
                </a>
                <div class="cat-sub">
                    <a th:href="@{/product/list(category=11)}">의류</a>
                    <a th:href="@{/product/list(category=12)}">뷰티</a>
                </div>
            </li>
            <li>
                <a class="cat-item" th:href="@{/product/list(category=2)}">
                    <span class="cat-icon">💻</span>가전<span style="margin-left:auto;font-size:10px;color:var(--color-gray-400)">▾</span>
                </a>
                <div class="cat-sub">
                    <a th:href="@{/product/list(category=21)}">가전</a>
                    <a th:href="@{/product/list(category=22)}">디지털</a>
                </div>
            </li>
            <li>
                <a class="cat-item" th:href="@{/product/list(category=3)}">
                    <span class="cat-icon">🍽️</span>식품<span style="margin-left:auto;font-size:10px;color:var(--color-gray-400)">▾</span>
                </a>
                <div class="cat-sub">
                    <a th:href="@{/product/list(category=31)}">식품</a>
                    <a th:href="@{/product/list(category=32)}">생활용품</a>
                </div>
            </li>
            <li>
                <a class="cat-item" th:href="@{/product/list(category=4)}">
                    <span class="cat-icon">🏠</span>홈<span style="margin-left:auto;font-size:10px;color:var(--color-gray-400)">▾</span>
                </a>
                <div class="cat-sub">
                    <a th:href="@{/product/list(category=41)}">홈</a>
                    <a th:href="@{/product/list(category=42)}">문구</a>
                    <a th:href="@{/product/list(category=43)}">취미</a>
                </div>
            </li>
        </ul>
    </nav>

    <!-- 베스트 상품: Controller가 bestProducts를 모델에 안 넣으면 자동으로 숨겨짐
         (약관 페이지 등은 bestProducts를 넘기지 않으면 됨, fragment 호출부는 항상 동일) -->
    <div class="aside-best" th:if="${bestProducts != null}">
        <div class="aside-best-title">
            <span>🏷️</span> 베스트 상품
        </div>
        <ul class="best-list" id="bestList">

            <!-- bestProducts가 비어있을 때(0건)를 대비한 placeholder 3개 -->
            <th:block th:if="${#lists.isEmpty(bestProducts)}">
                <li class="best-item rank-1">
                    <div class="best-thumb-placeholder">🖼️</div>
                    <div class="best-info">
                        <div class="best-name">상품명 텍스트</div>
                        <div class="best-price-del">30,000원</div>
                        <div style="display:flex;gap:4px;align-items:center;">
                            <span class="best-sale">10%↓</span>
                            <span class="best-price">27,000원</span>
                        </div>
                    </div>
                </li>
                <li class="best-item">
                    <div class="best-thumb-placeholder">🖼️</div>
                    <div class="best-info">
                        <div class="best-name">상품명 텍스트</div>
                        <div class="best-price-del">30,000원</div>
                        <div style="display:flex;gap:4px;align-items:center;">
                            <span class="best-sale">10%↓</span>
                            <span class="best-price">27,000원</span>
                        </div>
                    </div>
                </li>
                <li class="best-item">
                    <div class="best-thumb-placeholder">🖼️</div>
                    <div class="best-info">
                        <div class="best-name">상품명 텍스트</div>
                        <div class="best-price-del">30,000원</div>
                        <div style="display:flex;gap:4px;align-items:center;">
                            <span class="best-sale">10%↓</span>
                            <span class="best-price">27,000원</span>
                        </div>
                    </div>
                </li>
            </th:block>

            <!-- 실제 데이터 반복 렌더링 -->
            <li th:each="product, stat : ${bestProducts}"
                th:class="${stat.index == 0} ? 'best-item rank-1' : 'best-item'">
                <div class="best-thumb-placeholder">
                    <img th:if="${product.thumbnailUrl}" th:src="${product.thumbnailUrl}" alt="">
                    <span th:unless="${product.thumbnailUrl}">🖼️</span>
                </div>
                <div class="best-info">
                    <div class="best-name" th:text="${product.name}">상품명 텍스트</div>
                    <div class="best-price-del" th:text="${product.originalPrice} + '원'">30,000원</div>
                    <div style="display:flex;gap:4px;align-items:center;">
                        <span class="best-sale" th:text="${product.discountRate} + '%↓'">10%↓</span>
                        <span class="best-price" th:text="${product.salePrice} + '원'">27,000원</span>
                    </div>
                </div>
            </li>

        </ul>
    </div>

</div>
