<aside th:fragment="aside" id="aside">
    <nav class="aside-category">

        <ul>
            <li>
                <a class="cat-item" th:href="@{/category/fashion}">
                    <span class="cat-icon">👕</span>패션<span style="margin-left:auto;font-size:10px;color:var(--color-gray-400)">▾</span>
                </a>
                <div class="cat-sub">
                    <a href="#">의류</a>
                    <a href="#">뷰티</a>
                </div>
            </li>
            <li>
                <a class="cat-item" th:href="@{/category/digital}">
                    <span class="cat-icon">💻</span>가전<span style="margin-left:auto;font-size:10px;color:var(--color-gray-400)">▾</span>
                </a>
                <div class="cat-sub">
                    <a href="#">가전</a>
                    <a href="#">디지털</a>
                </div>
            </li>
            <li>
                <a class="cat-item" th:href="@{/category/food}">
                    <span class="cat-icon">🍽️</span>식품<span style="margin-left:auto;font-size:10px;color:var(--color-gray-400)">▾</span>
                </a>
                <div class="cat-sub">
                    <a href="#">식품</a>
                    <a href="#">생활용품</a>
                </div>
            </li>
            <li>
                <a class="cat-item" th:href="@{/category/home}">
                    <span class="cat-icon">🏠</span>홈<span style="margin-left:auto;font-size:10px;color:var(--color-gray-400)">▾</span>
                </a>
                <div class="cat-sub">
                    <a href="#">홈</a>
                    <a href="#">문구</a>
                    <a href="#">취미</a>
                </div>
            </li>
        </ul>
    </nav>

    <!-- 베스트 상품: Controller에서 bestProducts(List<Product>, 최대 3개)를 모델에 담아 전달 -->
    <div class="aside-best" th:unless="${hideBest == true}">
        <div class="aside-best-title">
            <span>🏷️</span> 베스트 상품
        </div>
        <ul class="best-list" id="bestList">

            <!-- bestProducts가 없을 때를 대비한 정적 예시 (th:remove로 실제 렌더링 시 제거됨) -->
            <th:block th:if="${bestProducts == null}">
                <li class="best-item rank-1">
                    <div class="best-thumb-placeholder">🖼️</div>
                    <div class="best-info">
                        <div class="best-name">상품명</div>
                        <div class="best-price-del">30,000원</div>
                        <div style="display:flex;gap:4px;align-items:center;">
                            <span class="best-sale">10%↓</span>
                            <span class="best-price">27,000원</span>
                        </div>
                    </div>
                </li>

                <li class="best-item">
                    <div class="best-thumb-placeholder">🖼️</div>
                    <div class="best-info">
                        <div class="best-name">상품명</div>
                        <div class="best-price-del">30,000원</div>
                        <div style="display:flex;gap:4px;align-items:center;">
                            <span class="best-sale">10%↓</span>
                            <span class="best-price">27,000원</span>
                        </div>
                    </div>
                </li>

                <li class="best-item">
                    <div class="best-thumb-placeholder">🖼️</div>
                    <div class="best-info">
                        <div class="best-name">상품명</div>
                        <div class="best-price-del">30,000원</div>
                        <div style="display:flex;gap:4px;align-items:center;">
                            <span class="best-sale">10%↓</span>
                            <span class="best-price">27,000원</span>
                        </div>
                    </div>
                </li>
            </th:block>

            <!-- 실제 데이터 반복 렌더링 -->
            <li th:each="product, stat : ${bestProducts}"
                th:class="${stat.index == 0} ? 'best-item rank-1' : 'best-item'">
                <div class="best-thumb-placeholder">
                    <img th:if="${product.thumbnailUrl}" th:src="${product.thumbnailUrl}" alt="">
                    <span th:unless="${product.thumbnailUrl}">🖼️</span>
                </div>
                <div class="best-info">
                    <div class="best-name" th:text="${product.name}">상품명 텍스트</div>
                    <div class="best-price-del" th:text="${product.originalPrice} + '원'">30,000원</div>
                    <div style="display:flex;gap:4px;align-items:center;">
                        <span class="best-sale" th:text="${product.discountRate} + '%↓'">10%↓</span>
                        <span class="best-price" th:text="${product.salePrice} + '원'">27,000원</span>
                    </div>
                </div>
            </li>

        </ul>
    </div>

</aside>
