<div th:fragment="aside" id="aside">

    <nav class="aside-category">
        <ul>
            <li th:each="root : ${categoryTree}">
                <details class="cat-group"
                         th:attr="open=${parentCate != null and parentCate.cateId == root.cateId} ? 'open' : null">
                    <summary class="cat-item">
                        <span class="cat-icon" th:text="${root.icon}"></span>
                        <span th:text="${root.displayName}"></span>
                        <span class="cat-arrow">›</span>
                    </summary>
                    <div class="cat-sub">
                        <a th:each="child : ${root.children}"
                           th:href="@{/product/list(category=${child.cateId})}"
                           th:classappend="${subCate != null and subCate.cateId == child.cateId} ? ' active' : ''"
                           th:text="${child.name}"></a>
                    </div>
                </details>
            </li>
        </ul>
    </nav>

    <div class="aside-best"
         th:if="${(showBest == null or showBest) and bestProducts != null and !#lists.isEmpty(bestProducts)}">
        <div class="aside-best-title">
            <span>🏷️</span> 베스트 상품
        </div>
        <ul class="best-list" id="bestList">
            <li th:each="product, stat : ${bestProducts}">
                <a th:href="@{/product/view(prodNo=${product.prodNo})}"
                   th:class="${stat.index == 0} ? 'best-item rank-1' : 'best-item'">
                <span class="best-rank" th:text="${stat.count}">1</span>
                <div class="best-thumb-placeholder">
                    <img th:if="${product.thumbnailFileId != null}"
                         th:src="@{/files/{id}(id=${product.thumbnailFileId})}"
                         th:alt="${product.name}">
                    <span th:unless="${product.thumbnailFileId != null}">🖼️</span>
                </div>
                <div class="best-info">
                    <div class="best-name" th:text="${product.name}">상품명 텍스트</div>
                    <div class="best-price-del"
                         th:if="${product.discountRate > 0}"
                         th:text="${#numbers.formatInteger(product.originalPrice, 0, 'COMMA')} + '원'">30,000원</div>
                    <div class="best-price-row">
                        <span class="best-sale"
                              th:if="${product.discountRate > 0}"
                              th:text="${product.discountRate} + '%↓'">10%↓</span>
                        <span class="best-price"
                              th:text="${#numbers.formatInteger(product.salePrice(), 0, 'COMMA')} + '원'">27,000원</span>
                    </div>
                </div>
                </a>
            </li>
        </ul>
    </div>
</div>
