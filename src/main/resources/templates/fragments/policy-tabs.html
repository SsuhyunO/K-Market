<!-- =============================================
     약관 탭 네비게이션 공통 fragment
     사용법: <nav th:replace="~{fragments/policy-tabs :: tabs(active='buyer')}"></nav>
     active 값: buyer | seller | finance | location | privacy
     ============================================= -->
<nav th:fragment="tabs(active)" class="policy-tabs">

    <a th:href="@{/policy/buyer}"
       th:class="${active == 'buyer'} ? 'policy-tab active' : 'policy-tab'">
        <div class="policy-tab-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/>
                <path d="M3 6h18"/>
                <path d="M16 10a4 4 0 0 1-8 0"/>
            </svg>
        </div>
        <span class="policy-tab-label">구매회원 약관</span>
    </a>

    <a th:href="@{/policy/seller}"
       th:class="${active == 'seller'} ? 'policy-tab active' : 'policy-tab'">
        <div class="policy-tab-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M3 9l1-5h16l1 5"/>
                <path d="M3 9a2 2 0 0 0 4 0 2 2 0 0 0 4 0 2 2 0 0 0 4 0 2 2 0 0 0 4 0"/>
                <path d="M5 9v10a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1V9"/>
                <path d="M9 21v-6h6v6"/>
            </svg>
        </div>
        <span class="policy-tab-label">판매회원 약관</span>
    </a>

    <a th:href="@{/policy/finance}"
       th:class="${active == 'finance'} ? 'policy-tab active' : 'policy-tab'">
        <div class="policy-tab-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="2" y="5" width="20" height="14" rx="2"/>
                <path d="M2 10h20"/>
                <path d="M6 15h4"/>
            </svg>
        </div>
        <span class="policy-tab-label">전자금융거래</span>
    </a>

    <a th:href="@{/policy/location}"
       th:class="${active == 'location'} ? 'policy-tab active' : 'policy-tab'">
        <div class="policy-tab-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/>
                <circle cx="12" cy="10" r="3"/>
            </svg>
        </div>
        <span class="policy-tab-label">위치정보 약관</span>
    </a>

    <a th:href="@{/policy/privacy}"
       th:class="${active == 'privacy'} ? 'policy-tab active' : 'policy-tab'">
        <div class="policy-tab-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="4" y="11" width="16" height="10" rx="2"/>
                <path d="M8 11V7a4 4 0 0 1 8 0v4"/>
                <circle cx="12" cy="16" r="1.5" fill="currentColor" stroke="none"/>
            </svg>
        </div>
        <span class="policy-tab-label">개인정보처리</span>
    </a>

</nav>
