<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="context-path" th:content="@{/}">
    <title>KMarket 상품검색</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/product/search.css}">
    <script type="module" th:src="@{/js/product/search.js}"></script>
</head>
<body>

<header th:replace="~{fragments/header :: header}"></header>

<div class="page-wrapper">

    <!-- aside에서 1차/2차 카테고리 클릭 시 이 페이지(/product/list)로 이동 -->
    <aside th:replace="~{fragments/aside :: aside}"></aside>

    <main class="main-content">

        <!-- ① 페이지 타이틀 + ② 브레드크럼 -->
        <!--
            💡 퍼블리싱 전용 매핑 로직 (서버 연결 전 테스트용)
            주소창의 ?category=12 번호를 읽어 1차(parent)와 2차(current) 이름을 자동으로 할당합니다.
        -->
        <!-- ① 페이지 타이틀 + 브레드크럼 -->
        <div class="list-header">
            <h1 class="list-title">상품검색결과</h1>
            <nav class="breadcrumb">
                <a th:href="@{/}">HOME</a>
                <span class="sep">&gt;</span>
                <span>상품검색</span>
                <span class="sep">&gt;</span>
                <span class="current">검색결과</span>
            </nav>
        </div>

        <!-- 검색 결과 -->
        <div class="search-result-header">
            <h2>
                <span class="keyword" th:text="${param.keyword != null ? param.keyword[0] : '전체상품'}">전체상품</span> 검색결과
                <span class="count">(총 : <strong>0</strong>건)</span>
            </h2>
        </div>

        <!-- 2차 검색 -->
        <section class="search-filter">

            <form th:action="@{/product/search}" method="get">

                <!-- 검색어 -->
                <div class="filter-row">

                    <input type="text"
                           name="keyword"
                           placeholder="검색어 입력"
                           th:value="${param.keyword != null ? param.keyword[0] : ''}">

                    <button class="btn-second-search" type="submit">검색</button>

                    <label>
                        <input type="checkbox" name="name" value="true">
                        상품명
                    </label>

                    <label>
                        <input type="checkbox" name="description" value="true">
                        설명
                    </label>

                    <label>
                        <input type="checkbox" name="price" value="true">
                        가격
                    </label>

                    <input type="number"
                           name="minPrice"
                           min="0"
                           placeholder="최소">

                    <span>~</span>

                    <input type="number"
                           name="maxPrice"
                           min="0"
                           placeholder="최대">

                </div>

            </form>

        </section>

        <!-- ③ 상품 정렬: 판매많은순 | 낮은가격순 | 높은가격순 | 평점높은순 | 후기많은순 | 최근등록순 -->
        <nav class="sort-tabs">
            <a href="#" data-sort="SALES">판매많은순</a>
            <span class="sep">|</span>
            <a href="#" data-sort="PRICE_ASC">낮은가격순</a>
            <span class="sep">|</span>
            <a href="#" data-sort="PRICE_DESC">높은가격순</a>
            <span class="sep">|</span>
            <a href="#" data-sort="RATING">평점높은순</a>
            <span class="sep">|</span>
            <a href="#" data-sort="REVIEW_COUNT">후기많은순</a>
            <span class="sep">|</span>
            <a href="#" data-sort="CREATED_AT">최근등록순</a>
        </nav>

        <!-- ④ 상품 리스트: 10개씩 페이징 -->
        <div class="product-list-row"></div>

        <!-- 페이지네이션: 7개씩 노출, 이전/다음 -->
        <nav class="list-pagination"></nav>

        <footer th:replace="~{fragments/footer :: footer}"></footer>

    </main>

</div>

<script th:src="@{/js/common.js}"></script>
</body>
</html>
