<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta name="context-path" th:content="@{/}">
    <title th:text="${categoryName} + ' - KMarket'">상품목록 - KMarket</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/product/list.css}">
	<script type="module" th:src="@{/js/product/list.js}"></script>
</head>
<body>

<header th:replace="~{fragments/header :: header}"></header>

<div class="page-wrapper">

    <!-- aside에서 1차/2차 카테고리 클릭 시 이 페이지(/product/list)로 이동 -->
    <aside th:replace="~{fragments/aside :: aside}"></aside>

    <main class="main-content">

        <!-- ① 페이지 타이틀 + ② 브레드크럼 -->
        <!--
            💡 퍼블리싱 전용 매핑 로직 (서버 연결 전 테스트용)
            주소창의 ?category=12 번호를 읽어 1차(parent)와 2차(current) 이름을 자동으로 할당합니다.
        -->
        <div class="list-header">

            <!-- 메인 타이틀 -->
            <h1 class="list-title" th:text="${subCate.name}">상품목록</h1>

            <nav class="breadcrumb">
                <a th:href="@{/}">HOME</a>

                <!-- 1차 카테고리 (매핑된 이름이 있을 때만 노출) -->
                <th:block th:if="${parentCate != null}">
                    <span class="sep">&gt;</span>
                    <a href="#" th:text="${parentCate.name}">1차 카테고리</a>
                </th:block>

                <!-- 2차 (현재) 카테고리 -->
                <span class="sep">&gt;</span>
                <span class="current" th:text="${subCate.name}">현재 카테고리</span>
            </nav>
        </div>

        <!-- ③ 상품 정렬: 판매많은순 | 낮은가격순 | 높은가격순 | 평점높은순 | 후기많은순 | 최근등록순 -->
	    <nav class="sort-tabs">
		    <a href="#" data-sort="SALES">판매많은순</a>
		    <span class="sep">|</span>
		    <a href="#" data-sort="PRICE_ASC">낮은가격순</a>
		    <span class="sep">|</span>
		    <a href="#" data-sort="PRICE_DESC">높은가격순</a>
		    <span class="sep">|</span>
		    <a href="#" data-sort="RATING">평점높은순</a>
		    <span class="sep">|</span>
		    <a href="#" data-sort="REVIEW_COUNT">후기많은순</a>
		    <span class="sep">|</span>
		    <a href="#" data-sort="CREATED_AT">최근등록순</a>
	    </nav>

        <!-- ④ 상품 리스트: 10개씩 페이징 -->
        <div class="product-list-row"></div>

        <!-- 페이지네이션: 7개씩 노출, 이전/다음 -->
        <nav class="list-pagination"></nav>

        <footer th:replace="~{fragments/footer :: footer}"></footer>
    </main>
</div>

<script th:src="@{/js/common.js}"></script>
</body>
</html>
