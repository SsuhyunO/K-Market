<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>장바구니 - KMarket</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/product/cart.css}">
</head>
<body>

<header th:replace="~{fragments/header :: header}"></header>

<div class="page-wrapper">

    <!-- aside 호출 -->
    <aside th:replace="~{fragments/aside :: aside(hideBest=false)}"></aside>

    <main class="main-content"
          th:with="
                cateId=${param.category != null ? param.category[0] : '11'},
                parentName=${
                    (cateId == '11' or cateId == '12' or cateId == '13') ? '패션·뷰티' :
                    ((cateId == '21' or cateId == '22' or cateId == '23') ? '가전·디지털' :
                    ((cateId == '31' or cateId == '32' or cateId == '33') ? '식품·생필품' :
                    ((cateId == '41' or cateId == '42' or cateId == '43') ? '홈·데코·취미' : null)))
                }
             ">

        <!-- ① 페이지 타이틀 + 브레드크럼 -->
        <div class="list-header">
            <h1 class="list-title">장바구니</h1>
            <nav class="breadcrumb">
                <a th:href="@{/}">HOME</a>
                <th:block th:if="${parentName != null}">
                    <span class="sep">&gt;</span>
                    <a th:href="@{/product/list(category=${cateId})}" th:text="${parentName}">1차 카테고리</a>
                </th:block>
                <span class="sep">&gt;</span>
                <span class="current">장바구니</span>
            </nav>
        </div>

        <!-- ② 장바구니 컨텐츠 (테이블 위, 버튼/요약 아래) -->
        <div class="cart-content">

            <!-- 위쪽: 장바구니 목록 (전체 너비 차지) -->
            <section class="cart-list-section">
                <table class="cart-table">
                    <thead>
                    <tr>
                        <th><input type="checkbox" id="chk-all" checked></th>
                        <th class="col-product">상품명</th>
                        <th>수량</th>
                        <th>판매가</th>
                        <th>할인</th>
                        <th>포인트</th>
                        <th>배송비</th>
                        <th>총합</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:if="${cartItems == null or #lists.isEmpty(cartItems)}">
                        <td colspan="8" class="empty-cart">장바구니가 비어있습니다.</td>
                    </tr>
                    <tr th:each="item : ${cartItems}">
                        <td><input type="checkbox" class="chk-item" th:value="${item.cartNo}" checked></td>
                        <td class="product-col">
                            <div class="prod-thumb">
                                <img th:if="${item.thumbnailUrl}" th:src="${item.thumbnailUrl}" alt="">
                                <span th:unless="${item.thumbnailUrl}">이미지 없음</span>
                            </div>
                            <div class="prod-info">
                                <span class="name" th:text="${item.productName}">상품명</span>
                                <span class="desc" th:if="${item.optionText}" th:text="'옵션: ' + ${item.optionText}">옵션</span>
                            </div>
                        </td>
                        <td>
                            <div class="count-control">
                                <input type="text" th:value="${item.quantity}" readonly>
                            </div>
                        </td>
                        <td th:text="${#numbers.formatInteger(item.price, 1, 'COMMA')} + '원'">0원</td>
                        <td class="discount" th:text="${item.discountRate} + '%'">0%</td>
                        <td th:text="${#numbers.formatInteger(item.point * item.quantity, 1, 'COMMA')} + 'P'">0P</td>
                        <td th:text="${item.freeShipping} ? '무료' : ${#numbers.formatInteger(item.shippingFee, 1, 'COMMA')} + '원'">무료</td>
                        <td class="total" th:text="${#numbers.formatInteger(item.lineTotal, 1, 'COMMA')} + '원'">0원</td>
                    </tr>
                    </tbody>
                </table>
            </section>

            <!-- 아래쪽: 삭제 버튼 & 결제 요약 박스 -->
            <div class="cart-bottom-section">

                <!-- 왼쪽: 선택 삭제 버튼 -->
                <div class="cart-actions">
                    <button type="button" class="btn-delete-sel">선택삭제</button>
                </div>

                <!-- 오른쪽: 결제 요약 박스 -->
                <div class="summary-box">
                    <h2 class="summary-title">전체합계</h2>

                    <div class="summary-row">
                        <span class="label">상품수</span>
                        <span class="value" id="summaryItemCount" th:text="${cartItems != null ? #lists.size(cartItems) : 0}">0</span>
                    </div>
                    <div class="summary-row">
                        <span class="label">상품금액</span>
                        <span class="value" id="summaryProductPrice" th:text="${#numbers.formatInteger(productTotal, 1, 'COMMA')} + '원'">0원</span>
                    </div>
                    <div class="summary-row">
                        <span class="label">할인금액</span>
                        <span class="value minus" id="summaryDiscount" th:text="'-' + ${#numbers.formatInteger(discountTotal, 1, 'COMMA')} + '원'">-0원</span>
                    </div>
                    <div class="summary-row">
                        <span class="label">배송비</span>
                        <span class="value" id="summaryShipping" th:text="${#numbers.formatInteger(shippingTotal, 1, 'COMMA')} + '원'">0원</span>
                    </div>

                    <hr class="summary-divider">

                    <div class="summary-row">
                        <span class="label">전체주문금액</span>
                        <span class="value" id="summaryOrderTotal" th:text="${#numbers.formatInteger(orderTotal, 1, 'COMMA')} + '원'">0원</span>
                    </div>
                    <div class="summary-row">
                        <span class="label">적립포인트</span>
                        <span class="value" id="summaryEarnPoint" th:text="${#numbers.formatInteger(earnPoint, 1, 'COMMA')}">0</span>
                    </div>

                    <hr class="summary-divider">

                    <div class="summary-final">
                        <span class="label">전체주문금액</span>
                        <span class="value" id="summaryFinalPrice" th:text="${#numbers.formatInteger(finalPrice, 1, 'COMMA')} + '원'">0원</span>
                    </div>

                    <button type="button" class="btn-order" id="btnOrder"
                            th:disabled="${cartItems == null or #lists.isEmpty(cartItems)}">주문하기</button>
                </div>

            </div>

        </div>

        <footer th:replace="~{fragments/footer :: footer}"></footer>
    </main>
</div>

<script th:src="@{/js/common.js}"></script>
<script type="module" th:src="@{/js/product/cart.js}"></script>

</body>
</html>
