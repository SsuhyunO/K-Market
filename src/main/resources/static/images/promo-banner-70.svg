<svg xmlns="http://www.w3.org/2000/svg" width="900" height="300" viewBox="0 0 900 300">

    <defs>

        <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#ffffff"/>
            <stop offset="100%" stop-color="#f6f7fb"/>
        </linearGradient>

        <linearGradient id="shine">
            <stop offset="0%" stop-color="white" stop-opacity="0"/>
            <stop offset="50%" stop-color="white" stop-opacity=".8"/>
            <stop offset="100%" stop-color="white" stop-opacity="0"/>
        </linearGradient>

        <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="8" stdDeviation="12"
                          flood-color="#000"
                          flood-opacity=".12"/>
        </filter>

    </defs>

    <!-- 카드 -->
    <rect x="20" y="20" width="860" height="260"
          rx="24"
          fill="url(#bg)"
          filter="url(#shadow)"/>

    <!-- 빛 효과 -->
    <rect x="-250" y="0"
          width="120"
          height="300"
          fill="url(#shine)"
          transform="rotate(20)">
        <animate attributeName="x"
                 from="-300"
                 to="1100"
                 dur="3s"
                 repeatCount="indefinite"/>
    </rect>

    <!-- SALE -->
    <text x="450"
          y="75"
          text-anchor="middle"
          font-size="26"
          fill="#ff6b00"
          font-weight="700"
          font-family="Arial">
        SUMMER SALE
    </text>

    <!-- 70% -->
    <g>

        <animateTransform
                attributeName="transform"
                type="scale"
                values="1;1.05;1"
                dur="1.5s"
                repeatCount="indefinite"/>

        <text
                x="450"
                y="165"
                text-anchor="middle"
                font-size="100"
                font-weight="900"
                fill="#222"
                font-family="Arial">
            70%
        </text>

    </g>

    <!-- 할인 -->
    <text
            x="450"
            y="215"
            text-anchor="middle"
            font-size="42"
            fill="#444"
            font-weight="700"
            font-family="Arial">
        할인
    </text>

    <!-- 설명 -->
    <text
            x="450"
            y="250"
            text-anchor="middle"
            font-size="22"
            fill="#888"
            font-family="Arial">
        최대 70% 할인 · 지금 바로 쇼핑하세요
    </text>

    <!-- 반짝이 -->
    <circle cx="180" cy="70" r="4" fill="#FFD54F">
        <animate attributeName="opacity"
                 values="0;1;0"
                 dur="1.8s"
                 repeatCount="indefinite"/>
    </circle>

    <circle cx="720" cy="90" r="5" fill="#FFD54F">
        <animate attributeName="opacity"
                 values="1;0;1"
                 dur="2.2s"
                 repeatCount="indefinite"/>
    </circle>

    <circle cx="760" cy="220" r="3" fill="#FFD54F">
        <animate attributeName="opacity"
                 values="0;1;0"
                 dur="1.4s"
                 repeatCount="indefinite"/>
    </circle>

</svg>