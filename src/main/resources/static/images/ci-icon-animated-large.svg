<svg width="90" height="90" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cartGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#66bb6a"/>
      <stop offset="100%" stop-color="#2e7d32"/>
    </linearGradient>
  </defs>

  <!-- 담기는 상품 박스: 위에서 떨어져서 카트 안으로 사라졌다가 다시 반복 -->
  <g>
    <rect x="43" y="0" width="14" height="14" rx="2" fill="#ffb300">
      <animate attributeName="y" values="0;38;38;0;0" keyTimes="0;0.35;0.55;0.56;1" dur="2.4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;1;0;0;1" keyTimes="0;0.35;0.5;0.56;1" dur="2.4s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- 카트: 상품이 담기는 순간 살짝 흔들림 -->
  <g id="cart">
    <animateTransform attributeName="transform"
      type="rotate"
      values="0 50 60; 0 50 60; -4 50 60; 4 50 60; 0 50 60; 0 50 60"
      keyTimes="0;0.33;0.37;0.41;0.45;1"
      dur="2.4s"
      repeatCount="indefinite"/>

    <!-- 카트 몸통 -->
    <path d="M18 30h8l9 38a5 5 0 0 0 5 4h32a5 5 0 0 0 4.8-3.6L86 40H32"
          fill="none" stroke="url(#cartGrad)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- 바퀴 -->
    <circle cx="46" cy="86" r="6" fill="#2e7d32">
      <animateTransform attributeName="transform" type="rotate" from="0 46 86" to="360 46 86" dur="0.7s" repeatCount="indefinite"/>
    </circle>
    <circle cx="68" cy="86" r="6" fill="#2e7d32">
      <animateTransform attributeName="transform" type="rotate" from="0 68 86" to="360 68 86" dur="0.7s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
